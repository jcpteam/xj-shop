<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>导入表结构</title>
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css?v=316}"/>
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->

	<style>
		.form-group-bottom {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			background-color: #fff;
			padding: 10px 20px;
			box-shadow: 0 -1px 2px 0 rgba(0, 0, 0, .05);
		}
	</style>
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-card">
			<!-- 搜索区 -->
			<form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
				<div class="layui-form-item">
					<div class="layui-inline">
						<label class="layui-form-label label-auto">表名称：</label>
						<div class="layui-input-inline">
							<input class="layui-input" name="tableName" type="text"/>
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label label-auto">表描述：</label>
						<div class="layui-input-inline">
							<input class="layui-input" name="tableComment" type="text"/>
						</div>
					</div>
					<div class="layui-inline" style="padding-left: 13px;">
						<button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
							<i class="layui-icon layui-icon-search"></i>搜索
						</button>
						<button class="layui-btn layui-btn-sm icon-btn" type="reset">
							<i class="layui-icon layui-icon-refresh"></i>重置
						</button>
					</div>
				</div>
			</form>

			<table class="layui-table" id="dataTable" lay-filter="dataTable"></table>

		</div>

	</div>

	<div class="form-group-bottom text-right">
		<button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
		<button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
	</div>
</div>


<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script type="text/javascript" th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script type="text/javascript" th:inline="none">
	layui.use(['index', 'layer', 'form', 'table', 'util', 'laydate', 'ext'], function () {
		var $ = layui.jquery;
		var layer = layui.layer;
		var form = layui.form;
		var table = layui.table;
		var util = layui.util;
		var laydate = layui.laydate;
		var ext = layui.ext;
		var admin = layui.admin;
		var index = layui.index;

		var prefix = ctx + "tool/gen";
		var url = prefix + "/db/list";

		table.render({
			elem: '#dataTable'
			,url: url
			,method: 'POST'
			//,toolbar: '#toolbarHead'
			,height: 'full-140'
			,cellMinWidth: 50
			,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			,limit: 10
			,cols: [[
				{type: 'checkbox', fixed: 'left'}
				,{type: 'numbers', title: '序号', fixed: 'left'}
				,{field: 'tableName', title: '表名称', minWidth: 100}
				,{field: 'tableComment', title: '表描述', minWidth: 100}
				,{field: 'createTime', title: '创建时间', minWidth: 180}
				,{field: 'updateTime', title: '更新时间', minWidth: 180}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		//监听搜索
		form.on('submit(searchBtn)', function (data) {
			var field = data.field;
			console.log(JSON.stringify(field));
			//执行重载
			table.reload('dataTable', {
				where: field
			});
		});

		//监听提交
		form.on('submit(submitBtn)', function (data) {
			console.log('test...');

			var checkStatus = table.checkStatus('dataTable');
			var checkData = checkStatus.data;
			console.log(JSON.stringify(checkData));

			var tableNames = [];
			layui.each(checkData, function (index, item) {
				tableNames.push(item.tableName);
			});

			if (tableNames.length == 0) {
				admin.error("请至少选择一条记录");
				return;
			}

			admin.req(prefix + "/importTable", {tables: tableNames.join(',')}, function (res) {
				admin.closeThisDialog();
				parent.layui.admin.success('导入成功!');
				parent.layui.table.reload('dataTable');

			}, 'POST');

		});

	});
</script>
</body>

</html>
