<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>代码生成列表</title>
	<link rel="stylesheet" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" th:href="@{/assets/module/admin.css}"/>
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-card">
			<!-- 搜索区 -->
			<form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
				<div class="layui-form-item">
					<div class="layui-inline">
						<label class="layui-form-label label-auto">表名称：</label>
						<div class="layui-input-inline">
							<input class="layui-input" name="tableName" type="text" placeholder="输入表名称"/>
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label label-auto">表描述：</label>
						<div class="layui-input-inline">
							<input class="layui-input" name="tableComment" type="text" placeholder="输入表描述"/>
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label label-auto">表时间：</label>
						<div class="layui-input-inline">
							<input id="createTime" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
							<input id="beginDate" type="hidden" name="params[beginTime]">
							<input id="endDate" type="hidden" name="params[endTime]">
						</div>
					</div>
					<div class="layui-inline" style="padding-left: 13px;">
						<button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
							<i class="layui-icon layui-icon-search"></i>搜索
						</button>
						<button class="layui-btn layui-btn-sm icon-btn" type="reset">
							<i class="layui-icon layui-icon-refresh"></i>重置
						</button>
					</div>
				</div>
			</form>

			<table class="layui-table" id="dataTable" lay-filter="dataTable"></table>
		</div>

	</div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
	<div class="layui-btn-container">
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="addTable" shiro:hasPermission="tool:gen:edit"><i class="layui-icon layui-icon-add-circle"></i>新增表</button>
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="importTable" shiro:hasPermission="tool:gen:code"><i class="layui-icon layui-icon-upload"></i>数据库导入</button>
		<button class="layui-btn layui-btn-warm layui-btn-sm" lay-event="editTab" shiro:hasPermission="tool:gen:edit"><i class="layui-icon layui-icon-edit"></i>修改</button>
		<button class="layui-btn layui-btn-danger layui-btn-sm" lay-event="removeAll" shiro:hasPermission="tool:gen:remove"><i class="layui-icon layui-icon-delete"></i>删除</button>
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="batchGenCode" shiro:hasPermission="tool:gen:code"><i class="layui-icon layui-icon-engine"></i>批量生成</button>
	</div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
	<a class="layui-btn layui-btn-xs" lay-event="preview" shiro:hasPermission="tool:gen:preview">预览</a>
	<a class="layui-btn layui-btn-xs" lay-event="editTab" shiro:hasPermission="tool:gen:edit">编辑</a>
	<a class="layui-btn layui-btn-xs" lay-event="remove" shiro:hasPermission="tool:gen:remove">删除</a>
	<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="genCode" shiro:hasPermission="tool:gen:code">生成代码</a>
</script>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script type="text/javascript" th:inline="javascript">
	var ctx = [[@{/}]];
	var datas = [[${@dict.getType('sys_normal_disable')}]];
</script>
<script type="text/javascript" th:inline="none">
	layui.use(['index', 'layer', 'laydate', 'form', 'table', 'util', 'ext'], function () {
		var $ = layui.jquery;
		var layer = layui.layer;
		var form = layui.form;
		var table = layui.table;
		var util = layui.util;
		var laydate = layui.laydate;
		var ext = layui.ext;
		var admin = layui.admin;
		var index = layui.index;

		var prefix = ctx + "tool/gen";
		var listUrl = prefix + "/list";
		var updateUrl = prefix + "/edit/{id}";
		var removeUrl = prefix + "/remove";

		table.render({
			elem: '#dataTable'
			,url: listUrl
			,method: 'POST'
			,toolbar: '#toolbarHead'
			,height: 'full-100'
			,cellMinWidth: 80
			,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			,limit: 10
			,cols: [[
				{type: 'checkbox'}
				,{type: 'numbers',title: '序号'}
				,{field: 'tableName', title: '表名称', width: 200}
				,{field: 'tableComment', title: '表描述', width: 150}
				,{field: 'className', title: '实体类名称', width: 200}
				,{field: 'createTime', title: '创建时间', width: 180}
				,{field: 'updateTime', title: '更新时间', width: 180}
				,{field: 'operate', title: '操作', minWidth: 200, toolbar: '#toolbarRow', fixed: 'right'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		//日期范围
		laydate.render({
			elem: '#createTime'
			, range: '~'
			, done: function (value, date, endDate) {
				if (value != null && value != '') {
					var b = $.trim(value.split('~')[0]);
					var e = $.trim(value.split('~')[1]);
					$("#beginDate").val(b);
					$("#endDate").val(e);
				}
			}
		});

		//监听搜索
		form.on('submit(searchBtn)', function (data) {
			var field = data.field;
			//console.log(JSON.stringify(field));
			//执行重载
			table.reload('dataTable', {
				where: field
			});
		});

		//头工具栏事件
		table.on('toolbar(dataTable)', function(obj){
			switch(obj.event){
				case 'batchGenCode':
					active.batchGenCode();
					break;
				case 'importTable':
					active.importTable();
					break;
				case 'editTab':
					active.editTab();
					break;
				case 'removeAll':
					active.removeAll();
					break;
			};
		});

		//行工具栏事件
		table.on('tool(dataTable)', function (obj) {
			var data = obj.data;
			if (obj.event === 'preview') {
				active.preview(data.tableId);
			} else if(obj.event === 'editTab'){
				active.editTab(data.tableId);
			} else if(obj.event === 'remove'){
				active.remove(data.tableId);
			} else if (obj.event === 'genCode') {
				active.genCode(data.tableName);
			}
		});

		//事件
		var active = {
			//批量生成代码
			batchGenCode: function(){
				var checkStatus = table.checkStatus('dataTable')
						, checkData = checkStatus.data; //得到选中的数据

				if (checkData.length === 0) {
					return admin.info('请选择要生成的数据');
				}

				var tableNames = [];
				layui.each(checkData, function (index, item) {
					tableNames.push(item.tableName);
				});

				admin.confirm("确认要生成选中的" + checkData.length + "条数据吗?", function() {
					location.href = prefix + "/batchGenCode?tables=" + tableNames.join(',');
					layer.msg('执行成功,正在生成代码请稍后…', { icon: 1 });
				});
			},
			//导入表结构
			importTable: function(){
				var importTableUrl = prefix + "/importTable";
				admin.openUrl('导入表结构', importTableUrl, '900px', '500px');
				// admin.open({
				// 	title: '导入表结构',
				// 	type: 2,
				// 	content: importTableUrl,
				// 	area: ['100%', '100%'],
				// 	auto: true,
				// 	maxmin: true
				// });
			},
			//修改
			editTab: function (id) {
				if(!id){
					var checkStatus = table.checkStatus('dataTable')
							, checkData = checkStatus.data; //得到选中的数据
					if (checkData.length == 0) {
						return admin.info('请选择一条数据');
					}
					if (checkData.length > 1) {
						return admin.info('只能选择一条数据');
					}
					id = checkData[0].tableId;
				}

				var editUrl = updateUrl.replace("{id}", id);
				parent.layui.admin.openDialog('修改生成配置', editUrl, '100%', '100%');
			},
			//删除
			removeAll: function () {
				var checkStatus = table.checkStatus('dataTable')
						, checkData = checkStatus.data; //得到选中的数据

				if (checkData.length === 0) {
					return admin.info('请选择数据');
				}

				var ids = [];
				layui.each(checkData, function (index, item) {
					ids.push(item.tableId);
				});

				admin.confirm('确定删除吗？', function () {
					admin.req(removeUrl, {ids: ids.join(',')}, function (result) {
						if (result.code == 0) {
							table.reload('dataTable');
							admin.success('删除成功!');
						} else {
							admin.error(result.msg);
						}
					},'post')
				});
			}
			//预览
			,preview:function (tableId) {
				var preViewUrl = prefix + "/preview/" + tableId;
				$.modal.loading("正在加载数据，请稍后...");
				$.get(preViewUrl, function(result) {
					if (result.code == web_status.SUCCESS) {
						var items = [];
						$.each(result.data, function(index, value) {
							value = value.replace(/</g, "&lt;");
							value = value.replace(/>/g, "&gt;");
							var templateName = index.substring(index.lastIndexOf("/") + 1, index.length).replace(/\.vm/g, "");
							if(!$.common.equals("sql", templateName) && !$.common.equals("tree.html", templateName)){
								items.push({
									title: templateName , content: "<pre class=\"layui-code\">" + value + "</pre>"
								})
							}
						});
						top.layer.tab({
							area: ['90%', '90%'],
							shadeClose: true,
							tab: items
						});
					} else {
						$.modal.alertError(result.msg);
					}
					$.modal.closeLoading();
				});
			}
			,remove: function(id){
				admin.confirm('确定删除吗?',function(){
					admin.req(removeUrl, {ids: id}, function (data) {
						if (data.code == 0) {
							table.reload('dataTable');
							admin.success('删除成功!');
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
			,genCode:function (tableName) {
				$.modal.confirm("确定要生成" + tableName + "表代码吗？", function() {
					location.href = prefix + "/genCode/" + tableName;
					layer.msg('执行成功,正在生成代码请稍后…', { icon: 1 });
				})
			}
		}
	});
</script>
</body>

</html>
