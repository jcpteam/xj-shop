<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>消息群发</title>
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->
</head>
<body>


<!-- 正文开始 -->
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-card">
			<div class="layui-card-header"><i class="layui-icon layui-icon-release"></i>&nbsp;消息群发</div>
			<div class="layui-card-body">
				<form class="layui-form" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
					<div class="layui-row">
						<div class="layui-form-item">
							<label class="layui-form-label">消息内容:</label>
							<div class="layui-input-block">
								<textarea name="msg" maxlength="500" class="layui-textarea" rows="3" lay-verType="tips" lay-verify="required" placeholder="请输入消息内容"></textarea>
							</div>
						</div>

						<div class="layui-form-item text-center">
							<button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>发送</button>
							<button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeThisTabs">关闭</button>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>

<script type="text/javascript" th:inline="javascript">
	var ctx = [[@{/}]];
</script>

<script th:inline="none">
	layui.use(['index', 'form', 'formX', 'table', 'notice'], function(){
		var $ = layui.$;
		var form = layui.form;
		var formX = layui.formX;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;
		var notice = layui.notice;

		var url = ctx + "notice"
		//监听提交
		form.on('submit(submitBtn)', function (data) {
			var field = data.field;
			console.log(JSON.stringify(field));
			admin.confirm('确定发送吗？', function () {
				admin.req(url, field, function (res) {
					if (res.code == 0) {
						admin.success(res.msg);
					} else {
						admin.error(res.msg);
					}
				},'post')
			});
		});
	})
</script>

</body>
</html>
