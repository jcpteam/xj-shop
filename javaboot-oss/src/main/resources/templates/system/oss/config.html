<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8">
	<title>文件配置</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
	<style>
		#inputForm .layui-form-label {
			width: 110px;  /* 这里修改标题宽度 */
		}

		#inputForm .layui-input-block {
			margin-left: 140px;  /* 这里要比上面始终大30px */
		}
	</style>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false" th:action="@{/system/oss/saveConfig}" th:object="${config}">
	<div class="layui-card">
		<div class="layui-card-body">
			<div class="layui-row">
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">存储类型:</label>
					<div class="layui-input-block">
						<input type="radio" name="type" th:field="*{type}" value="1" title="七牛" lay-filter="type"/>
						<input type="radio" name="type" th:field="*{type}" value="2" title="阿里云" lay-filter="type"/>
						<input type="radio" name="type" th:field="*{type}" value="3" title="腾讯云" lay-filter="type"/>
					</div>
				</div>
				<div id="qiniuDiv">
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">域名:</label>
						<div class="layui-input-block">
							<input id="qiniuDomain" name="qiniuDomain" th:field="*{qiniuDomain}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">路径前缀:</label>
						<div class="layui-input-block">
							<input id="qiniuPrefix" name="qiniuPrefix" th:field="*{qiniuPrefix}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">AccessKey:</label>
						<div class="layui-input-block">
							<input id="qiniuAccessKey" name="qiniuAccessKey" th:field="*{qiniuAccessKey}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">SecretKey:</label>
						<div class="layui-input-block">
							<input id="qiniuSecretKey" name="qiniuSecretKey" th:field="*{qiniuSecretKey}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">BucketName:</label>
						<div class="layui-input-block">
							<input id="qiniuBucketName" name="qiniuBucketName" th:field="*{qiniuBucketName}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
				</div>
				<div id="aliyunDiv">
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">域名:</label>
						<div class="layui-input-block">
							<input id="aliyunDomain" name="aliyunDomain" th:field="*{aliyunDomain}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">路径前缀:</label>
						<div class="layui-input-block">
							<input id="aliyunPrefix" name="aliyunPrefix" th:field="*{aliyunPrefix}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">EndPoint:</label>
						<div class="layui-input-block">
							<input id="aliyunEndPoint" name="aliyunEndPoint" th:field="*{aliyunEndPoint}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">AccessKeyId:</label>
						<div class="layui-input-block">
							<input id="aliyunAccessKeyId" name="aliyunAccessKeyId" th:field="*{aliyunAccessKeyId}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">KeySecret:</label>
						<div class="layui-input-block">
							<input id="aliyunAccessKeySecret" name="aliyunAccessKeySecret" th:field="*{aliyunAccessKeySecret}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">BucketName:</label>
						<div class="layui-input-block">
							<input id="aliyunBucketName" name="aliyunBucketName" th:field="*{aliyunBucketName}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
				</div>
				<div id="qcloudDiv">
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">域名:</label>
						<div class="layui-input-block">
							<input id="qcloudDomain" name="qcloudDomain" th:field="*{qcloudDomain}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">路径前缀:</label>
						<div class="layui-input-block">
							<input id="qcloudPrefix" name="qcloudPrefix" th:field="*{qcloudPrefix}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">AppId:</label>
						<div class="layui-input-block">
							<input id="qcloudSecretId" name="qcloudSecretId" th:field="*{qcloudSecretId}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">SecretKey:</label>
						<div class="layui-input-block">
							<input id="qcloudSecretKey" name="qcloudSecretKey" th:field="*{qcloudSecretKey}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">BucketName:</label>
						<div class="layui-input-block">
							<input id="qcloudBucketName" name="qcloudBucketName" th:field="*{qcloudBucketName}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label layui-form-required">Region:</label>
						<div class="layui-input-block">
							<input id="qcloudRegion" name="qcloudRegion" th:field="*{qcloudRegion}" type="text" class="layui-input" lay-verType="tips" lay-verify=""/>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="layui-form-item layui-hide">
		<button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
		<button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
	</div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script th:inline="none">
	layui.use(['index', 'form', 'formX', 'table', 'ext'], function(){
		var $ = layui.$;
		var form = layui.form;
		var formX = layui.formX;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;

		$(function() {
			menuVisible("1");
		});

		function menuVisible(menuType) {
			if (menuType == "1") {
				$("#qiniuDiv").show();
				$("#aliyunDiv").hide();
				$("#qcloudDiv").hide();
				// $('#aliyunDiv input').each(function (index, element) {
				// 	$(element).removeAttr('lay-verify');
				// })
			} else if (menuType == "2") {
				$("#qiniuDiv").hide();
				$("#aliyunDiv").show();
				$("#qcloudDiv").hide();
			} else if (menuType == "3") {
				$("#qiniuDiv").hide();
				$("#aliyunDiv").hide();
				$("#qcloudDiv").show();
			}
		}

		form.on('radio(type)', function(data){
			menuVisible(data.value);
		});

	})
</script>
</body>
</html>
