<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>消息自动回复</title>
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css}"/>
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->
	<style>
		#dictTable + .layui-table-view .layui-table-tool-temp {
			padding-right: 0;
		}

		#dictTable + .layui-table-view .layui-table-body tbody > tr td {
			cursor: pointer;
		}

		#dictTable + .layui-table-view .layui-table-body tbody > tr.layui-table-click {
			background-color: #fff3e0;
		}

		#dictTable + .layui-table-view .layui-table-body tbody > tr.layui-table-click td:last-child > div:before {
			position: absolute;
			right: 6px;
			content: "\e602";
			font-size: 12px;
			font-style: normal;
			font-family: layui-icon !important;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}



		/** 项目列表样式 */
		.project-list-item {
			background-color: #fff;
			border: 1px solid #e8e8e8;
			border-radius: 4px;
			cursor: pointer;
			transition: all .2s;
		}

		.project-list-item:hover {
			box-shadow: 0 2px 10px rgba(0, 0, 0, .15);
		}

		.project-list-item .project-list-item-cover {
			width: 100%;
			height: 220px;
			display: block;
			border-top-left-radius: 4px;
			border-top-right-radius: 4px;
		}

		.project-list-item-body {
			padding: 20px;
		}

		.project-list-item .project-list-item-body > h2 {
			font-size: 18px;
			color: #333;
			margin-bottom: 12px;
		}

		.project-list-item .project-list-item-text {
			height: 44px;
			overflow: hidden;
			margin-bottom: 12px;
		}

		.project-list-item .project-list-item-desc {
			position: relative;
		}

		.project-list-item .project-list-item-desc .time {
			color: #999;
			font-size: 12px;
		}

		.project-list-item .project-list-item-desc .ew-head-list {
			position: absolute;
			right: 0;
			top: 0;
		}

		.ew-head-list .ew-head-list-item {
			width: 22px;
			height: 22px;
			border-radius: 50%;
			border: 1px solid #fff;
			margin-left: -10px;
		}

		.ew-head-list .ew-head-list-item:first-child {
			margin-left: 0;
		}

		/** // 项目列表样式结束 */

		/** 应用列表样式 */
		.application-list-item {
			background-color: #fff;
			border: 1px solid #e8e8e8;
			border-radius: 4px;
			cursor: pointer;
			transition: all .2s;
		}

		.application-list-item:hover {
			box-shadow: 0 2px 10px rgba(0, 0, 0, .15);
		}

		.application-list-item .application-list-item-header {
			padding: 16px 12px 0 12px;
		}

		.application-list-item .application-list-item-header .head {
			width: 25px;
			height: 25px;
			border-radius: 50%;
			margin-right: 10px;
		}

		.application-list-item .application-list-item-header > h2 {
			color: #333;
			font-size: 18px;
			display: inline-block;
		}

		.application-list-item .application-list-item-body {
			padding: 12px 12px 12px 50px;
			font-size: 0;
		}

		.application-list-item .application-list-item-body .text-num-item {
			display: inline-block;
			width: 50%;
			font-size: 26px;
			color: #666;
		}

		.application-list-item .application-list-item-body .text-num-item .text-num-item-title {
			font-size: 12px;
			color: #999;
			margin-bottom: 10px;
		}

		.application-list-item .application-list-item-body .text-num-item small {
			font-size: 16px;
		}

		.application-list-item .application-list-item-tool {
			font-size: 0;
			background-color: #FAFAFA;
			border-top: 1px solid #e8e8e8;
			padding: 10px 0 5px 0;
			border-bottom-left-radius: 4px;
			border-bottom-right-radius: 4px;
		}

		.application-list-item .application-list-item-tool .application-list-item-tool-item {
			display: inline-block;
			width: 25%;
			font-size: 18px;
			text-align: center;
			color: #999;
			border-right: 1px solid #e8e8e8;
			box-sizing: border-box;
			cursor: pointer;
		}

		.application-list-item .application-list-item-tool .application-list-item-tool-item:last-child {
			border-right: none;
		}

		/** // 应用列表样式结束 */

		/** 文章列表样式 */
		.article-list-item {
			border-bottom: 1px solid #e8e8e8;
			margin-top: 16px;
			position: relative;
		}

		.article-list-item > h2 {
			font-size: 18px;
			color: #333;
			margin-bottom: 12px;
		}

		.article-list-item > .layui-badge-rim {
			position: absolute;
			right: 0;
			top: 0;
		}

		.article-list-item .layui-badge-list .layui-badge {
			padding-top: 0;
			padding-bottom: 0;
		}

		.article-list-item .article-list-item-text {
			margin-bottom: 12px;
		}

		.article-list-item .article-list-item-desc {
			margin-bottom: 12px;
		}

		.article-list-item .article-list-item-desc .head {
			width: 20px;
			height: 20px;
			border-radius: 50%;
		}

		.article-list-item .article-list-item-desc > * {
			vertical-align: middle;
		}

		.article-list-item .article-list-item-tool {
			color: #666;
			margin-bottom: 5px;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item {
			border-right: 1px solid #e8e8e8;
			padding: 0 15px;
			cursor: pointer;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item:first-child {
			padding-left: 0;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item:last-child {
			border-right: none;
			padding-right: 0;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item > * {
			vertical-align: middle;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item.star-active {
			color: #01AAED;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item.star-active .layui-icon-rate:before {
			content: "\e67a";
		}

		/** // 文章列表样式结束 */

		.layui-input-sm {
			height: 30px;
		}
	</style>
</head>
<body>

<!-- 正文开始 -->
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-col-md3">
			<div class="layui-card">
				<div class="layui-card-body" style="padding: 10px;">
					<!-- 表格工具栏1 -->
					<form class="layui-form toolbar">
						<div class="layui-form-item">
							<div class="layui-inline" style="max-width: 140px;">
								<input name="name" class="layui-input" placeholder="输入公众号名称"/>
							</div>
							<div class="layui-inline">
								<button class="layui-btn layui-btn-sm icon-btn" lay-filter="dictTbSearch" lay-submit>
									<i class="layui-icon">&#xe615;</i>搜索
								</button>
							</div>
						</div>
					</form>
					<!-- 数据表格1 -->
					<table id="dictTable" lay-filter="dictTable"></table>
				</div>
			</div>
		</div>

		<div class="layui-col-md9">
			<div class="layui-card">
				<div class="layui-card-body">
					<div class="layui-tab layui-tab-brief">
						<ul class="layui-tab-title">
							<li class="layui-this"><i class="layui-icon layui-icon-star"></i> 关注时回复</li>
							<li><i class="layui-icon layui-icon-chat"></i> 消息回复</li>
							<li><i class="layui-icon layui-icon-file-b"></i> 关键词回复</li>
						</ul>
						<div class="layui-tab-content">
							<div class="layui-tab-item layui-show">
								<table id="dataTable1" lay-filter="dataTable1"></table>
							</div>
							<div class="layui-tab-item">
								<table id="dataTable2" lay-filter="dataTable2"></table>
							</div>
							<div class="layui-tab-item">
								<table id="dataTable3" lay-filter="dataTable3"></table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

	</div>
</div>


<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<!-- 表格操作列 -->
<script type="text/html" id="dictDataTbBar">
	<a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="edit">修改</a>
	<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

<script type="text/javascript" th:inline="javascript">
	var ctx = [[@{/}]];
	var wechat_msg_type = [[${@dict.getType('wechat_msg_type')}]];
	var wechat_msg_rep_type = [[${@dict.getType('wechat_msg_rep_type')}]];
	var wechat_msg_rep_event = [[${@dict.getType('wechat_msg_rep_event')}]];
	var wechat_msg_read_flag = [[${@dict.getType('wechat_msg_read_flag')}]];
</script>
<script type="text/javascript" th:inline="none">
	layui.use(['index', 'dataGrid', 'element', 'dropdown', 'layer', 'form', 'table', 'util', 'laydate', 'ext'], function () {
		var $ = layui.jquery;
		var layer = layui.layer;
		var form = layui.form;
		var table = layui.table;
		var util = layui.util;
		var laydate = layui.laydate;
		var ext = layui.ext;
		var admin = layui.admin;
		var index = layui.index;

		var prefix = ctx + "wechat/autoreply";
		var url = prefix + "/list";
		var createUrl = prefix + "/add";
		var updateUrl = prefix + "/edit/{id}";
		var removeUrl = prefix + "/remove";
		var exportUrl = prefix + "/export";
		var appid = null;

		//公众号列表
		table.render({
			elem: '#dictTable'
			,url: ctx + "wechat/account/list"
			,method: 'POST'
			,toolbar: ['<p>',
				'<button ew-href="/wechat/account/list" ew-title="公众号列表" class="layui-btn layui-btn-sm icon-btn"><i class="layui-icon">&#xe62a;</i> 管理</button>&nbsp;',
				'<button lay-event="refresh" class="layui-btn layui-btn-sm icon-btn"><i class="layui-icon">&#xe669;</i> 刷新</button>&nbsp;',
				'</p>'].join('')
			,defaultToolbar: []
			,height: 'full-100'
			,cellMinWidth: 80
			//,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			//,limit: 10
			,cols: [[
				{type: 'numbers'}
				,{field: 'name', title: '公众号名称'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		/* 表格搜索 */
		form.on('submit(dictTbSearch)', function (data) {
			table.reload('dictTable', {where: data.field});
			return false;
		});

		/* 监听行单击事件 */
		table.on('row(dictTable)', function (obj) {
			//selObj = obj;
			obj.tr.addClass('layui-table-click').siblings().removeClass('layui-table-click');
			table.reload('dataTable', {where: {}});
			appid = obj.data.appid;
		});

		/* 监听表格头部工具栏 */
		table.on('toolbar(dictTable)', function(obj) {
			switch(obj.event) {
				case 'refresh':
					table.reload('dictTable');
					break;
			}
		})


		//关注时回复
		table.render({
			elem: '#dataTable1'
			,url: ctx + "wechat/autoreply/data"
			,method: 'POST'
			,where: {type: 1}
			,height: 'full-132'
			,cellMinWidth: 80
			,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			,limit: 10
			,cols: [[
				{field: 'repType', title: '回复消息类型', templet:function(res){
						return $.table.selectDictLabel(wechat_msg_rep_type, res.repType);
				}}
				,{field: 'operate', title: '操作', toolbar: '#dictDataTbBar', width: 150, fixed: 'right'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		//消息回复
		table.render({
			elem: '#dataTable2'
			,url: ctx + "wechat/autoreply/data"
			,method: 'POST'
			,toolbar: ['<p>',
				'<button lay-event="add" class="layui-btn layui-btn-sm icon-btn"><i class="layui-icon">&#xe654;</i>添加</button>&nbsp;',
				'</p>'].join('')
			,where: {type: 2}
			,height: 'full-132'
			,cellMinWidth: 80
			,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			,limit: 10
			,cols: [[
				{type: 'numbers'}
				,{field: 'reqType', title: '请求消息类型'}
				,{field: 'repType', title: '回复消息类型'}
				,{field: 'operate', title: '操作', toolbar: '#dictDataTbBar', width: 150, fixed: 'right'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		//关键词回复
		table.render({
			elem: '#dataTable3'
			,url: ctx + "wechat/autoreply/data"
			,method: 'POST'
			,toolbar: ['<p>',
				'<button lay-event="add" class="layui-btn layui-btn-sm icon-btn"><i class="layui-icon">&#xe654;</i>添加</button>&nbsp;',
				'</p>'].join('')
			,where: {type: 3}
			,height: 'full-132'
			,cellMinWidth: 80
			,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			,limit: 10
			,cols: [[
				{type: 'numbers'}
				,{field: 'reqKey', title: '关键词'}
				,{field: 'repMate', title: '匹配类型'}
				,{field: 'repType', title: '回复消息类型'}
				,{field: 'operate', title: '操作', toolbar: '#dictDataTbBar', width: 150, fixed: 'right'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		//头工具栏事件
		table.on('toolbar(dataTable)', function(obj){
			switch(obj.event){
				case 'add':
					active.add();
					break;
				case 'edit':
					var checkStatus = table.checkStatus('dataTable')
							, checkData = checkStatus.data; //得到选中的数据
					var id = null;
					if (id == null) {
						if (checkData.length === 0) {
							return admin.info('请选择一条数据');
						} else if (checkData.length > 1) {
							return admin.info('只能选择一条数据编辑');
						} else {
							id = checkData[0].id;
						}
					}
					active.edit(id);
					break;
			};
		});

		//行工具栏事件
		table.on('tool(dataTable)', function (obj) {
			var data = obj.data;
			if (obj.event === 'view') {
				active.view(data.id);
			} else if (obj.event === 'edit') {
				active.edit(data.id);
			} else if (obj.event === 'del') {
				active.del(data.id);
			}
		});

		//事件
		var active = {
			view: function (id) {
				var viewUrl = updateUrl.replace("{id}", id);
				admin.openDialog('查看公众号', viewUrl, '800px', '480px');
			}
			,add: function () {
				admin.openDialog('新增公众号', createUrl, '800px', '480px');
			}
			,edit: function (id) {
				var editUrl = updateUrl.replace("{id}", id);
				admin.openDialog('编辑公众号', editUrl, '800px', '480px');
			}
			,del: function(id){
				admin.confirm('确定删除吗?',function(){
					admin.req(removeUrl, {ids: id}, function (data) {
						if (data.code == 0) {
							table.reload('dataTable');
							admin.success('删除成功!');
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
		}
	});
</script>
</body>

</html>
