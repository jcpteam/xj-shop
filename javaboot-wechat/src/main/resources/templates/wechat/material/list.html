<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>素材管理</title>
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css}"/>
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->
	<style>
		/* 左树 */
		#organizationTree {
			height: -webkit-calc(100vh - 96px);
			height: -moz-calc(100vh - 96px);
			height: calc(100vh - 96px);
		}

		#dictTable + .layui-table-view .layui-table-tool-temp {
			padding-right: 0;
		}

		#dictTable + .layui-table-view .layui-table-body tbody > tr td {
			cursor: pointer;
		}

		#dictTable + .layui-table-view .layui-table-body tbody > tr.layui-table-click {
			background-color: #fff3e0;
		}

		#dictTable + .layui-table-view .layui-table-body tbody > tr.layui-table-click td:last-child > div:before {
			position: absolute;
			right: 6px;
			content: "\e602";
			font-size: 12px;
			font-style: normal;
			font-family: layui-icon !important;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}



		/** 项目列表样式 */
		.project-list-item {
			background-color: #fff;
			border: 1px solid #e8e8e8;
			border-radius: 4px;
			cursor: pointer;
			transition: all .2s;
		}

		.project-list-item:hover {
			box-shadow: 0 2px 10px rgba(0, 0, 0, .15);
		}

		.project-list-item .project-list-item-cover {
			width: 100%;
			height: 120px;
			display: block;
			border-top-left-radius: 4px;
			border-top-right-radius: 4px;
		}

		.project-list-item-body {
			padding: 20px;
		}

		.project-list-item .project-list-item-body > h2 {
			font-size: 18px;
			color: #333;
			margin-bottom: 12px;
		}

		.project-list-item .project-list-item-text {
			height: 44px;
			overflow: hidden;
			margin-bottom: 12px;
		}

		.project-list-item .project-list-item-desc {
			position: relative;
		}

		.project-list-item .project-list-item-desc .time {
			color: #999;
			font-size: 12px;
		}

		.project-list-item .project-list-item-desc .ew-head-list {
			position: absolute;
			right: 0;
			top: 0;
		}

		.ew-head-list .ew-head-list-item {
			width: 22px;
			height: 22px;
			border-radius: 50%;
			border: 1px solid #fff;
			margin-left: -10px;
		}

		.ew-head-list .ew-head-list-item:first-child {
			margin-left: 0;
		}

		/** // 项目列表样式结束 */

		/** 应用列表样式 */
		.application-list-item {
			background-color: #fff;
			border: 1px solid #e8e8e8;
			border-radius: 4px;
			cursor: pointer;
			transition: all .2s;
		}

		.application-list-item:hover {
			box-shadow: 0 2px 10px rgba(0, 0, 0, .15);
		}

		.application-list-item .application-list-item-header {
			padding: 16px 12px 0 12px;
		}

		.application-list-item .application-list-item-header .head {
			width: 25px;
			height: 25px;
			border-radius: 50%;
			margin-right: 10px;
		}

		.application-list-item .application-list-item-header > h2 {
			color: #333;
			font-size: 18px;
			display: inline-block;
		}

		.application-list-item .application-list-item-body {
			padding: 12px 12px 12px 50px;
			font-size: 0;
		}

		.application-list-item .application-list-item-body .text-num-item {
			display: inline-block;
			width: 50%;
			font-size: 26px;
			color: #666;
		}

		.application-list-item .application-list-item-body .text-num-item .text-num-item-title {
			font-size: 12px;
			color: #999;
			margin-bottom: 10px;
		}

		.application-list-item .application-list-item-body .text-num-item small {
			font-size: 16px;
		}

		.application-list-item .application-list-item-tool {
			font-size: 0;
			background-color: #FAFAFA;
			border-top: 1px solid #e8e8e8;
			padding: 10px 0 5px 0;
			border-bottom-left-radius: 4px;
			border-bottom-right-radius: 4px;
		}

		.application-list-item .application-list-item-tool .application-list-item-tool-item {
			display: inline-block;
			width: 25%;
			font-size: 18px;
			text-align: center;
			color: #999;
			border-right: 1px solid #e8e8e8;
			box-sizing: border-box;
			cursor: pointer;
		}

		.application-list-item .application-list-item-tool .application-list-item-tool-item:last-child {
			border-right: none;
		}

		/** // 应用列表样式结束 */

		/** 文章列表样式 */
		.article-list-item {
			border-bottom: 1px solid #e8e8e8;
			margin-top: 16px;
			position: relative;
		}

		.article-list-item > h2 {
			font-size: 18px;
			color: #333;
			margin-bottom: 12px;
		}

		.article-list-item > .layui-badge-rim {
			position: absolute;
			right: 0;
			top: 0;
		}

		.article-list-item .layui-badge-list .layui-badge {
			padding-top: 0;
			padding-bottom: 0;
		}

		.article-list-item .article-list-item-text {
			margin-bottom: 12px;
		}

		.article-list-item .article-list-item-desc {
			margin-bottom: 12px;
		}

		.article-list-item .article-list-item-desc .head {
			width: 20px;
			height: 20px;
			border-radius: 50%;
		}

		.article-list-item .article-list-item-desc > * {
			vertical-align: middle;
		}

		.article-list-item .article-list-item-tool {
			color: #666;
			margin-bottom: 5px;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item {
			border-right: 1px solid #e8e8e8;
			padding: 0 15px;
			cursor: pointer;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item:first-child {
			padding-left: 0;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item:last-child {
			border-right: none;
			padding-right: 0;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item > * {
			vertical-align: middle;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item.star-active {
			color: #01AAED;
		}

		.article-list-item .article-list-item-tool .article-list-item-tool-item.star-active .layui-icon-rate:before {
			content: "\e67a";
		}

		/** // 文章列表样式结束 */

	</style>
</head>

<!-- 正文开始 -->
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-col-md3">
			<div class="layui-card">
				<div class="layui-card-body" style="padding: 10px;">
					<!-- 表格工具栏1 -->
					<form class="layui-form toolbar">
						<div class="layui-form-item">
							<div class="layui-inline" style="max-width: 140px;">
								<input name="name" class="layui-input" placeholder="输入公众号名称"/>
							</div>
							<div class="layui-inline">
								<button class="layui-btn layui-btn-sm icon-btn" lay-filter="dictTbSearch" lay-submit>
									<i class="layui-icon">&#xe615;</i>搜索
								</button>
							</div>
						</div>
					</form>
					<!-- 数据表格1 -->
					<input id="appid" type="hidden" />
					<table id="dictTable" lay-filter="dictTable"></table>
				</div>
			</div>
		</div>

		<div class="layui-col-md9">
			<div class="layui-card">
				<div class="layui-card-body">
					<div class="layui-tab layui-tab-brief" lay-filter="materialTab">
						<ul class="layui-tab-title">
							<li class="layui-this"><i class="layui-icon layui-icon-picture"></i> 图片</li>
							<li><i class="layui-icon layui-icon-mike"></i> 语音</li>
							<li><i class="layui-icon layui-icon-video"></i> 视频</li>
							<li><i class="layui-icon layui-icon-list"></i> 图文</li>
						</ul>
						<div class="layui-tab-content">
							<div class="layui-tab-item layui-show">
								<button type="button" class="layui-btn" id="imgBtn">
									<i class="layui-icon">&#xe67c;</i>上传图片
								</button>
								<span>支持bmp/png/jpeg/jpg/gif格式，大小不超过2M</span>
								<div class="layui-row layui-col-space30" id="demoCardList1" style="padding-top: 5px;"></div>
							</div>
							<div class="layui-tab-item">
								<button type="button" class="layui-btn" id="voiceBtn">
									<i class="layui-icon">&#xe67c;</i>上传语音
								</button>
								<span>播放长度不超过60s，mp3/wma/wav/amr格式，大小不超过2M</span>
								<table id="voiceTable" lay-filter="voiceTable"></table>
							</div>
							<div class="layui-tab-item">
								<button type="button" class="layui-btn" id="videoBtn">
									<i class="layui-icon">&#xe67c;</i>上传视频
								</button>
								<span>支持mp4格式，大小不超过10M</span>
								<table id="videoTable" lay-filter="videoTable"></table>
							</div>
							<div class="layui-tab-item">
								<button type="button" class="layui-btn" id="newsBtn">
									<i class="layui-icon">&#xe67c;</i>添加图文
								</button>
								<div class="layui-row layui-col-space30" id="demoCardList4" style="padding-top: 5px;"></div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

	</div>
</div>

<script type="text/javascript" th:inline="javascript">
	var ctx = [[@{/}]];
	var datas = [[${@dict.getType('wechat_type')}]];
</script>
<script type="text/javascript" th:inline="none">
	layui.use(['index', 'upload', 'dataGrid', 'element', 'dropdown', 'layer', 'form', 'table', 'util', 'laydate', 'ext'], function () {
		var $ = layui.jquery;
		var layer = layui.layer;
		var form = layui.form;
		var table = layui.table;
		var util = layui.util;
		var laydate = layui.laydate;
		var ext = layui.ext;
		var admin = layui.admin;
		var index = layui.index;

		var prefix = ctx + "wechat/msg";
		var url = prefix + "/list";
		var createUrl = prefix + "/add";
		var updateUrl = prefix + "/edit/{id}";
		var removeUrl = prefix + "/remove";
		var exportUrl = prefix + "/export";
		var syncUrl = prefix + "/sync";
		var appid = '';

		//公众号列表
		table.render({
			elem: '#dictTable'
			,url: ctx + "wechat/account/list"
			,method: 'POST'
			,toolbar: ['<p>',
				'<button ew-href="/wechat/account/list" ew-title="公众号列表" class="layui-btn layui-btn-sm icon-btn"><i class="layui-icon">&#xe62a;</i>管理</button>&nbsp;',
				'<button lay-event="refresh" class="layui-btn layui-btn-sm icon-btn"><i class="layui-icon">&#xe669;</i>刷新</button>&nbsp;',
				'</p>'].join('')
			,defaultToolbar: []
			,height: 'full-100'
			,cellMinWidth: 80
			//,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			//,limit: 10
			,cols: [[
				{type: 'numbers'}
				,{field: 'name', title: '公众号名称'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
			,done: function(res, curr, count){
				console.log('done:' + JSON.stringify(res));
				if(res.data.length > 0){
					$('#appid').val(res.data[0].appid);
					console.log('done:appid:' + JSON.stringify(res.data[0].appid));
				}
			}
		});

		/* 表格搜索 */
		form.on('submit(dictTbSearch)', function (data) {
			table.reload('dictTable', {where: data.field});
			return false;
		});

		/* 监听行单击事件 */
		table.on('row(dictTable)', function (obj) {
			obj.tr.addClass('layui-table-click').siblings().removeClass('layui-table-click');
			$('#appid').val(obj.data.appid);
			//console.log('row:appid:' + $('#appid').val());
		});

		/* 监听表格头部工具栏 */
		table.on('toolbar(dictTable)', function(obj) {
			switch (obj.event) {
				case 'refresh':
					table.reload('dictTable');
					break;
			}
		});

		var upload = layui.upload;
		var element = layui.element;

		//上传图片
		var uploadInst = upload.render({
			elem: '#imgBtn' //绑定元素
			,url: '/wechat/material/uploadImg' //上传接口
			,data: {
				appid: function(){return $('#appid').val();}
			}
			,accept: 'image'
			,acceptMime: 'image/bmp,image/png,image/jpeg,image/jpg,image/gif'
			,before: function(obj){ //obj参数包含的信息，跟 choose回调完全一致，可参见上文。
				layer.load(); //上传loading
			}
			,done: function(res){
				//上传完毕回调
				layer.closeAll('loading'); //关闭loading
				admin.success("图片上传成功");
				ins0.reload();
			}
			,error: function(){
				//请求异常回调
			}
		});

		//上传语音
		var uploadInst = upload.render({
			elem: '#voiceBtn' //绑定元素
			,url: '/wechat/material/addMaterial' //上传接口
			,data: {
				appid: function(){return $('#appid').val();}
				, type: 'voice'
			}
			,accept: 'audio'
			,acceptMime: 'audio/mp3,audio/wma,audio/wav,audio/amr'
			,before: function(obj){ //obj参数包含的信息，跟 choose回调完全一致，可参见上文。
				layer.load(); //上传loading
			}
			,done: function(res){
				//上传完毕回调
				layer.closeAll('loading'); //关闭loading
				admin.success("语音上传成功");
				table.reload('voiceTable');
			}
			,error: function(){
				//请求异常回调
			}
		});

		//上传视频
		var uploadInst = upload.render({
			elem: '#videoBtn' //绑定元素
			,url: '/wechat/material/addMaterial' //上传接口
			,data: {
				appid: function(){return $('#appid').val();}
				, type: 'video'
			}
			,accept: 'video'
			,acceptMime: 'video/mp4'
			,before: function(obj){ //obj参数包含的信息，跟 choose回调完全一致，可参见上文。
				layer.load(); //上传loading
			}
			,done: function(res){
				//上传完毕回调
				layer.closeAll('loading'); //关闭loading
				admin.success("视频上传成功");
				table.reload('videoTable');
			}
			,error: function(){
				//请求异常回调
			}
		});

		var dataGrid = layui.dataGrid;

		/** 图片 */
		var ins0 = dataGrid.render({
			elem: '#demoCardList1',//容器
			templet: '#demoCardItem1',//模板
			url: '/wechat/material/listImg?appid=wx64d2696ffe2c4e1a',//数据接口
			parseData: function(res) {
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			},
			request: {pageName: 'pageNum', limitName: 'pageSize'},
			page: {limit: 18, limits: [18]}//开启分页
		});

		dataGrid.on('item(demoCardList1)', function (obj) {
