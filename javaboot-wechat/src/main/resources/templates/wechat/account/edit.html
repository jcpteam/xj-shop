<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8">
    <title>编辑公众号</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false" th:action="@{/wechat/account/edit}" th:object="${account}">
    <div class="layui-card">
        <div class="layui-card-body">
            <div class="layui-row">
                <input id="id" name="id" th:field="*{id}" type="hidden" />
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">公众号名:</label>
                    <div class="layui-input-block">
                        <input name="name" th:field="*{name}" type="text" placeholder="请输入公众号名" class="layui-input" lay-verType="tips" lay-verify="required" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">账号类型:</label>
                    <div class="layui-input-block" th:with="type=${@dict.getType('wechat_account_type')}">
                        <input th:each="dict,dictStat:${type}" type="radio" name="type" th:title="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{type}" th:attr="checked=${dictStat.index==0?true:false}">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">AppId:</label>
                    <div class="layui-input-block">
                        <input name="appid" th:field="*{appid}" type="text" placeholder="请输入AppId" class="layui-input" lay-verType="tips" lay-verify="required" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">Secret:</label>
                    <div class="layui-input-block">
                        <input name="secret" th:field="*{secret}" type="text" placeholder="请输入Secret" class="layui-input" lay-verType="tips" lay-verify="required" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">Token:</label>
                    <div class="layui-input-block">
                        <input name="token" th:field="*{token}" type="text" placeholder="请输入Token" class="layui-input" lay-verType="tips" lay-verify="required" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">AesKey:</label>
                    <div class="layui-input-block">
                        <input name="aeskey" th:field="*{aeskey}" type="text" placeholder="请输入AesKey" class="layui-input" lay-verType="tips"/>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-form-item layui-hide">
        <button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
        <button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
    </div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script th:inline="none">
    layui.use(['index', 'form', 'table', 'ext'], function(){
        var $ = layui.$;
        var form = layui.form;
        var layer = layui.layer;
        var table = layui.table;
        var admin = layui.admin;

    })
</script>
</body>
</html>
