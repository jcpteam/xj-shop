<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8">
    <title>部门领导审批</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form" id="inputForm" th:onsubmit="return false" th:action="@{/leave/complete/{taskId}(taskId=${taskId})}" th:object="${bizLeave}">
    <div class="layui-card">
        <div class="layui-card-body">
            <div class="layui-row">
                <input name="id" th:field="*{id}" type="hidden">
                <input name="taskId" th:field="*{taskId}" type="hidden">
                <input type="hidden" name="p_COM_comment" />

                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">申请人:</label>
                    <div class="layui-input-block">
                        <input name="applyUserName" th:field="*{applyUserName}" type="text" class="layui-input layui-disabled" lay-verType="tips" lay-verify="required" readonly/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">申请时间:</label>
                    <div class="layui-input-block">
                        <input name="applyTime" th:value="${#dates.format(bizLeave.applyTime, 'yyyy-MM-dd HH:mm:ss')}" type="text" class="layui-input layui-disabled" lay-verType="tips" lay-verify="required" readonly/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">请假类型:</label>
                    <div class="layui-input-block">
                        <select name="type" th:with="type=${@dict.getType('biz_leave_type')}">
                            <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                        </select>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">标题:</label>
                    <div class="layui-input-block">
                        <input name="title" th:field="*{title}" type="text" placeholder="请输入标题" class="layui-input" lay-verType="tips" lay-verify="required" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">原因:</label>
                    <div class="layui-input-block">
                        <textarea name="reason" maxlength="500" class="layui-textarea" rows="3" placeholder="请输入原因">[[*{reason}]]</textarea>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">请假时间:</label>
                    <div class="layui-input-block">
                        <input id="createTime" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
                        <input id="beginDate" type="hidden" name="startTime" th:field="*{startTime}" />
                        <input id="endDate" type="hidden" name="endTime" th:field="*{endTime}" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">请假时长:</label>
                    <div class="layui-input-block">
                        <input name="totalTime" class="layui-input" type="text" style="display: none;">
                        <input name="totalTimeText" class="layui-input" type="text" readonly>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">审批意见:</label>
                    <div class="layui-input-block">
                        <select name="p_B_deptLeaderApproved" id="deptLeaderApproved" lay-filter="approved">
                            <option value="true">同意</option>
                            <option value="false">拒绝</option>
                        </select>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">批注:</label>
                    <div class="layui-input-block">
                        <textarea  id="comment" name="comment" maxlength="500" class="layui-textarea" rows="3" placeholder="请输入批注"></textarea>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="layui-form-item layui-hide">
        <button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
        <button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
    </div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
    var ctx = [[@{/}]];
    var startTime = [[${#dates.format(bizLeave.startTime, 'yyyy-MM-dd HH:mm:ss')}]];
    var endTime = [[${#dates.format(bizLeave.endTime, 'yyyy-MM-dd HH:mm:ss')}]];
</script>
<script th:inline="none">
    layui.use(['index', 'form', 'table', 'laydate', 'ext'], function(){
        var $ = layui.$;
        var form = layui.form;
        var layer = layui.layer;
        var table = layui.table;
        var admin = layui.admin;
        var laydate = layui.laydate;

        //日期范围
        laydate.render({
            elem: '#createTime'
            , type: 'datetime'
            , value: startTime + ' ~ ' + endTime
            , trigger: 'click'
            , range: '~'
            , done: function (value, date, endDate) {
                console.log(value); //得到日期生成的值，如：2017-08-18
                console.log(date); //得到日期时间对象：{year: 2017, month: 8, date: 18, hours: 0, minutes: 0, seconds: 0}
                console.log(endDate); //得结束的日期时间对象，开启范围选择（range: true）才会返回。对象成员同上。
                if (value != null && value != '') {
                    var b = $.trim(value.split('~')[0]);
                    var e = $.trim(value.split('~')[1]);
                    console.log(b);
                    console.log(e);
                    $("#beginDate").val(b);
                    $("#endDate").val(e);

                    var totalSecond = $.common.calcTotalSecond(b, e);
                    $('input[name="totalTime"]').val(totalSecond);
                    var dateSub = $.common.formatTotalDateSub(totalSecond);
                    $('input[name="totalTimeText"]').val(dateSub);
                }
            }
        });

        $(function(){
            var b = $('#beginDate').val();
            var e = $('#endDate').val();
            var totalSecond = $.common.calcTotalSecond(b, e);
            $('input[name="totalTime"]').val(totalSecond);
            var dateSub = $.common.formatTotalDateSub(totalSecond);
            $('input[name="totalTimeText"]').val(dateSub);
        })

        //监听textarea输入
        $('#comment').bind('input propertychange','textarea',function(){
            $('input[name="p_COM_comment"]').val($(this).val());
        })

    })
</script>
</body>
</html>
