<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>已办事项列表</title>
    <link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css}"/>
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <style>
        #inputForm .layui-form-label {
            width: 100px;  /* 这里修改标题宽度 */
        }

        #inputForm .layui-input-block {
            margin-left: 130px;  /* 这里要比上面始终大30px */
        }
    </style>
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card">
            <!-- 搜索区 -->
            <form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">事项标题：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="itemName" type="text" placeholder="请输入事项标题"/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">模块名称：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="module" type="text" placeholder="请输入模块名称"/>
                        </div>
                    </div>
<!--                    <div class="layui-inline">-->
<!--                        <label class="layui-form-label label-auto">任务 ID：</label>-->
<!--                        <div class="layui-input-inline">-->
<!--                            <input class="layui-input" name="taskId" type="text" placeholder="请输入任务 ID"/>-->
<!--                        </div>-->
<!--                    </div>-->
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">任务名称：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="taskName" type="text" placeholder="请输入任务名称"/>
                        </div>
                    </div>
<!--                    <div class="layui-inline form-search-show-expand">-->
<!--                        <label class="layui-form-label label-auto">待办人ID：</label>-->
<!--                        <div class="layui-input-inline">-->
<!--                            <input class="layui-input" name="todoUserId" type="text" placeholder="请输入待办人ID"/>-->
<!--                        </div>-->
<!--                    </div>-->
                    <div class="layui-inline form-search-show-expand">
                        <label class="layui-form-label label-auto">待办人名称：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="todoUserName" type="text" placeholder="请输入待办人名称"/>
                        </div>
                    </div>
<!--                    <div class="layui-inline form-search-show-expand">-->
<!--                        <label class="layui-form-label label-auto">处理人ID：</label>-->
<!--                        <div class="layui-input-inline">-->
<!--                            <input class="layui-input" name="handleUserId" type="text" placeholder="请输入处理人ID"/>-->
<!--                        </div>-->
<!--                    </div>-->
                    <div class="layui-inline form-search-show-expand">
                        <label class="layui-form-label label-auto">处理人名称：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="handleUserName" type="text" placeholder="请输入处理人名称"/>
                        </div>
                    </div>
                    <div class="layui-inline form-search-show-expand">
                        <label class="layui-form-label label-auto">通知时间：</label>
                        <div class="layui-input-inline">
                            <input id="createTime" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
                            <input id="beginDate" type="hidden" name="params[todoItemStartTime]">
                            <input id="endDate" type="hidden" name="params[todoItemEndTime]">
                        </div>
                    </div>
                    <div class="layui-inline form-search-show-expand">
                        <label class="layui-form-label label-auto">处理时间：</label>
                        <div class="layui-input-inline">
                            <input id="createTime2" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
                            <input id="beginDate2" type="hidden" name="params[handleStartTime]">
                            <input id="endDate2" type="hidden" name="params[handleEndTime]">
                        </div>
                    </div>
                    <div class="layui-inline" style="padding-left: 13px;">
                        <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
                            <i class="layui-icon layui-icon-search"></i>搜索
                        </button>
                        <button class="layui-btn layui-btn-sm icon-btn" type="reset">
                            <i class="layui-icon layui-icon-refresh"></i>重置
                        </button>
                        <a class="layui-btn layui-btn-primary form-search-expand" data-expand="true">
                            展开 <i class="layui-icon layui-icon-down"></i>
                        </a>
                    </div>
                </div>
            </form>

            <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>

        </div>

    </div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="export" ><i class="layui-icon layui-icon-export"></i>导出</button>
    </div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
    <a class="layui-btn layui-btn-xs" lay-event="showFormDialog" >申请详情</a>
    <a class="layui-btn layui-btn-xs" lay-event="showHistoryDialog" >审批历史</a>
    <a class="layui-btn layui-btn-xs" lay-event="showProcessImgDialog" >进度查看</a>
</script>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script type="text/javascript" th:inline="javascript">
    var ctx = [[@{/}]];
    var datas = [[${@dict.getType('biz_leave_type')}]];
    var currentUser = [[${currentUser}]];
</script>
<script type="text/javascript" th:inline="none">
    layui.use(['index', 'layer', 'form', 'table', 'util', 'laydate', 'ext'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var util = layui.util;
        var laydate = layui.laydate;
        var ext = layui.ext;
        var admin = layui.admin;
        var index = layui.index;

        var prefix = ctx + "todoitem";
        var url = prefix + "/doneList";
        var createUrl = prefix + "/add";
        var updateUrl = prefix + "/edit/{id}";
        var detailUrl = prefix + "/edit/{id}";
        var removeUrl = prefix + "/remove";
        var exportUrl = prefix + "/doneExport";

        table.render({
            elem: '#dataTable'
            ,url: url
            ,method: 'POST'
            ,toolbar: '#toolbarHead'
            ,height: 'full-100'
            ,cellMinWidth: 80
            ,page: true
            ,request: {
                pageName: 'pageNum' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            ,limit: 10
            ,cols: [[
                {type: 'checkbox'}
                ,{field: 'itemName', title: '事项标题', width: 200}
                ,{field: 'itemContent', title: '事项内容', width: 200}
                ,{field: 'module', title: '模块名称', width: 200}
                ,{field: 'taskId', title: '任务 ID', width: 200}
                ,{field: 'taskName', title: '任务名称', width: 100}
                ,{field: 'isView', title: '是否查看', width: 100}
                ,{field: 'isHandle', title: '是否处理', width: 100}
                ,{field: 'todoUserId', title: '待办人ID', width: 100}
                ,{field: 'todoUserName', title: '待办人名称', width: 200}
                ,{field: 'handleUserId', title: '处理人ID', width: 200}
                ,{field: 'handleUserName', title: '处理人名称', width: 200}
                ,{field: 'todoTime', title: '通知时间', width: 200}
                ,{field: 'handleTime', title: '处理时间', width: 200}
                ,{field: 'nodeName', title: '待办任务名称', width: 200}
                ,{field: 'operate', title: '操作', width: 300, toolbar: '#toolbarRow', fixed: 'right'}
            ]]
            ,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
                return {
                    "code": res.code, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "count": res.total, //解析数据长度
                    "data": res.rows //解析数据列表
                };
            }
        });

        //日期范围
        laydate.render({
            elem: '#createTime'
            , range: '~'
            , done: function (value, date, endDate) {
                console.log(value); //得到日期生成的值，如：2017-08-18
                console.log(date); //得到日期时间对象：{year: 2017, month: 8, date: 18, hours: 0, minutes: 0, seconds: 0}
                console.log(endDate); //得结束的日期时间对象，开启范围选择（range: true）才会返回。对象成员同上。
                if (value != null && value != '') {
                    var b = $.trim(value.split('~')[0]);
                    var e = $.trim(value.split('~')[1]);
                    console.log(b);
                    console.log(e);
                    $("#beginDate").val(b);
                    $("#endDate").val(e);
                }
            }
        });

        laydate.render({
            elem: '#createTime2'
            , range: '~'
            , done: function (value, date, endDate) {
                console.log(value); //得到日期生成的值，如：2017-08-18
                console.log(date); //得到日期时间对象：{year: 2017, month: 8, date: 18, hours: 0, minutes: 0, seconds: 0}
                console.log(endDate); //得结束的日期时间对象，开启范围选择（range: true）才会返回。对象成员同上。
                if (value != null && value != '') {
                    var b = $.trim(value.split('~')[0]);
                    var e = $.trim(value.split('~')[1]);
                    console.log(b);
                    console.log(e);
                    $("#beginDate2").val(b);
                    $("#endDate2").val(e);
                }
            }
        });


        //监听搜索
        form.on('submit(searchBtn)', function (data) {
            var field = data.field;
            console.log(JSON.stringify(field));
            //执行重载
            table.reload('dataTable', {
                where: field
            });
        });

        //头工具栏事件
        table.on('toolbar(dataTable)', function(obj){
            switch(obj.event){
                case 'export':
                    $.modal.loading("正在导出数据，请稍后...");
                    $.post(exportUrl, $("#inputForm").serializeArray(), function(result) {
                        if (result.code == web_status.SUCCESS) {
                            window.location.href = ctx + "common/download?fileName=" + encodeURI(result.msg) + "&delete=" + true;
                        } else if (result.code == web_status.WARNING) {
                            $.modal.alertWarning(result.msg)
                        } else {
                            $.modal.alertError(result.msg);
                        }
                        $.modal.closeLoading();
                    });
                    break;
            };
        });

        //行工具栏事件
        table.on('tool(dataTable)', function (obj) {
            var data = obj.data;
            if (obj.event === 'showFormDialog') {
                active.showFormDialog(data.instanceId, data.module);
            } else if (obj.event === 'showHistoryDialog') {
                active.showHistoryDialog(data.instanceId);
            } else if(obj.event === 'showProcessImgDialog'){
                active.showProcessImgDialog(data.instanceId);
            }
        });

        //事件
        var active = {
            showFormDialog: function(instanceId, module){
                var url = ctx + module + "/showFormDialog/" + instanceId;
                admin.openDialogView('申请详情', url, '800px', '500px');
            },
            showHistoryDialog: function(instanceId){
                var url = ctx + 'process/historyList/' + instanceId;
                admin.openDialogView('审批历史', url, '900px', '500px');
            },
            showProcessImgDialog: function(instanceId){
                var url = ctx + 'process/processImg/' + instanceId;
                admin.openDialogView('流程图', url, '800px', '500px');

            }
        }
    });
</script>
</body>

</html>
