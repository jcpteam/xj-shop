<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>请假申请列表</title>
    <link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css}"/>
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card">
            <!-- 搜索区 -->
            <form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
                <div class="layui-form-item">
<!--                    <div class="layui-inline">-->
<!--                        <label class="layui-form-label label-auto">请假类型：</label>-->
<!--                        <div class="layui-input-inline">-->
<!--                            <select name="type" th:with="type=${@dict.getType('biz_leave_type')}">-->
<!--                                <option value="">所有</option>-->
<!--                                <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>-->
<!--                            </select>-->
<!--                        </div>-->
<!--                    </div>-->
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">标题：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="title" type="text" placeholder="请输入标题"/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">请假时间：</label>
                        <div class="layui-input-inline">
                            <input id="createTime" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
                            <input id="beginDate" type="hidden" name="params[beginTime]">
                            <input id="endDate" type="hidden" name="params[endTime]">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto ">流程实例：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="instanceId" type="text" placeholder="请输入流程实例ID"/>
                        </div>
                    </div>
                    <div class="layui-inline" style="padding-left: 13px;">
                        <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
                            <i class="layui-icon layui-icon-search"></i>搜索
                        </button>
                        <button class="layui-btn layui-btn-sm icon-btn" type="reset">
                            <i class="layui-icon layui-icon-refresh"></i>重置
                        </button>
                    </div>
                </div>
            </form>

            <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>

        </div>

    </div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add" ><i class="layui-icon layui-icon-addition"></i>添加</button>
    </div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
    {{# if(d.instanceId){ }}
    <a class="layui-btn layui-btn-xs" lay-event="detail" >表单数据</a>
    <a class="layui-btn layui-btn-xs" lay-event="showHistoryDialog" >审批历史</a>
    <a class="layui-btn layui-btn-xs" lay-event="showProcessImgDialog" >进度查看</a>

    {{# if(d.taskName.indexOf('已结束') === -1){ }}
    <a class="layui-btn layui-btn-xs" lay-event="cancelApply" >撤销</a>
    <a class="layui-btn layui-btn-xs" lay-event="suspendOrActiveApply" >{{d.suspendState === '2' ? '激活' : '挂起'}}</a>
    {{# } }}

    {{# }else{ }}
    <a class="layui-btn layui-btn-xs" lay-event="showSelectVerifyUserDialog" >提交申请</a>
    <a class="layui-btn layui-btn-xs" lay-event="edit" >编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del" >删除</a>
    {{# } }}
</script>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script type="text/javascript" th:inline="javascript">
    var ctx = [[@{/}]];
    var datas = [[${@dict.getType('biz_leave_type')}]];
    var currentUser = [[${currentUser}]];
</script>
<script type="text/javascript" th:inline="none">
    layui.use(['index', 'layer', 'form', 'table', 'util', 'laydate', 'ext'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var util = layui.util;
        var laydate = layui.laydate;
        var ext = layui.ext;
        var admin = layui.admin;
        var index = layui.index;

        var prefix = ctx + "leaveCounterSign";
        var url = prefix + "/list";
        var createUrl = prefix + "/add";
        var updateUrl = prefix + "/edit/{id}";
        var detailUrl = prefix + "/edit/{id}";
        var removeUrl = prefix + "/remove";
        var exportUrl = prefix + "/export";

        table.render({
            elem: '#dataTable'
            ,url: url
            ,method: 'POST'
            ,toolbar: '#toolbarHead'
            ,height: 'full-100'
            ,cellMinWidth: 80
            ,page: true
            ,request: {
                pageName: 'pageNum' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            ,limit: 10
            ,cols: [[
                {type: 'checkbox'}
                ,{field: 'type', title: '请假类型', width:100, templet: function(res){
                        return '<span class="layui-badge layui-bg-orange">' + $.table.selectDictLabel(datas, res.type) + '</span>';
                    }}
                ,{field: 'title', title: '标题', width: 200}
                ,{field: 'reason', title: '原因', width: 200}
                ,{field: 'startTime', title: '开始时间', width: 200}
                ,{field: 'endTime', title: '结束时间', width: 200}
                ,{field: 'totalTime', title: '请假时长', width: 100}
                // ,{field: 'instanceId', title: '流程实例ID', width: 100}
                ,{field: 'createUserName', title: '创建人', width: 100}
                ,{field: 'applyUser', title: '申请人ID', width: 100}
                ,{field: 'applyTime', title: '申请时间', width: 200}
                // ,{field: 'taskId', title: '当前任务ID', width: 200}
                ,{field: 'taskName', title: '当前任务名称', width: 200, templet:'<div><span class="layui-badge layui-bg-orange">{{d.taskName}}</span></div>>'}
                ,{field: 'operate', title: '操作', width: 280, toolbar: '#toolbarRow', fixed: 'right'}
            ]]
            ,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
                return {
                    "code": res.code, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "count": res.total, //解析数据长度
                    "data": res.rows //解析数据列表
                };
            }
        });

        //日期范围
        laydate.render({
            elem: '#createTime'
            , range: '~'
            , done: function (value, date, endDate) {
                console.log(value); //得到日期生成的值，如：2017-08-18
                console.log(date); //得到日期时间对象：{year: 2017, month: 8, date: 18, hours: 0, minutes: 0, seconds: 0}
                console.log(endDate); //得结束的日期时间对象，开启范围选择（range: true）才会返回。对象成员同上。
                if (value != null && value != '') {
                    var b = $.trim(value.split('~')[0]);
                    var e = $.trim(value.split('~')[1]);
                    console.log(b);
                    console.log(e);
                    $("#beginDate").val(b);
                    $("#endDate").val(e);
                }
            }
        });

        //监听搜索
        form.on('submit(searchBtn)', function (data) {
            var field = data.field;
            console.log(JSON.stringify(field));
            //执行重载
            table.reload('dataTable', {
                where: field
            });
        });

        //头工具栏事件
        table.on('toolbar(dataTable)', function(obj){
            switch(obj.event){
                case 'add':
                    active.add();
                    break;
                case 'export':
                    $.modal.loading("正在导出数据，请稍后...");
                    $.post(exportUrl, $("#inputForm").serializeArray(), function(result) {
                        if (result.code == web_status.SUCCESS) {
                            window.location.href = ctx + "common/download?fileName=" + encodeURI(result.msg) + "&delete=" + true;
                        } else if (result.code == web_status.WARNING) {
                            $.modal.alertWarning(result.msg)
                        } else {
                            $.modal.alertError(result.msg);
                        }
                        $.modal.closeLoading();
                    });
                    break;
            };
        });

        //行工具栏事件
        table.on('tool(dataTable)', function (obj) {
            var data = obj.data;
            if (obj.event === 'detail') {
                active.detail(data.id);
            } else if (obj.event === 'showHistoryDialog') {
                active.showHistoryDialog(data.instanceId);
            } else if (obj.event === 'showProcessImgDialog') {
                active.showProcessImgDialog(data.instanceId);
            } else if (obj.event === 'showSelectVerifyUserDialog') {
                active.showSelectVerifyUserDialog(data.id, data.createBy);
            } else if (obj.event === 'edit') {
                active.edit(data.id, data.createBy);
            } else if (obj.event === 'del') {
                active.del(data.id, data.createBy);
            } else if (obj.event === 'cancelApply'){
                active.cancelApply(data.instanceId, data.createBy);
            } else if (obj.event === 'suspendOrActiveApply'){
                active.suspendOrActiveApply(data.instanceId, data.createBy, data.suspendState);
            }
        });

        //事件
        var active = {
            add: function (id) {
                admin.openDialog('添加请假业务', createUrl, '800px', '500px');
            }
            ,detail: function(id){
                var url = detailUrl.replace("{id}", id);
                admin.openDialogView('表单数据', url, '800px', '500px');
            }
            ,showHistoryDialog: function(id){
                var url = ctx + 'process/historyList/' + id;
                parent.layui.admin.openDialogView('查看审批历史', url, '900px', '500px');
            }
            ,showProcessImgDialog: function (id) {
                var url = ctx + 'process/processImg/' + id;
                admin.openDialogView('查看流程图', url, '800px', '500px');
            }
            ,showSelectVerifyUserDialog: function (id, createBy) {
                if (createBy !== currentUser.loginName) {
                    admin.error("不允许非创建人提交申请！");
                    return;
                }

                var url = ctx + 'leaveCounterSign/selectVerifyUser/' + id;
                admin.openDialog('选择审批参与人', url, '600px', '500px');

            }
            ,edit: function (id, createBy) {
                if (createBy !== currentUser.loginName) {
                    admin.error("不允许非创建人编辑表单！");
                    return;
                }
                var url = updateUrl.replace("{id}", id);
                admin.openDialog('请假会签', url, '800px', '500px');
            }
            ,del: function(id, createBy){
                admin.confirm('确定删除吗?',function(){
                    admin.req(removeUrl, {ids: id}, function (data) {
                        if (data.code == 0) {
                            table.reload('dataTable');
                            admin.success('删除成功!');
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            }
            ,cancelApply: function (instanceId, createBy) {
                if (createBy !== currentUser.loginName) {
                    admin.error("不允许非创建人撤销申请！");
                    return;
                }
                admin.confirm("确认要撤销申请吗?", function() {
                    var url = ctx + "process/cancelApply";
                    var data = { "instanceId": instanceId };
                    admin.req(url, data, function (data) {
                        if (data.code == 0) {
                            table.reload('dataTable');
                            admin.success('撤销成功!');
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            }
            ,suspendOrActiveApply: function (instanceId, createBy, suspendState) {
                var suspendOrActive = suspendState === '2' ? '激活' : '挂起' ;
                if (createBy !== currentUser.loginName) {
                    admin.error("不允许非创建人" + suspendOrActive + "申请！");
                    return;
                }
                admin.confirm("确认要" + suspendOrActive + "申请吗?", function() {
                    var url = ctx + "process/suspendOrActiveApply";
                    var data = { "instanceId": instanceId, "suspendState": suspendState };
                    admin.req(url, data, function (data) {
                        if (data.code == 0) {
                            table.reload('dataTable');
                            admin.success(data.msg);
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            }
        }
    });
</script>
</body>

</html>
