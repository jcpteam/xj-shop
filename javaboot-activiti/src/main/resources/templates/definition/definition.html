<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>流程定义</title>
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css?v=316}"/>
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
	<div class="layui-row layui-col-space15">
		<div class="layui-card">
			<!-- 搜索区 -->
			<form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
				<div class="layui-form-item">
					<div class="layui-inline">
						<label class="layui-form-label label-auto">流程KEY：</label>
						<div class="layui-input-inline">
							<input class="layui-input" name="key" type="text" placeholder="请输入流程KEY"/>
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label label-auto">流程名称：</label>
						<div class="layui-input-inline">
							<input class="layui-input" name="name" type="text" placeholder="请输入流程名称"/>
						</div>
					</div>
					<div class="layui-inline">
						<label class="layui-form-label label-auto">所属分类：</label>
						<div class="layui-input-inline">
							<input class="layui-input" name="category" type="text" placeholder="请输入所属分类"/>
						</div>
					</div>
					<div class="layui-inline" style="padding-left: 13px;">
						<button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
							<i class="layui-icon layui-icon-search"></i>搜索
						</button>
						<button class="layui-btn layui-btn-sm icon-btn" type="reset">
							<i class="layui-icon layui-icon-refresh"></i>重置
						</button>
					</div>
				</div>
			</form>

			<table class="layui-table" id="dataTable" lay-filter="dataTable"></table>

		</div>

	</div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
	<div class="layui-btn-container">
		<button class="layui-btn layui-btn-sm" id="deploy" lay-event="deploy"><i class="layui-icon layui-icon-addition"></i>部署流程定义</button>
		<button class="layui-btn layui-btn-danger layui-btn-sm" lay-event="batchdel"><i class="layui-icon layui-icon-delete"></i>删除</button>
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="export"><i class="layui-icon layui-icon-export"></i>导出</button>
	</div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
	<a class="layui-btn layui-btn-xs" lay-event="suspendOrActiveApply">{{d.suspendState === '2' ? '激活' : '挂起'}}</a>
	<a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="convert2Model">转模型</a>
	<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script type="text/javascript" th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script type="text/javascript" th:inline="none">
	layui.use(['index', 'layer', 'form', 'table', 'util', 'ext', 'upload'], function () {
		var $ = layui.jquery;
		var layer = layui.layer;
		var form = layui.form;
		var table = layui.table;
		var util = layui.util;
		var ext = layui.ext;
		var admin = layui.admin;
		var index = layui.index;
		var upload = layui.upload;

		var prefix = ctx + "definition";
		var url = prefix + "/list";
		var removeUrl = prefix + "/remove";
		var exportUrl = prefix + "/export";

		table.render({
			elem: '#dataTable'
			,url: url
			,method: 'POST'
			,toolbar: '#toolbarHead'
			,height: 'full-100'
			,cellMinWidth: 80
			,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			,limit: 10
			,cols: [[
				{type: 'checkbox'}
				,{field: 'key', title: '流程KEY'}
				,{field: 'name', title: '流程名称'}
				,{field: 'version', title: '版本', width: 60}
				,{field: 'description', title: '流程描述', width: 100}
				,{field: 'category', title: '所属分类', width: 220}
				,{field: 'deploymentTime', title: '部署时间', width: 180}
				,{field: 'resourceName', title: '流程定义', width: 100, templet:function(res){
					var url = ctx + 'definition/readResource?pdid=' + res.id + '&resourceName=' + res.resourceName;
					return '<a href="' + url + '" target="_blank"> ' + res.resourceName + '</a>';
				}}
				,{field: 'diagramResourceName', title: '流程图', width: 100, templet:function(res){
					var url = ctx + 'definition/readResource?pdid=' + res.id + '&resourceName=' + res.diagramResourceName;
					return '<a href="' + url + '" target="_blank"> ' + res.key + '.png' + '</a>';
				}}
				,{field: 'suspendStateName', title: '流程定义状态', width: 100, templet:function(res){
					return '<span class="layui-badge layui-bg-green">' + res.suspendStateName+ '</span>';
				}}
				,{field: 'operate', title: '操作', width: 200, toolbar: '#toolbarRow', fixed: 'right'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		//监听搜索
		form.on('submit(searchBtn)', function (data) {
			var field = data.field;
			console.log(JSON.stringify(field));
			//执行重载
			table.reload('dataTable', {
				where: field
			});
		});

		//监听上传按钮
		var opt = {
			elem: '#deploy'
			,url: prefix + '/upload'
			,accept: 'file'
			,exts: 'bpmn|zip|bar'
			,field: 'processDefinition'
			,done: function (res) {
				//上传完毕回调
				console.log(JSON.stringify(res));
				if(res.code == 0){
					admin.success(res.msg);
					//执行重载
					table.reload('dataTable');
					upload.render(opt);
				}else{
					admin.error(res.msg);
				}
			}
			,error: function(){
				//请求异常回调
			}
		};
		upload.render(opt);

		//头工具栏事件
		table.on('toolbar(dataTable)', function(obj){
			switch(obj.event){
				case 'batchdel':
					active.batchdel();
					break;
				case 'deploy':
					break;
				case 'export':
					$.modal.loading("正在导出数据，请稍后...");
					$.post(exportUrl, $("#inputForm").serializeArray(), function(result) {
						if (result.code == web_status.SUCCESS) {
							window.location.href = ctx + "common/download?fileName=" + encodeURI(result.msg) + "&delete=" + true;
						} else if (result.code == web_status.WARNING) {
							$.modal.alertWarning(result.msg)
						} else {
							$.modal.alertError(result.msg);
						}
						$.modal.closeLoading();
					});
					break;
			};
		});

		//行工具栏事件
		table.on('tool(dataTable)', function (obj) {
			var data = obj.data;
			if (obj.event === 'suspendOrActiveApply'){
				active.suspendOrActiveApply(data.id, data.suspendState);
			} else if (obj.event === 'convert2Model') {
				active.convert2Model(data.id);
			} else if (obj.event === 'del') {
				active.del(data.deploymentId);
			}
		});

		//事件
		var active = {
			batchdel: function () {
				var checkStatus = table.checkStatus('dataTable')
						, checkData = checkStatus.data; //得到选中的数据

				if (checkData.length === 0) {
					return admin.info('请选择数据');
				}

				var ids = [];
				layui.each(checkData, function (index, item) {
					ids.push(item.deploymentId);
				});

				admin.confirm('确定删除吗？', function () {
					admin.req(removeUrl, {ids: ids.join(',')}, function (result) {
						if (result.code == 0) {
							table.reload('dataTable');
							admin.success('删除成功!');
							upload.render(opt);
						} else {
							admin.error(result.msg);
						}
					},'post')
				});
			}
			,suspendOrActiveApply: function(id, suspendState){
				var suspendOrActive = suspendState === '2' ? '激活' : '挂起' ;
				admin.confirm("确认要" + suspendOrActive + "流程定义吗?", function() {
					var url = ctx + "definition/suspendOrActiveApply";
					var data = { "id": id, "suspendState": suspendState };
					//$.operate.submit(url, "post", "json", data);
					admin.req(url, data, function (data) {
						if (data.code == 0) {
							table.reload('dataTable');
							admin.success(data.msg);
							upload.render(opt);
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
			,convert2Model: function(id){
				admin.confirm("确认要转换成流程模型吗?", function() {
					var url = ctx + "definition/convert2Model";
					var data = { "processDefinitionId": id };
					//$.operate.submit(url, "post", "json", data);
					admin.req(url, data, function (data) {
						if (data.code == 0) {
							table.reload('dataTable');
							admin.success(data.msg);
							upload.render(opt);
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
			,del: function(id){
				admin.confirm('确定删除吗?',function(){
					admin.req(removeUrl, {ids: id}, function (data) {
						if (data.code == 0) {
							table.reload('dataTable');
							admin.success('删除成功!');
							upload.render(opt);
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
		}
	});
</script>
</body>

</html>
