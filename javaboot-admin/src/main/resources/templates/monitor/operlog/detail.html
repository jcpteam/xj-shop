<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8">
	<title>操作日志详细</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
	<style>
		.layui-input-static{
			border-width: 0px;
		}
	</style>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false">
	<div class="layui-card">
		<div class="layui-card-body">
			<div class="layui-row">
				<div class="layui-form-item">
					<label class="layui-form-label">操作模块:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${operLog.title} + ' / ' + ${@dict.getLabel('sys_oper_type',operLog.businessType)}"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">登录信息:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${operLog.operName} + ' / ' + ${operLog.deptName} + ' / ' + ${operLog.operIp}+ ' / ' + ${operLog.operLocation}"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">请求地址:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${operLog.operUrl}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">请求方式:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${operLog.requestMethod}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">操作方法:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${operLog.method}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">请求参数:</label>
					<div class="layui-input-block">
						<pre id="operParam"></pre>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">返回参数:</label>
					<div class="layui-input-block">
						<pre id="jsonResult"></pre>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">状态:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${operLog.status == 0 ? '正常' : '异常'}">
					</div>
				</div>
				<div class="layui-form-item" th:style="'display:' + ${operLog.status == 0 ? 'none' : 'block'}">
					<label class="layui-form-label">异常信息:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${operLog.errorMsg}">
					</div>
				</div>
			</div>
		</div>
	</div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script th:inline="javascript">
	layui.use(['index', 'form', 'table', 'jsonview', 'ext'], function(){
		var $ = layui.$;
		var form = layui.form;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;

		$(function() {
			var operParam = [[${operLog.operParam}]];
			if ($.common.isNotEmpty(operParam) && operParam.length < 2000) {
				$("#operParam").JSONView(operParam);
			} else {
				$("#operParam").text(operParam);
			}
			var jsonResult = [[${operLog.jsonResult}]];
			if ($.common.isNotEmpty(jsonResult) && jsonResult.length < 2000) {
				$("#jsonResult").JSONView(jsonResult);
			} else {
				$("#jsonResult").text(jsonResult);
			}
		});

	})
</script>
</body>
</html>
