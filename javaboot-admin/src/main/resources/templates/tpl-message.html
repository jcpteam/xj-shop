<script type="text/html" id="noticeItem">

            <h2 class="message-item-title">{{d.noticeTitle}}</h2>

<!-- 订单模板 -->
<script type="text/html" id="messageItem">
    <a class="message-list-item" href="javascript:;">
        <!--<img class="message-item-icon" src="assets/images/head.jpg" alt="">-->
        <!--<div class="message-item-right">-->
        <div>
            <h2 class="message-item-title">{{d.title}}</h2>
            <p class="message-item-text">{{d.content}}</p>
            <p class="message-item-text">{{d.createTime}}</p>
        </div>
    </a>
</script>

<script>
    layui.use(['element','dataGrid', 'admin'], function () {
        var $ = layui.jquery;
        var admin = layui.admin;
        var dataGrid = layui.dataGrid;

        queryNoticeList();
        //查询消息列表数据
        function queryNoticeList() {
            var listUrl = "system/notice/list";
            dataGrid.render({
                url: ctx + listUrl,
                method: 'POST',
                elem: '#noticeList',
                templet: '#noticeItem',
                request: {
                    pageName: 'pageNum'
                    , limitName: 'pageSize'
                },
                loadMore: {limit: 5,text:'下面还有通知'}
                , parseData: function (res) { //将原始数据解析成 table 组件所规定的数据
                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "count": res.total, //解析数据长度
                        "data": res.rows //解析数据列表
                    };
                },
                done: function (dataList, curPage, count) {
                }
            });
        }

        queryMessageList();
        //查询消息列表数据
        function queryMessageList() {
            var listUrl = "shop/storeMessage/list";
            dataGrid.render({
                url: ctx + listUrl,
                method: 'POST',
                elem: '#messageList',
                templet: '#messageItem',
                request: {
                    pageName: 'pageNum'
                    , limitName: 'pageSize'
                },
                loadMore: {limit: 5,text:'下面还有消息'}
                , parseData: function (res) { //将原始数据解析成 table 组件所规定的数据
                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "count": res.total, //解析数据长度
                        "data": res.rows //解析数据列表
                    };
                },
                done: function (dataList, curPage, count) {
                }
            });
        }


        /* 加载更多按钮点击事件 */
        $('#messageMoreBtn2').click(function () {
            var $that = $(this);
            admin.btnLoading($that);
            setTimeout(function () {
                admin.btnLoading($that, false);
                $that.before($that.prev()[0].outerHTML);
            }, 300);
        });

        /* 清空消息点击事件 */
        $('#messageClearBtn1,#messageClearBtn2,#messageClearBtn3').click(function () {
            $(this).parents('.layui-tab-item').addClass('show-empty');
        });

    });
</script>

<style>
    .message-list1 {
        /*height: 310px;*/

        white-space: normal;
        overflow-y: auto;

    }

    /** 消息列表样式 */

    .message-list-item:hover, .message-btn-clear:hover, .message-btn-more:hover {
        background: #F2F2F2;
    }

    .message-list-item .message-item-icon {
        width: 40px;
        height: 40px;
        line-height: 40px;
        margin-top: -20px;

    }

    .message-list-item .message-item-icon.layui-icon {

    }

    }

    .message-btn-clear, .message-btn-more {
