<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8">
	<title>修改角色</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false" th:action="@{/system/role/edit}" th:object="${role}">
	<div class="layui-card">
		<div class="layui-card-body">
			<div class="layui-row">
				<input id="roleId" name="roleId" type="hidden" th:field="*{roleId}"/>
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">角色名称:</label>
					<div class="layui-input-block">
						<input name="roleName" th:field="*{roleName}" type="text" class="layui-input" lay-verType="tips" lay-verify="required"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">权限字符:</label>
					<div class="layui-input-block">
						<input name="roleKey" th:field="*{roleKey}" type="text" class="layui-input" lay-verType="tips" lay-verify="required"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">显示顺序:</label>
					<div class="layui-input-block">
						<input name="roleSort" th:field="*{roleSort}" type="text" class="layui-input" lay-verType="tips" lay-verify="number"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">角色状态:</label>
					<div class="layui-input-block" th:with="type=${@dict.getType('sys_normal_disable')}">
						<input th:each="dict,dictStat:${type}" type="radio" name="status" th:title="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{status}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">备注:</label>
					<div class="layui-input-block">
						<textarea name="remark" maxlength="500" class="layui-textarea" rows="3">[[*{remark}]]</textarea>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">菜单权限:</label>
					<div class="layui-input-block">
						<input type="hidden" id="menuIds" name="menuIds">
						<div id="menuTrees" class="ztree"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="layui-form-item layui-hide">
		<button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
		<button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
	</div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script th:inline="none">
	layui.use(['index', 'form', 'formX', 'table', 'ext'], function(){
		var $ = layui.$;
		var form = layui.form;
		var formX = layui.formX;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;

		$(function() {
			var url = ctx + "system/menu/roleMenuTreeData?roleId=" + $("#roleId").val();
			var options = {
				id: "menuTrees",
				url: url,
				check: { enable: true },
				expandLevel: 0,
				onCheck: onCheck,
				onLoadSuccess: onLoadSuccess
			};
			$.tree.init(options);

		});

		function onLoadSuccess(data) {
			//console.log('onLoadSuccess:' + data);
			var menuIds = $.tree.getCheckedNodes();
			$("#menuIds").val(menuIds);
		};

		function onCheck(event, treeId, treeNode) {
			//console.log('onCheck:' + treeNode.id + "==" + treeNode.pId);

			var menuIds = $.tree.getCheckedNodes();
			$("#menuIds").val(menuIds);
			console.log("zTreeOnCheck-menuIds:" + menuIds);

		};

	})
</script>
</body>
</html>
