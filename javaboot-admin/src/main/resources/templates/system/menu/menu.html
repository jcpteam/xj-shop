<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>菜单列表</title>
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
	<link rel="stylesheet" href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}">
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->
	<style>
		.layui-input-sm {
			width: 190px;
			height: 30px;
			line-height: 30px;
			padding: 0 10px;
		}
	</style>
</head>
<body>

	<!-- 正文开始 -->
	<div class="layui-fluid">
		<div class="layui-row layui-col-space15">
			<div class="layui-card">
				<!-- 搜索区 -->
				<form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
					<div class="layui-form-item">
						<div class="layui-inline">
							<label class="layui-form-label label-auto">菜单名称：</label>
							<div class="layui-input-inline">
								<input id="keyword" class="layui-input" name="keyword" type="text" placeholder="输入菜单名称"/>
							</div>
						</div>
						<div class="layui-inline">
							<button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
								<i class="layui-icon">&#xe615;</i>搜索
							</button>
							<button class="layui-btn layui-btn-sm icon-btn" id="btnClear">
								<i class="layui-icon">&#x1006;</i>清除
							</button>
						</div>
					</div>
				</form>

				<table id="treeTable"></table>
			</div>
		</div>
	</div>


	<!-- 头工具栏 -->
	<script type="text/html" id="toolbarHead">
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add" shiro:hasPermission="system:role:add"><i class="layui-icon layui-icon-addition"></i>新增</button>
		<button class="layui-btn layui-btn-danger layui-btn-sm" id="removeAll" lay-event="del" shiro:hasPermission="system:role:remove"><i class="layui-icon layui-icon-delete"></i>删除</button>
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="expandAll" ><i class="layui-icon layui-icon-shrink-right"></i>展开</button>
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="foldAll" ><i class="layui-icon layui-icon-spread-left"></i>折叠</button>
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="refresh" ><i class="layui-icon layui-icon-refresh"></i>刷新</button>
	</script>

	<!-- 表格操作列 -->
	<script type="text/html" id="toolbarRow">
		<a class="layui-btn layui-btn-xs" lay-event="edit">修改</a>
		<a class="layui-btn layui-btn-xs" lay-event="add">添加</a>
		<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
	</script>
	<!-- js部分 -->
	<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
	<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
	<script th:inline="javascript">
		var ctx = [[@{/}]];
		var datas = [[${@dict.getType('sys_show_hide')}]];
	</script>
	<script th:inline="none">
		layui.use(['layer', 'form', 'admin', 'treeTable', 'util', 'ext'], function () {
			var $ = layui.jquery;
			var layer = layui.layer;
			var form = layui.form;
			var admin = layui.admin;
			var treeTable = layui.treeTable;
			var util = layui.util;

			var prefix = ctx + "system/menu"
			var listUrl = prefix + "/listTree";
			var createUrl = prefix + "/add/{id}";
			var updateUrl = prefix + "/edit/{id}";
			var removeUrl = prefix + "/remove/{id}";
			var removeAll = prefix + "/remove";

			// 渲染表格
			var insTb = treeTable.render({
				elem: '#treeTable',
				url: listUrl,
				toolbar: '#toolbarHead',
				defaultToolbar: [],
				request: {pidName: 'parentId'},
				tree: {
					iconIndex: 1,  // 折叠图标显示在第几列
					isPidData: true,  // 是否是pid形式数据,
					idName: 'menuId',  // 自定义id字段的名称
					pidName: 'parentId',  // 自定义标识是否还有子节点的字段名称
					getIcon: function (d) {  // 自定义图标
						if(d.icon != null && d.icon != '' && d.icon != '#'){
							return '<i class="' + d.icon + '"></i>&nbsp;';
						}
						return '';
					}
				},
				// defaultToolbar: ['filter', 'print', 'exports', {
				// 	title: '提示',
				// 	layEvent: 'LAYTABLE_TIPS',
				// 	icon: 'layui-icon-tips'
				// }],
				cols: [
					//{type: 'numbers'},
					{type: 'checkbox'},
					{field: 'menuName', title: '菜单名称'},
					{field: 'icon', title: '图标', width: 200},
					{field: 'orderNum', title: '菜单排序', width: 50},
					{field: 'url', title: '请求地址', width: 150},
					{field: 'menuType', title: '菜单类型', width: 100, templet:function (res) {
						if (res.menuType == 'M') {
							return '<span class="layui-badge layui-badge-blue">目录</span>';
						} else if (res.menuType == 'C') {
							return '<span class="layui-badge layui-badge-green">菜单</span>';
						} else if (res.menuType == 'F') {
							return '<span class="layui-badge layui-badge-gray">按钮</span>';
						}
					}},
					{field: 'visible', title: '可见', width: 50, templet:function (res) {
						if (res.menuType == 'F') {
							return '-';
						}
						return $.table.selectDictLabel(datas, res.visible);
					}},
					{field: 'perms', title: '权限标识', align: 'center', width: 150},
					{field: 'operate',title: '操作', align: 'center', width: 200, templet: '#toolbarRow'}
				]
			});


			treeTable.on('checkbox(treeTable)', function(obj){
				// console.log(obj.checked);  // 当前是否选中状态
				// console.log(obj.data);  // 选中行的相关数据
				// console.log(obj.type);  // 如果触发的是全选，则为：all，如果触发的是单选，则为：one
				// console.log(obj.data.children.length); //选择行的子菜单个数
				// console.log(insTb.checkStatus().length);
				var checkStatus = insTb.checkStatus();
				console.log(checkStatus);
			});

			// 搜索
			$('#searchBtn').click(function () {
				var keyword = $('#keyword').val();
				if (keyword) {
					insTb.filterData(keyword);
				} else {
					insTb.clearFilter();
				}
			});
			// 清除搜索
			$('#btnClear').click(function () {
				$("#keyword").val('');
				insTb.clearFilter();
			});


			//头工具栏事件
			treeTable.on('toolbar(treeTable)', function(obj) {
				switch (obj.event) {
					case 'add':
						var addUrl = createUrl.replace("{id}", 0);
						parent.layui.admin.openDialog('添加菜单', addUrl, '580px', '90%', 'treeTable', 'submitBtn', function(){
							parent.layui.admin.success('保存成功!');
							admin.refresh();
						});
						break;
					case 'del':
						var checkData = insTb.checkStatus();
						var ids = [];
						layui.each(checkData, function (index, item) {
							if(!item.isIndeterminate){
								ids.push(item.menuId);
							}
						});
						admin.confirm('此操作不可逆, 确定删除吗？', function () {
							admin.req(removeAll, {ids: ids.join(',')}, function (result) {
								if (result.code == 0) {
									insTb.refresh();
									admin.success('删除成功!');
								} else {
									admin.error(result.msg);
								}
							},'post')
						});
						break;
					case 'expandAll':
						insTb.expandAll();
						break;
					case 'foldAll':
						insTb.foldAll();
						break;
					case 'refresh':
						insTb.refresh();
						break;
				}
			})

			// 工具条点击事件
			treeTable.on('tool(treeTable)', function (obj) {
				var data = obj.data;
				console.log(data);
				var id = data.menuId;
				var parentId = data.parentId;
				var layEvent = obj.event;
				if (layEvent === 'edit') { // 修改
					var editUrl = updateUrl.replace("{id}", id);
					parent.layui.admin.openDialog('编辑菜单', editUrl, '580px', '90%', 'treeTable', 'submitBtn', function(res){
						parent.layui.admin.success('保存成功!');
						obj.update(res.data);
					});
				} else if (layEvent === 'add') { // 添加
					var addUrl = createUrl.replace("{id}", id);
					parent.layui.admin.openDialog('添加子菜单', addUrl, '580px', '90%', 'treeTable', 'submitBtn', function(){
						parent.layui.admin.success('保存成功!');
						insTb.refresh(id);
					});
				} else if (layEvent === 'del') { // 删除
					var delUrl = removeUrl.replace("{id}", id);

					admin.confirm('确定要删除选中数据吗？',function(){
						admin.req(delUrl,{},function (res) {
							if(res.code == 0){
								parent.layui.admin.success('删除成功!');
								obj.del(); // 删除当前行
							}else{
								admin.error(res.msg);
							}
						})
					});

				}
			});
		});
	</script>
</body>
</html>
