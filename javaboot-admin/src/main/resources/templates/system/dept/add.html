<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">

	<meta charset="utf-8">

	<style>
		.layui-form-item {
			margin-bottom: 0;
			margin-top: 20px;
		}

		.layui-form-item .layui-inline {
			margin-bottom: 10px;
			margin-right: 0;
		}

		.form-group-bottom {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			background-color: #fff;
			padding: 10px 20px;
			box-shadow: 0 -1px 2px 0 rgba(0, 0, 0, .05);
		}
	</style>
</head>
<body>

<!-- 正文开始 -->
<form class="layui-form" id="inputForm" th:onsubmit="return false" th:action="@{/system/dept/add}">
	<div class="layui-fluid" style="padding-bottom: 30px;">
		<div class="layui-card">
			<div class="layui-card-body">
				<input id="treeId" name="parentId" type="hidden" th:value="${dept.deptId}"   />
				<div class="layui-form-item layui-row">
					<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label layui-form-required">上级部门:</label>
						<div class="layui-input-block">
							<input id="treeName" th:value="${dept.deptName}" type="text" placeholder="请选择归属部门" class="layui-input icon-search" lay-verType="tips" lay-verify="required"/>
						</div>
					</div>
					<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label layui-form-required">部门名称:</label>
						<div class="layui-input-block">
							<input name="deptName" type="text" placeholder="请输入部门名称" class="layui-input" lay-verType="tips" lay-verify="required"/>

						</div>
					</div>
					<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label layui-form-required">部门编号:</label>
						<div class="layui-input-block">
							<input name="deptId" type="text" placeholder="请输入部门编号" class="layui-input" lay-verType="tips" lay-verify="required"/>
						</div>
					</div>
					<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label layui-form-required">显示排序:</label>
						<div class="layui-input-block">
							<input name="orderNum" type="number" placeholder="请输入显示排序" class="layui-input" lay-verType="tips" lay-verify="number"/>
						</div>
					</div>
					<!--<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label layui-form-required">负责人:</label>
						<div class="layui-input-block">
							<input name="leader" type="text" placeholder="请输入负责人" class="layui-input" lay-verType="tips" lay-verify="required"/>
						</div>
					</div>
					<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label layui-form-required">联系电话:</label>
						<div class="layui-input-block">
							<input name="phone" type="text" placeholder="请输入联系电话" class="layui-input" lay-verType="tips" lay-verify="required"/>
						</div>
					</div>
					<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label layui-form-required">邮箱:</label>
						<div class="layui-input-block">
							<input name="email" type="text" placeholder="请输入邮箱地址" class="layui-input" lay-verType="tips" lay-verify="required"/>
						</div>
					</div>-->
					<div class="layui-inline layui-col-md4 layui-col-sm6">
						<label class="layui-form-label">部门状态:</label>
						<div class="layui-input-block" th:with="type=${@dict.getType('sys_normal_disable')}">
							<input th:each="dict,dictStat:${type}" type="radio" name="status" th:title="${dict.dictLabel}" th:value="${dict.dictValue}" th:attr="checked=${dictStat.index==0?true:false}">
						</div>
					</div>
				</div>

			</div>
		</div>
	</div>

	<div class="form-group-bottom text-right">
		<button id="resetBtn" type="reset" class="layui-btn layui-btn-primary layui-hide">重置</button>
		<button id="submitBtn" class="layui-btn layui-hide" lay-filter="submitBtn" lay-submit>保存</button>
		<button id="closeBtn" class="layui-btn layui-btn-danger layui-hide">关闭</button>
	</div>

</form>

<script th:inline="javascript">
	var ctx = [[@{/}]];
	var prefix = ctx + "system/dept";

		$("#treeName").click(function(){

			var url = ctx + "system/dept/selectDeptTree/" + deptId;
