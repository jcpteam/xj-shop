<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>左树右表</title>
    <link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <style>
        #treeTbTree {
            height: 535px;
            overflow: auto;
        }

        @media screen and (max-width: 768px) {
            #treeTbTree {
                height: auto;
            }
        }

        /** dtree选中颜色重写 */
        .dtree-theme-item-this {
            background-color: #eeeeee !important;
        }

        .box-title {
            font-size: 16px;
            margin-bottom: 13px;
            float: left;
        }

        .box-tools {
            position: relative;
            top: 0px;
            right: 0;
        }

        .pull-right {
            float: right;
        }

    </style>
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <!-- 左树 -->
        <div class="layui-col-md2">
            <div class="layui-card" style="height: 555px;">
                <div class="layui-card-header">
                    <div class="box-title">组织机构</div>
                    <div class="box-tools pull-right">
                        <a ew-href="/system/dept" ew-title="管理部门"><i class="layui-icon layui-icon-edit"></i></a>
                        <a id="btnExpand" style="display: none" title="展开"><i class="layui-icon layui-icon-down"></i></a>
                        <a id="btnCollapse" title="折叠"><i class="layui-icon layui-icon-up"></i></a>
                        <a id="btnRefresh" title="刷新部门"><i class="layui-icon layui-icon-refresh"></i></a>
                    </div>
                </div>
                <div class="layui-card-body">
                    <ul id="tree" class="ztree"></ul>
                </div>
            </div>
        </div>
        <!-- 右表 -->
        <div class="layui-col-md10">
            <div class="layui-card">
                <div class="layui-card-body" style="min-height: 535px;">

                    <!-- 搜索区 -->
                    <form class="layui-form toolbar" th:onsubmit="return false">
                        <div class="layui-form-item">
                            <input type="hidden" id="deptId" name="deptId">
                            <input type="hidden" id="parentId" name="parentId">
                            <div class="layui-inline">
                                <label class="layui-form-label label-auto">登录名称：</label>
                                <div class="layui-input-inline">
                                    <input class="layui-input" name="loginName" type="text" placeholder="输入登录名"/>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label label-auto">手机号码：</label>
                                <div class="layui-input-inline">
                                    <input class="layui-input" name="phonenumber" type="text" placeholder="输入手机号"/>
                                </div>
                            </div>
                           <!-- <div class="layui-inline form-search-show-expand">
                                <label class="layui-form-label label-auto">用户状态：</label>
                                <div class="layui-input-inline">
                                    <select name="status" th:with="type=${@dict.getType('sys_normal_disable')}">
                                        <option value="">所有</option>
                                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                                    </select>
                                </div>
                            </div>-->
                            <!--<div class="layui-inline form-search-show-expand">
                                <label class="layui-form-label label-auto">创建日期：</label>
                                <div class="layui-input-inline">
                                    <input id="createTime" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
                                    <input id="beginDate" type="hidden" name="params[beginTime]">
                                    <input id="endDate" type="hidden" name="params[endTime]">
                                </div>
                            </div>-->
                            <div class="layui-inline" style="padding-left: 13px;">
                                <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
                                    <i class="layui-icon layui-icon-search"></i>搜索
                                </button>
                                <button class="layui-btn layui-btn-sm icon-btn" type="reset">
                                    <i class="layui-icon layui-icon-refresh"></i>重置
                                </button>
                                <!--<a class="layui-btn layui-btn-primary form-search-expand" data-expand="true">
                                    展开 <i class="layui-icon layui-icon-down"></i>
                                </a>-->
                            </div>
                        </div>
                    </form>

                    <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add" shiro:hasPermission="system:user:add"><i class="layui-icon layui-icon-addition"></i>新增</button>
        <button class="layui-btn layui-btn-warm layui-btn-sm" lay-event="edit" shiro:hasPermission="system:user:edit"><i class="layui-icon layui-icon-edit"></i>修改</button>
        <button class="layui-btn layui-btn-danger layui-btn-sm" lay-event="batchdel"shiro:hasPermission="system:user:remove"><i class="layui-icon layui-icon-delete"></i>删除</button>
        <!--<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="import" shiro:hasPermission="system:user:import"><i class="layui-icon layui-icon-upload"></i>导入</button>-->
        <!--<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="export" shiro:hasPermission="system:user:export"><i class="layui-icon layui-icon-export"></i>导出</button>-->
    </div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
    <!--<a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="view">查看</a>-->
    <a class="layui-btn layui-btn-xs" lay-event="authRole" shiro:hasPermission="system:userRoleDept:view">授权角色</a>
    <a class="layui-btn layui-btn-xs" lay-event="edit" shiro:hasPermission="system:user:edit">修改</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del" shiro:hasPermission="system:user:remove">删除</a>
    <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="resetPassword" shiro:hasPermission="system:user:resetPwd">重置密码</a>
</script>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script th:inline="none">
    layui.use(['index', 'layer', 'form', 'table', 'util', 'laydate', 'zTree', 'ext'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var util = layui.util;
        var laydate = layui.laydate;
        // var zTree = layui.zTree;
        // var ext = layui.ext;
        var admin = layui.admin;
        var index = layui.index;

        var prefix = ctx + "system/user";
        var createUrl = prefix + "/add";
        var updateUrl = prefix + "/edit/{id}";
        var removeUrl = prefix + "/remove";
        var exportUrl = prefix + "/export";
        var importUrl = prefix + "/importData";
        var importTemplateUrl = prefix + "/importTemplate";

        table.render({
            elem: '#dataTable'
            ,url: prefix + "/list"
            ,method: 'POST'
            ,toolbar: '#toolbarHead'
            ,defaultToolbar: []
            ,height: 'full-100'
            ,cellMinWidth: 80
            ,page: {
                curr:1
            }
            ,request: {
                pageName: 'pageNum' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            ,limit: 10
            ,cols: [[
                {type: 'checkbox', fixed: 'left'}
                ,{field: 'loginName', title: '登录名称', width: 100}
                ,{field: 'userName', title: '用户名称', width: 100}
                ,{field: 'dept.deptName', title: '部门', width: 100, templet:function (res) {return res.dept.deptName;}}
                ,{field: 'phonenumber', title: '手机', width: 120}
                ,{field: 'status', title: '用户状态', width: 100, templet:function(res){
                    if(res.status == 0){
                        return '启用';
                    }else{
                        return '禁用';
                    }
                 }}
                ,{field: 'createTime', title: '创建时间', width: 200, sort: true}
                ,{field:'operate', title: '操作', minWidth: 150, toolbar: '#toolbarRow', fixed: 'right'}
            ]]
            ,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
                return {
                    "code": res.code, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "count": res.total, //解析数据长度
                    "data": res.rows //解析数据列表
                };
            }
        });

        //日期范围
        laydate.render({
            elem: '#createTime'
            , range: '~'
            , done: function (value, date, endDate) {
                console.log(value); //得到日期生成的值，如：2017-08-18
                console.log(date); //得到日期时间对象：{year: 2017, month: 8, date: 18, hours: 0, minutes: 0, seconds: 0}
                console.log(endDate); //得结束的日期时间对象，开启范围选择（range: true）才会返回。对象成员同上。
                if (value != null && value != '') {
                    var b = $.trim(value.split('~')[0]);
                    var e = $.trim(value.split('~')[1]);
                    console.log(b);
                    console.log(e);
                    $("#beginDate").val(b);
                    $("#endDate").val(e);
                }
            }
        });

        //监听搜索
        form.on('submit(searchBtn)', function (data) {
            var field = data.field;
            //onsole.log("user>>submit>>" + JSON.stringify(field))
            //执行重载
            table.reload('dataTable', {
                where: field
                ,page:{curr:1}
            });
        });

        //监听表格复选框选择
        table.on('checkbox(dataTable)', function (obj) {
            console.log(obj)
        });

        //头工具栏事件
        table.on('toolbar(dataTable)', function(obj){
            switch(obj.event){
                case 'add':
                    active.add();
                    break;
                case 'edit':
                    var checkStatus = table.checkStatus('dataTable')
                        , checkData = checkStatus.data; //得到选中的数据

                    var id = null;
                    if (id == null) {
                        if (checkData.length === 0) {
                            return admin.info('请选择一条数据');
                        } else if (checkData.length > 1) {
                            return admin.info('只能选择一条数据编辑');
                        } else {
                            id = checkData[0].userId;
                        }
                    }
                    active.edit(id);
                    break;
                case 'batchdel':
                    active.batchdel();
                    break;
                case 'import':
                    break;
                case 'export':
                    break;
            };
        });

        //行工具栏事件
        table.on('tool(dataTable)', function (obj) {
            var data = obj.data;
            if (obj.event === 'view') {
                active.view(data.userId);
            } else if (obj.event === 'edit') {
                active.edit(data.userId);
            } else if (obj.event === 'del') {
                active.del(data.userId);
            } else if(obj.event === 'showPic'){
                top.layui.admin.showPic(data.photo);
            } else if(obj.event === 'resetPassword'){
                active.resetPassword(data.userId);
            } else if(obj.event === 'authRole'){
                active.authRole(data.userId);
            }
        });

        //监听锁定操作
        form.on('checkbox(locked)', function (obj) {
            var json = JSON.parse(decodeURIComponent($(this).data('json')));
            // layer.tips(this.value + ' ' + this.name + '：' + obj.elem.checked, obj.othis);
            // console.log(obj.elem.checked);
            // console.log(json.id);
            var checked = obj.elem.checked;
            //console.log(typeof (checked));
            var loginFlag = '1';
            if(checked){
                loginFlag = '0';
            } else{
                loginFlag = '1';
            }

            admin.req(prefix + '/resetStatus',{userId:json.id, loginFlag:loginFlag},function(data){
                if(data.success){
                    admin.success('更新成功!');
                }else{
                    admin.error('更新失败!' + data.msg);
                }
            },'post')
        });

        //事件
        var active = {
            resetPassword: function(id){
                var url = prefix + '/resetPwd/' + id;
                admin.openDialog('重置密码', url, '400px', '310px');
            }
            ,authRole: function(id){
                var url = ctx + "system/userRoleDept/detail/" + id;
                index.openTab({
                    title: '授权角色',
                    url: url,
                    end: function() {
                        // insTb.reload();
                    }
                });
            }
            ,batchdel: function () {
                var checkStatus = table.checkStatus('dataTable')
                    , checkData = checkStatus.data; //得到选中的数据

                if (checkData.length === 0) {
                    return admin.info('请选择数据');
                }

                var ids = [];
                layui.each(checkData, function (index, item) {
                    ids.push(item.userId);
                });

                admin.confirm('确定删除吗？', function () {
                    admin.req(removeUrl, {ids: ids.join(',')}, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('删除成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            }
            ,view: function (id) {
                var viewUrl = updateUrl.replace("{id}", id);
                admin.openDialogView('查看用户', viewUrl, '800px', '90%');
            }
            ,add: function () {
                admin.openDialog('新建用户', createUrl + '?deptId=' + $('#deptId').val(), '800px', '90%');
            }
            ,edit: function (id) {
                var editUrl = updateUrl.replace("{id}", id);
                admin.openDialog('编辑用户', editUrl, '800px', '90%');
            }
            ,del: function(id){
                admin.confirm('确定删除吗?',function(){
                    admin.req(removeUrl, {ids: id}, function (data) {
                        if (data.code == 0) {
                            table.reload('dataTable');
                            admin.success('删除成功!');
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            }
        }


        $(function(){
            queryDeptTree();
        })

        function queryDeptTree() {
            var url = ctx + "system/dept/treeData";
            var options = {
                url: url,
                expandLevel: 2,
                onClick: zOnClick
            };
            $.tree.init(options);

            function zOnClick(event, treeId, treeNode) {
                console.log(treeNode.id);
                console.log(treeNode.pId);

                $("#deptId").val(treeNode.id);
                $("#parentId").val(treeNode.pId);

                $("#searchBtn").trigger('click');
            }
        }

        $('#dept').click(function(){
            index.openTab({
                title: '部门管理',
                url: ctx + "system/dept",
                end: function() {
                    // insTb.reload();
                }
            });
        });

        $('#btnExpand').click(function() {
            $._tree.expandAll(true);
            $(this).hide();
            $('#btnCollapse').show();
        });

        $('#btnCollapse').click(function() {
            $._tree.expandAll(false);
            $(this).hide();
            $('#btnExpand').show();
        });

        $('#btnRefresh').click(function() {
            queryDeptTree();
        });
    });
</script>
</body>

</html>
