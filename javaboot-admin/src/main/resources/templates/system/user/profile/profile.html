<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>用户信息</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}">
    <link rel="stylesheet" href="../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css}">
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <style>
        .user-info-head {
            width: 110px;
            height: 110px;
            position: relative;
            display: inline-block;
        }

        .user-info-head:hover:after {
            content: '\e65d';
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            color: #eee;
            background: rgba(0, 0, 0, 0.5);
            font-family: layui-icon;
            font-size: 24px;
            font-style: normal;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: pointer;
            line-height: 110px;
            border-radius: 50%;
        }

        .user-info-head img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
        }

        .info-list-item {
            position: relative;
            padding-bottom: 8px;
        }

        .info-list-item>.layui-icon {
            position: absolute;
        }

        .info-list-item>p {
            padding-left: 30px;
        }

        .dash {
            border-bottom: 1px dashed #ccc;
            margin: 15px 0;
        }

        .layui-badge-list .layui-badge {
            margin-right: 6px;
        }

        .layui-badge-list .layui-badge {
            padding: 2px 7px;
            border: 1px solid #ccc;
            margin-bottom: 8px;
            background-color: #fafafa !important;
        }

        .bd-list-item {
            padding: 14px 0;
            border-bottom: 1px solid #e8e8e8;
            position: relative;
        }

        .bd-list-item .bd-list-item-img {
            width: 48px;
            height: 48px;
            line-height: 48px;
            margin-right: 12px;
            display: inline-block;
            vertical-align: middle;
        }

        .bd-list-item .bd-list-item-content {
            display: inline-block;
            vertical-align: middle;
        }

        .bd-list-item .bd-list-item-lable {
            margin-bottom: 4px;
            color: #333;
        }

        .bd-list-item .bd-list-item-oper {
            position: absolute;
            right: 0;
            top: 50%;
            text-decoration: none !important;
            cursor: pointer;
            transform: translateY(-50%);
        }

        .user-info-form .layui-form-item {
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <!-- 左 -->
        <div class="layui-col-sm12 layui-col-md3">
            <div class="layui-card">
                <div class="layui-card-body" style="padding: 25px;">
                    <div class="text-center layui-text">
                        <div class="user-info-head" id="editimg">
                            <img th:src="(${user.avatar} == '') ? @{/assets/images/15367146917869444.jpg} : @{${user.avatar}}" id="img"/>
                        </div>
                        <h2 style="padding-top: 20px;">[[${user.loginName}]]</h2>
                        <p style="padding-top: 8px;"></p>
                    </div>
                    <div class="layui-text" style="padding-top: 30px;">
                        <div class="info-list-item">
                            <i class="layui-icon layui-icon-username"></i>
                            <p>[[${user.userName}]]</p>
                        </div>
                        <div class="info-list-item">
                            <i class="layui-icon layui-icon-release"></i>
                            <p>[[${user.dept?.deptName}]] - [[${#strings.defaultString(postGroup,'无岗位')}]]</p>
                        </div>
                        <div class="info-list-item">
                            <i class="layui-icon layui-icon-location"></i>
                            <p>湖北省武汉市</p>
                        </div>
                    </div>
                    <div class="dash"></div>
                    <h3>标签</h3>
                    <div class="layui-badge-list" style="padding-top: 6px;">
                        <span class="layui-badge layui-bg-gray">很有想法的</span>
                        <span class="layui-badge layui-bg-gray">专注设计</span>
                        <span class="layui-badge layui-bg-gray">辣~</span>
                        <span class="layui-badge layui-bg-gray">大长腿</span>
                        <span class="layui-badge layui-bg-gray">川妹子</span>
                        <span class="layui-badge layui-bg-gray">海纳百川</span>
                        <span class="layui-badge layui-bg-gray">海纳百川</span>
                        <span class="layui-badge layui-bg-gray">海纳百川</span>
                        <span class="layui-badge layui-bg-gray">海纳百川</span>
                        <span class="layui-badge layui-bg-gray">海纳百川</span>
                        <span class="layui-badge layui-bg-gray">海纳百川</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 右 -->
        <div class="layui-col-sm12 layui-col-md9">
            <div class="layui-card">
                <div class="layui-card-body layui-text">

                    <div class="layui-tab layui-tab-brief" lay-filter="userInfoTab">
                        <ul class="layui-tab-title">
                            <li class="layui-this">基本信息</li>
                            <li>修改密码</li>
                        </ul>
                        <div class="layui-tab-content">
                            <div class="layui-tab-item layui-show">
                                <div class="layui-form user-info-form" style="max-width: 400px;padding-top: 25px;">
                                    <input type="hidden" name="avatar" id="photo" th:value="${user.avatar}" >
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">用户名称:</label>
                                        <div class="layui-input-block">
                                            <input type="text" class="layui-input" th:value="${user.userName}" />
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">手机号码:</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="phonenumber" class="layui-input" lay-verify="required" th:value="${user.phonenumber}" />
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">邮箱地址:</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="email" class="layui-input" lay-verify="required" th:value="${user.email}"  />
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">用户性别:</label>
                                        <div class="layui-input-block">
                                            <input type="radio" name="sex" value="0" title="男" th:field="${user.sex}">
                                            <input type="radio" name="sex" value="1" title="女" th:field="${user.sex}">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">创建时间:</label>
                                        <div class="layui-input-block">
                                            <span style="line-height: 38px;" class="layui-elip">[[${#dates.format(user.createTime, 'yyyy-MM-dd HH:mm:ss')}]]</span>
                                        </div>

                                    </div>
                                    <div class="layui-form-item">
                                        <div class="layui-input-block">
                                            <button class="layui-btn" lay-filter="setmyinfo" lay-submit>更新基本信息</button>
                                        </div>
                                    </div>

                                </div>

                            </div>
                            <div class="layui-tab-item">
                                <div class="layui-form user-info-form" style="max-width: 400px;padding-top: 25px;">
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">当前密码:</label>
                                        <div class="layui-input-block">
                                            <input type="password" name="oldPassword" lay-verify="required" lay-verType="tips" class="layui-input" placeholder="请输入当前用户密码"/>
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">新密码:</label>
                                        <div class="layui-input-block">
                                            <input type="password" id="newPassword" name="newPassword" lay-verify="pass" lay-verType="tips" class="layui-input" placeholder="新密码必须6到12位，且不能出现空格"/>
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">确认新密码:</label>
                                        <div class="layui-input-block">
                                            <input type="password" name="confirmPassword" lay-verify="repass" lay-verType="tips" class="layui-input" placeholder="再次输入新密码保证一致"/>
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <div class="layui-input-block">
                                            <button class="layui-btn" lay-filter="setmypass" lay-submit>更新密码</button>
                                        </div>
                                    </div>

                                </div>

                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- js部分 -->
<script type="text/javascript" src="../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script th:inline="none">
    layui.use(['index', 'form', 'admin'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var admin = layui.admin;

        var prefix = ctx + "system/user";

        // 裁剪图片弹窗
        $('#editimg').click(function () {
            admin.cropImg({
                imgSrc: $('#img').attr('src'),
                onCrop: function (res) {
                    var blob = admin.dataURLtoBlob(res);
                    var thisRes = res;
                    var formData = new FormData();
                    formData.append('avatarfile', blob, new Date().getTime() + '.jpg');

                    $.ajax({
                        url: prefix + '/profile/updateAvatar', //用于文件上传的服务器端请求地址
                        dataType:'json',
                        method:"post",
                        data: formData,
                        processData: false,
                        contentType: false,
                        success:function(res){
                            console.log(JSON.stringify(res));
                            if(res.code == 0){
                                $("#img").attr('src', thisRes);
                                admin.success('头像更新成功!');
                            }else{
                                admin.error('头像更新失败!');
                            }

                        }
                    });
                }
            });
        });

        //自定义验证
        form.verify({
            //我们既支持上述函数式的方式，也支持下述数组的形式
            //数组的两个值分别代表：[正则匹配、匹配不符时的提示文字]
            pass: [
                /^[\S]{6,12}$/
                ,'密码必须6到12位，且不能出现空格'
            ]

            //确认密码
            ,repass: function(value){
                if(value !== $('#newPassword').val()){
                    return '两次密码输入不一致';
                }
            }
        });

        /* 监听用户密码提交 */
        form.on('submit(setmypass)', function(data){
            admin.req(prefix + "/profile/resetPwd",data.field, function(res){
                if(res.code == 0){
                    admin.success('密码修改成功!');
                }else{
                    admin.error('密码修改失败!');
                }
            },'post')
        });

        /* 监听用户信息提交 */
        form.on('submit(setmyinfo)', function(data){
            admin.req(prefix + "/profile/update", data.field, function(res){
                if(res.code == 0){
                    admin.success('更新成功');
                }else{
                    admin.error('更新失败');
                }
            },'post')
        });

    });
</script>
</body>
</html>
