<!-- 修改密码表单 -->
<form class="layui-form model-form" th:onsubmit="return false">
	<input id="userId" name="userId"  type="hidden"  th:value="${user.userId}" />
	<div class="layui-form-item">
		<label class="layui-form-label">当前角色</label>
		<div class="layui-input-block">
			<input type="text" name="loginName" th:value="${user.dept.deptName}+ '_' + ${user.roles[0].roleName}" class="layui-input layui-disabled" disabled/>
		</div>
	</div>
	<div class="layui-form-item">
		<label class="layui-form-label">所有角色</label>
		<div class="layui-input-block">
			<select id = "roleAuthId" name="roleAuthId" lay-verify="required" lay-verType="tips" required>
				<option th:each="userRoleDept : ${userRoleDeptList}" th:text="${userRoleDept.deptName} + '_' + ${userRoleDept.roleName}" th:value="${userRoleDept.id}"></option>
			</select>
		</div>
	</div>
	<div class="layui-form-item">
		<div class="layui-input-block text-right">
			<button class="layui-btn layui-btn-primary" type="button" ew-event="closePageDialog">取消</button>
			<button class="layui-btn" lay-filter="submit-role" lay-submit>确定</button>
		</div>
	</div>
</form>

<script th:inline="javascript">
	var ctx = [[@{/}]];

</script>

<!-- js部分 -->
<script th:inline="none">
	layui.use(['index','layer', 'form', 'admin', 'formX'], function () {
		var $ = layui.jquery;
		var layer = layui.layer;
		var form = layui.form;
		var admin = layui.admin;
		var index = layui.index;

		var prefix = ctx + "system/user";

		layui.use('form', function(){
			var form = layui.form; //只有执行了这一步，部分表单元素才会自动修饰成功
			form.render('select'); //刷新select选择框渲染
		});

		// 监听提交
		form.on('submit(submit-role)', function (data) {
			var roleAuthId = $("#roleAuthId").val();
			var userId = $("#userId").val();
			admin.req(prefix + "/changeUserRoleAuth", {userId:userId,roleAuthId:roleAuthId}, function(res){
				if(res.code == 0){
					admin.success('角色切换成功!');
					//清空tab缓存
					index.clearTabCache();
					//强制刷新页面
					window.location.reload(true);
				}else{
					admin.error('角色切换失败!');
				}
			},'post')
		});
	});
</script>
