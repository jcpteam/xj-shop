<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8">
	<title>事件日志详细</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
	<style>
		.layui-input-static{
			border-width: 0px;
		}
	</style>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false">
	<div class="layui-card">
		<div class="layui-card-body">
			<div class="layui-row">
				<div class="layui-form-item">
					<label class="layui-form-label">用户ID:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${eventLog.userId}"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">用户名称:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${eventLog.userName}"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">事件:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${eventLog.eventCode}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">事件名称:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${eventLog.eventName}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">来源:</label>
					<div class="layui-input-block">
						<input type="text" class="layui-input" th:value="${eventLog.source}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">参数:</label>
					<div class="layui-input-block">
						<pre id="jsonResult"></pre>
					</div>
				</div>
			</div>
		</div>
	</div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script th:inline="javascript">
	layui.use(['index', 'form', 'table', 'jsonview', 'ext'], function(){
		var $ = layui.$;
		var form = layui.form;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;

		$(function() {
			var datas = [[${eventLog.datas}]];
			if ($.common.isNotEmpty(datas) && datas.length < 2000) {
				$("#jsonResult").JSONView(datas);
			} else {
				$("#jsonResult").text(datas);
			}
		});

	})
</script>
</body>
</html>
