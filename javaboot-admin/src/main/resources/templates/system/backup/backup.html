<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>数据库备份</title>
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css?v=316}"/>
	<!--[if lt IE 9]>
	<script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
	<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->
</head>
<body class="bg-white">



<!-- 正文开始 -->
<div class="layui-fluid">
	<div class="layui-card">
		<table id="dataTable" lay-filter="dataTable"></table>
	</div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
	<div class="layui-btn-container">
		<button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="backup" shiro:hasPermission="system:backup:backup"><i class="layui-icon">&#xe669;</i>备份数据库</button>
	</div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
	<a class="layui-btn layui-btn-xs" lay-event="recovery" shiro:hasPermission="system:backup:backup">还原</a>
	<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="deleteFile" shiro:hasPermission="system:backup:backup">删除</a>
</script>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script type="text/javascript" th:inline="javascript">
	var ctx = [[@{/}]];
	var datas = [[${@dict.getType('sys_yes_no')}]];
</script>
<script type="text/javascript" th:inline="none">
	layui.use(['index', 'layer', 'form', 'table', 'util', 'laydate', 'ext'], function () {
		var $ = layui.jquery;
		var layer = layui.layer;
		var form = layui.form;
		var table = layui.table;
		var util = layui.util;
		var laydate = layui.laydate;
		var ext = layui.ext;
		var admin = layui.admin;
		var index = layui.index;

		var prefix = ctx + "system/backup";
		var url = prefix + "/files";

		table.render({
			elem: '#dataTable'
			,url: url
			,method: 'POST'
			,toolbar: '#toolbarHead'
			,height: 'full-100'
			,cellMinWidth: 80
			,page: true
			,request: {
				pageName: 'pageNum' //页码的参数名称，默认：page
				,limitName: 'pageSize' //每页数据量的参数名，默认：limit
			}
			,limit: 10
			,cols: [[
				{type: 'checkbox'}
				,{type: 'numbers', title: '序号'}
				,{field: 'name', title: '名称'}
				,{field: 'time', title: '备份时间'}
				,{field: 'operate', title: '操作', width: 150, toolbar: '#toolbarRow', fixed: 'right'}
			]]
			,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
				return {
					"code": res.code, //解析接口状态
					"msg": res.msg, //解析提示文本
					"count": res.total, //解析数据长度
					"data": res.rows //解析数据列表
				};
			}
		});

		//监听搜索
		form.on('submit(searchBtn)', function (data) {
			var field = data.field;
			console.log(JSON.stringify(field));
			//执行重载
			table.reload('dataTable', {
				where: field
			});
		});

		//头工具栏事件
		table.on('toolbar(dataTable)', function(obj){
			switch(obj.event){
				case 'backup':
					active.backup();
					break;
			};
		});

		//行工具栏事件
		table.on('tool(dataTable)', function (obj) {
			var data = obj.data;
			if (obj.event === 'recovery') {
				active.recovery(data.name);
			} else if (obj.event === 'deleteFile') {
				active.deleteFile(data.name);
			}
		});

		//事件
		var active = {
			backup: function () {
				admin.confirm('确认要执行数据库备份任务吗?',function(){
					admin.req(prefix + "/backup", null, function (data) {
						if (data.code == 0) {
							setTimeout(function () {
								table.reload('dataTable');
							}, 500)
							admin.success('备份成功!');
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
			,recovery: function () {
				admin.confirm('确认要执行还原数据库吗?',function(){
					admin.req(prefix + "/recovery", null, function (data) {
						if (data.code == 0) {
							table.reload('dataTable');
							admin.success('还原成功!');
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
			,deleteFile: function (name) {
				admin.confirm('确认要删除备份吗?',function(){
					admin.req(prefix + "/delete", {name: name}, function (data) {
						if (data.code == 0) {
							table.reload('dataTable');
							admin.success('删除成功!');
						} else {
							admin.error(data.msg);
						}
					},'post')
				});
			}
		}
	});
</script>
</body>

</html>
