<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8">
	<title>修改字典数据</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false" th:object="${dict}" th:action="@{/system/dict/data/edit}">
	<div class="layui-card">
		<div class="layui-card-body">
			<div class="layui-row">
				<input name="dictCode"  type="hidden"  th:field="*{dictCode}" />
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">字典标签:</label>
					<div class="layui-input-block">
						<input name="dictLabel" type="text" th:field="*{dictLabel}" class="layui-input" lay-verType="tips" lay-verify="required"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">字典键值:</label>
					<div class="layui-input-block">
						<input name="dictValue" type="text" th:field="*{dictValue}" class="layui-input" lay-verType="tips" lay-verify="required"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">字典类型:</label>
					<div class="layui-input-block">
						<input name="dictType" type="text" th:field="*{dictType}" class="layui-input" lay-verType="tips" lay-verify="required" readonly="true" th:value="${dictType}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">样式属性:</label>
					<div class="layui-input-block">
						<input name="cssClass" type="text" th:field="*{cssClass}" class="layui-input" lay-verType="tips" lay-verify="">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">字典排序:</label>
					<div class="layui-input-block">
						<input name="dictSort" type="text" th:field="*{dictSort}" class="layui-input" lay-verType="tips" lay-verify="digitsP">
					</div>
				</div>

				<!--回显样式-->
				<div class="layui-form-item">
					<label class="layui-form-label">回显样式:</label>
					<div class="layui-input-block">
						<select name="listClass" lay-verify="">
							<option value=""        th:field="*{listClass}">请选择回显样式</option>
							<option value="default" th:field="*{listClass}">默认</option>
							<option value="primary" th:field="*{listClass}">主要</option>
							<option value="success" th:field="*{listClass}">成功</option>
							<option value="info"    th:field="*{listClass}">信息</option>
							<option value="warning" th:field="*{listClass}">警告</option>
							<option value="danger"  th:field="*{listClass}">危险</option>
						</select>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">系统默认:</label>
					<div class="layui-input-block" th:with="type=${@dict.getType('sys_yes_no')}">
						<input th:each="dict,dictStat:${type}" type="radio" name="isDefault" th:title="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{isDefault}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">状态:</label>
					<div class="layui-input-block" th:with="type=${@dict.getType('sys_normal_disable')}">
						<input th:each="dict,dictStat:${type}" type="radio" name="status" th:title="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{status}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">备注:</label>
					<div class="layui-input-block">
						<textarea name="remark" maxlength="500" class="layui-textarea" rows="3">[[*{remark}]]</textarea>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="layui-form-item layui-hide">
		<button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
		<button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
	</div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script th:inline="none">
	layui.use(['index', 'form', 'formX', 'table', 'ext'], function(){
		var $ = layui.$;
		var form = layui.form;
		var formX = layui.formX;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;

	})
</script>
</body>
</html>
