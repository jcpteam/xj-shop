<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8">
	<title>修改字典类型</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form" id="inputForm" th:onsubmit="return false" th:action="@{/system/dict/edit}" th:object="${dict}">
	<div class="layui-card">
		<div class="layui-card-body">
			<div class="layui-row">
				<input id="dictId" name="dictId"  type="hidden" th:field="*{dictId}" />
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">字典名称:</label>
					<div class="layui-input-block">
						<input name="dictName" th:field="*{dictName}" type="text" class="layui-input" lay-verType="tips" lay-verify="required"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label layui-form-required">字典类型:</label>
					<div class="layui-input-block">
						<input name="dictType" th:field="*{dictType}" type="text" class="layui-input" lay-verType="tips" lay-verify="required"/>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">字典状态:</label>
					<div class="layui-input-block" th:with="type=${@dict.getType('sys_normal_disable')}">
						<input th:each="dict,dictStat:${type}" type="radio" name="status" th:title="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{status}">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">备注:</label>
					<div class="layui-input-block">
						<textarea name="remark" maxlength="500" class="layui-textarea" rows="3">[[*{remark}]]</textarea>
					</div>
				</div>
			</div>

		</div>
	</div>

	<div class="layui-form-item layui-hide">
		<button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
		<button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
	</div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script th:inline="none">
	layui.use(['index', 'form', 'formX', 'table', 'ext'], function(){
		var $ = layui.$;
		var form = layui.form;
		var formX = layui.formX;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;

	})
</script>
</body>
</html>
