<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>if (window !== top) top.location.replace(location.href);</script>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="../static/assets/images/favicon.ico" rel="icon" th:href="@{/assets/images/favicon.ico}">
    <title>登录 - JavaBoot 经典模块化快速开发框架</title>
    <link rel="stylesheet" href="../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <style>
        body {
            background-image: url("/assets/images/bg-login.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
        }

        body:before {
            content: "";
            background-color: rgba(0, 0, 0, .2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .login-wrapper {
            max-width: 420px;
            padding: 20px;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
            z-index: 2;
        }

        .login-wrapper > .layui-form {
            padding: 25px 30px;
            background-color: #fff;
            box-shadow: 0 3px 6px -1px rgba(0, 0, 0, 0.19);
            box-sizing: border-box;
            border-radius: 4px;
        }

        .login-wrapper > .layui-form > h2 {
            color: #333;
            font-size: 18px;
            text-align: center;
            margin-bottom: 25px;
        }

        .login-wrapper > .layui-form > .layui-form-item {
            margin-bottom: 25px;
            position: relative;
        }

        .login-wrapper > .layui-form > .layui-form-item:last-child {
            margin-bottom: 0;
        }

        .login-wrapper > .layui-form > .layui-form-item > .layui-input {
            height: 46px;
            line-height: 46px;
            border-radius: 2px !important;
        }

        .login-wrapper .layui-input-icon-group > .layui-input {
            padding-left: 46px;
        }

        .login-wrapper .layui-input-icon-group > .layui-icon {
            width: 46px;
            height: 46px;
            line-height: 46px;
            font-size: 20px;
            color: #909399;
            position: absolute;
            left: 0;
            top: 0;
            text-align: center;
        }

        .login-wrapper > .layui-form > .layui-form-item.login-captcha-group {
            padding-right: 135px;
        }

        .login-wrapper > .layui-form > .layui-form-item.login-captcha-group > .login-captcha {
            height: 46px;
            width: 120px;
            cursor: pointer;
            box-sizing: border-box;
            border: 1px solid #e6e6e6;
            border-radius: 2px !important;
            position: absolute;
            right: 0;
            top: 0;
        }

        .login-wrapper > .layui-form > .layui-form-item > .layui-form-checkbox {
            margin: 0 !important;
            padding-left: 25px;
        }

        .login-wrapper > .layui-form > .layui-form-item > .layui-form-checkbox > .layui-icon {
            width: 15px !important;
            height: 15px !important;
        }

        .login-wrapper > .layui-form .layui-btn-fluid {
            height: 48px;
            line-height: 48px;
            font-size: 16px;
            border-radius: 2px !important;
        }

        .login-wrapper > .layui-form > .layui-form-item.login-oauth-group > a > .layui-icon {
            font-size: 26px;
        }

        .login-copyright {
            color: #eee;
            padding-bottom: 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        @media screen and (min-height: 550px) {
            .login-wrapper {
                margin: -250px auto 0;
                position: absolute;
                top: 50%;
                left: 0;
                right: 0;
                width: 100%;
            }

            .login-copyright {
                position: absolute;
                bottom: 0;
                right: 0;
                left: 0;
            }
        }

        .layui-btn {
            background-color: #5FB878;
            border-color: #5FB878;
        }

        .layui-link {
            color: #5FB878 !important;
        }
    </style>
</head>
<body>

<div class="login-wrapper layui-anim layui-anim-scale layui-hide">
    <form class="layui-form">
        <h2>用户登录</h2>
        <div class="layui-form-item layui-input-icon-group">
            <i class="layui-icon layui-icon-username"></i>
            <input class="layui-input" name="username" placeholder="请输入登录账号" autocomplete="off" lay-verType="tips" lay-verify="required" value=""/>
        </div>
        <div class="layui-form-item layui-input-icon-group">
            <i class="layui-icon layui-icon-password"></i>
            <input class="layui-input" name="password" placeholder="请输入登录密码" type="password" lay-verType="tips" lay-verify="required" value=""/>
        </div>
        <div class="layui-form-item layui-input-icon-group login-captcha-group" th:if="${captchaEnabled==true}">
            <i class="layui-icon layui-icon-auz"></i>
            <input class="layui-input" name="validateCode" placeholder="请输入验证码" autocomplete="off" lay-verType="tips" lay-verify="required" />
            <img class="login-captcha" th:src="@{captcha/captchaImage(type=${captchaType})}" alt="验证码"/>
        </div>
        <div class="layui-form-item">
            <input type="checkbox" id="rememberMe" lay-filter="rememberMe" title="记住密码" lay-skin="primary" th:checked="${rememberMe}? true: false">
            <input type="hidden" id="rememberMeInput" name="rememberMe" th:value="${rememberMe}"/>
<!--            <a href="reg" class="layui-link pull-right">注册账号</a>-->
        </div>
        <div class="layui-form-item">
            <button class="layui-btn layui-btn-fluid" lay-filter="loginSubmit" lay-submit>登录</button>
        </div>
        <!--<div class="layui-form-item login-oauth-group text-center">
            <a href="javascript:;"><i class="layui-icon layui-icon-login-qq" style="color:#3492ed;"></i></a>&emsp;
            <a href="javascript:;"><i class="layui-icon layui-icon-login-wechat" style="color:#4daf29;"></i></a>&emsp;
            <a href="javascript:;"><i class="layui-icon layui-icon-login-weibo" style="color:#CF1900;"></i></a>
        </div>-->
    </form>
</div>
<div class="login-copyright">Copyright © 2021 湖南湘佳电子商务有限公司. All rights reserved.</div>

<script th:inline="javascript">
    var ctx = [[@{/}]];
</script>

<!-- js部分 -->
<script type="text/javascript" src="../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script type="text/javascript" th:inline="javascript">
    layui.use(['index','layer', 'form', 'admin'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var admin = layui.admin;
        var index = layui.index;

        $('.login-wrapper').removeClass('layui-hide');

        // 表单提交
        form.on('submit(loginSubmit)', function (obj) {
            admin.showLoading("#loginBtn", 1, '.9');
            //请求登入接口
            admin.ajax({
                url: ctx + "login",
                data: obj.field,
                type: 'post',
                dataType: 'json',
                success: function(res){
                    console.log(JSON.stringify(res));
                    if(res.code == 0){
                        setTimeout(function () {
                            admin.removeLoading('#loginBtn', true, true);
                        }, 2000);
                        admin.success('登录成功');

                        //在实际项目中，登录成功后应该调用此方法清除Tab记忆
                        index.clearTabCache();

                        location.href = ctx + 'index';
                    }else{
                        admin.error(res.msg);
                        setTimeout(function () {
                            admin.removeLoading('#loginBtn', true, true);
                        }, 2000);
                    }
                }
            });
            return false;
        });

        form.on('checkbox(rememberMe)', function(data){
            $("#rememberMeInput").val(data.elem.checked);
        });

        // 图形验证码
        $('.login-captcha').click(function () {
            this.src = [[@{captcha/captchaImage(type=${captchaType})}]] + '&t=' + (new Date).getTime();;
        });

        //账号注册
        $('#regUser').click(function () {
            layui.layer.msg('抱歉，后台用户未开放注册!', {icon: 5, anim: 6});
        });
    });
</script>

</body>
</html>
