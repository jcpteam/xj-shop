<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>登录</title>
    <link rel="stylesheet" href="../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../static/assets/css/login.css?v=316" th:href="@{/assets/css/login.css?v=316}"/>
    <link rel="stylesheet" href="../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css?v=316}"/>
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <script>
        if(window.top!==window.self){window.top.location=window.location};
    </script>
</head>
<body>
<div class="login-wrapper">
    <div class="login-header">
        <img src="../static/assets/images/logo.png" th:src="@{/assets/images/logo.png}"> JavaBoot后台开发框架
    </div>
    <div class="login-body">
        <div class="layui-card">
            <div class="layui-card-header">
                <i class="layui-icon layui-icon-engine"></i>&nbsp;&nbsp;用户登录
            </div>
            <form class="layui-card-body layui-form layui-form-pane">
                <div class="layui-form-item">
                    <label class="layui-form-label"><i class="layui-icon layui-icon-username"></i></label>
                    <div class="layui-input-block">
                        <input name="username" type="text" placeholder="账号" class="layui-input" lay-verType="tips" lay-verify="required"/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label"><i class="layui-icon layui-icon-password"></i></label>
                    <div class="layui-input-block">
                        <input name="password" type="password" placeholder="密码" class="layui-input" lay-verType="tips" lay-verify="required"/>
                    </div>
                </div>
                <div class="layui-form-item" th:if="${captchaEnabled==true}">
                    <label class="layui-form-label"><i class="layui-icon layui-icon-vercode"></i></label>
                    <div class="layui-input-block">
                        <div class="layui-row inline-block">
                            <div class="layui-col-xs7">
                                <input name="validateCode" type="text" placeholder="验证码" class="layui-input" autocomplete="off" lay-verType="tips" lay-verify="required"/>
                            </div>
                            <div class="layui-col-xs5" style="padding-left: 6px;">
                                <img class="login-captcha" th:src="@{captcha/captchaImage(type=${captchaType})}" >
                            </div>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item" hidden>
                    <div class="layui-input-block">
                        <input type="checkbox" lay-filter="rememberMe" title="记住我" lay-skin="primary" >
                        <input id="rememberMe" name="rememberMe" value="false" th:type="hidden">
                    </div>
                </div>
                <div class="layui-form-item">
                    <a href="javascript:;" class="layui-link">帐号注册</a>
                    <a href="javascript:;" class="layui-link pull-right">忘记密码？</a>
                </div>
                <div class="layui-form-item">
                    <button id="loginBtn" lay-filter="login-submit" class="layui-btn layui-btn-fluid" lay-submit>登 录</button>
                </div>
                <div class="layui-form-item login-other">
                    <label>第三方登录</label>
                    <a href="javascript:;"><i class="layui-icon layui-icon-login-qq"></i></a>
                    <a href="javascript:;"><i class="layui-icon layui-icon-login-wechat"></i></a>
                    <a href="javascript:;"><i class="layui-icon layui-icon-login-weibo"></i></a>
                </div>
            </form>
        </div>
    </div>

    <div class="login-footer">
        <p>© 2019 javaboot.cn 版权所有</p>
        <p>
            <span><a href="http://www.javaboot.cn" target="_blank">获取授权</a></span>
            <span><a href="http://www.javaboot.cn/doc/" target="_blank">开发文档</a></span>
        </p>
    </div>
</div>

<script th:inline="javascript">
    var ctx = [[@{/}]];
    var captchaType = [[${captchaType}]];
    var captchaEnabled= [[${captchaEnabled}]];
</script>

<!-- js部分 -->
<script type="text/javascript" src="../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>
<script type="text/javascript" th:inline="javascript">
    layui.use(['layer', 'form', 'admin'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var admin = layui.admin;

        // 表单提交
        form.on('submit(login-submit)', function (obj) {
            admin.showLoading("#loginBtn", 1, '.9');
            //请求登入接口
            admin.ajax({
                url: ctx + "login",
                data: obj.field,
                type: 'post',
                dataType: 'json',
                success: function(res){
                    console.log(JSON.stringify(res));
                    if(res.code == 0){
                        setTimeout(function () {
                            admin.removeLoading('#loginBtn', true, true);
                        }, 2000);
                        admin.success('登录成功');
                        location.href = ctx + 'index';
                    }else{
                        admin.error(res.msg);
                        setTimeout(function () {
                            admin.removeLoading('#loginBtn', true, true);
                        }, 2000);
                    }
                }
            });
            return false;
        });

        form.on('checkbox(rememberMe)', function(data){
            console.log(data.elem.checked); //是否被选中，true或者false
            $("#rememberMe").val(data.elem.checked);
        });

        // 图形验证码
        $('.login-captcha').click(function () {
            this.src = [[@{captcha/captchaImage(type=${captchaType})}]] + '&t=' + (new Date).getTime();;
        });
    });
</script>
</body>
</html>
