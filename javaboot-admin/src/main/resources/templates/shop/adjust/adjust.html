<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('商品调拨信息列表')" />
</head>
<body>

<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card">
            <!-- 搜索区 -->
            <form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">所属区域：</label>
                        <div class="layui-input-inline">
                            <select name="deptId"  id="deptId"   >
                                <option  value="" th:checked="true">选择区域</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">入库单状态:</label>
                        <div class="layui-input-inline">
                            <select name="stockStatus"  id="stockStatus">
                                <option value="">所有</option>
                                <option value="0">未生成</option>
                                <option value="1">已生成</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">调拨编号：</label>
                        <div class="layui-input-inline">
                            <input class="layui-input" name="adjustNo" type="text" placeholder="请输入调拨编号"/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">创建时间：</label>
                        <div class="layui-input-inline">
                            <input id="createTime" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
                            <input id="beginDate" type="hidden" name="beginDate">
                            <input id="endDate" type="hidden" name="endDate">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">源仓库：</label>
                        <div class="layui-input-inline">
                            <select th:with="type=${houseList}" name="sourceWarehouseId" id="sourceWarehouseId" lay-filter="sourceWarehouseId" lay-search
                                    >
                                <option   value="">选择源仓库</option>
                                <option  th:each="dict:${type}"  th:value="${dict.storeId}" th:text="${{dict.storeName}}"></option>
                            </select>
                         </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-auto">目标仓库：</label>
                        <div class="layui-input-inline">
                            <select th:with="type=${houseList}" name="targetWarehouseId" id="targetWarehouseId" lay-filter="targetWarehouseId" lay-search
                               >
                                <option   value="">选择目标仓库</option>
                                <option  th:each="dict:${type}"  th:value="${dict.storeId}" th:text="${{dict.storeName}}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="layui-inline" style="padding-left: 13px;">
                        <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
                            <i class="layui-icon layui-icon-search"></i>搜索
                        </button>
                        <button class="layui-btn layui-btn-sm icon-btn" type="reset" id="restBtn">
                            <i class="layui-icon layui-icon-refresh"></i>重置
                        </button>
                        <a class="layui-btn layui-btn-primary form-search-expand layui-hide" data-expand="true">
                            展开 <i class="layui-icon layui-icon-down"></i>
                        </a>
                    </div>
                </div>
            </form>

            <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>
        </div>

    </div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add" shiro:hasPermission="shop:adjust:add"><i class="layui-icon layui-icon-addition"></i>新增</button>
        <button class="layui-btn layui-btn-warm layui-btn-sm" lay-event="edit" shiro:hasPermission="shop:adjust:edit"><i class="layui-icon layui-icon-edit"></i>修改</button>
        <button class="layui-btn layui-btn-danger layui-btn-sm" lay-event="batchdel" shiro:hasPermission="shop:adjust:remove"><i class="layui-icon layui-icon-delete"></i>删除</button>
<!--        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="export" shiro:hasPermission="shop:adjust:export"><i class="layui-icon layui-icon-export"></i>导出</button>-->
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="batchStock" shiro:hasPermission="shop:adjust:add"><i class="layui-icon layui-icon-addition"></i>生成入库单</button>
    </div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
    <a class="layui-btn layui-btn-xs" lay-event="view" shiro:hasPermission="shop:adjust:edit">查看</a>
    <a class="layui-btn layui-btn-xs" lay-event="edit" shiro:hasPermission="shop:adjust:edit">修改</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del" shiro:hasPermission="shop:adjust:remove">删除</a>
</script>

<script type="text/html" id="dialogEditDialog1">
    <form id="dialogEditForm1" lay-filter="dialogEditForm1" class="layui-form model-form no-padding">
        <input name="ptId" type="hidden"/>
        <div class="model-form-body" style="height: 70px;" onscroll="layui.admin.hideFixedEl();">
            <div class="layui-form-item">
                <label class="layui-form-label layui-form-required">入库日期:</label>
                <div class="layui-input-block">
                    <input id="stockDate" name="stockDate" placeholder="入库日期" class="layui-input" autocomplete="off"
                           lay-verify="required" lay-verType="tips" required/>
                </div>
            </div>
        </div>
        <div class="layui-form-item text-center model-form-footer">
            <button class="layui-btn layui-btn-primary" type="button" ew-event="closeDialog">取消</button>
            <button class="layui-btn" lay-filter="dialogEditSubmit1" lay-submit>保存</button>
        </div>
    </form>
</script>

<!-- js部分 -->
<th:block th:include="include :: footer" />
<script type="text/javascript" th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script type="text/javascript" th:inline="none">
    layui.use(['index', 'layer', 'form', 'table', 'util', 'ext', 'laydate'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var util = layui.util;
        var laydate = layui.laydate;
        var ext = layui.ext;
        var admin = layui.admin;
        var index = layui.index;

        var prefix = ctx + "shop/adjust";
        var listUrl = prefix + "/list";
        var createUrl = prefix + "/add";
        var updateUrl = prefix + "/edit/{id}";
        var removeUrl = prefix + "/remove";
        var exportUrl = prefix + "/export";
        var stockUrl = prefix + "/adjust2stock";

        //所属区域------------------------------------------------------------------------------------------------------
        admin.req(ctx + "system/dept/getLoginUserDept", { }, function (result) {
            var select= document.getElementById('deptId');
            for (var i=0;i<result.data.length;i++) {
                var data= result.data[i];
                var option = document.createElement("option");
                option.setAttribute("value", data.value);
                option.innerText =data.name;
                select.appendChild(option)
            }
            form.render('select');
        },'get')

        //日期范围
        laydate.render({
            elem: '#createTime'
            ,type: 'datetime'
            , range: '~'
            , done: function (value, date, endDate) {
                if (value != null && value != '') {
                    var b = $.trim(value.split('~')[0]);
                    var e = $.trim(value.split('~')[1]);
                    $("#beginDate").val(b);
                    $("#endDate").val(e);
                }
            }
        });

        $("#restBtn").click(function () {
            $("input[type='hidden']").val("")
        })

        function saveStock() {
            var checkStatus = table.checkStatus('dataTable')
                , checkData = checkStatus.data; //得到选中的数据
            if (checkData.length === 0) {
                return admin.info('请选择数据');
            }

            admin.open({
                type: 1,
                title: '设置入库日期',
                fixed: true,
                offset: 'auto',
                content: $('#dialogEditDialog1').html(),
                success: function (layero, dIndex) {
                    $(layero).children('.layui-layer-content').css('overflow', 'visible');
                    // 时间初始化
                    laydate.render({
                        elem: '#stockDate'
                        ,trigger: 'click'
                    });

                    // 表单提交事件
                    form.on('submit(dialogEditSubmit1)', function (data) {

                        var ids = [];
                        layui.each(checkData, function (index, item) {
                            ids.push(item.adjustId);
                        });

                        admin.req(stockUrl, {ids: ids.join(','),stockDate:$("#stockDate").val()}, function (result) {
                            if (result.code == 0) {
                                table.reload('dataTable');
                                admin.success('生成成功!');
                            } else {
                                admin.error(result.msg);
                            }
                            admin.closeDialog("#dialogEditForm1")
                        },'post')

                        return false;
                    });

                }
            });
        }


        queryList()
        function queryList(field){
            var params = {}
            if (field != null) {
                params = field;
            }
            params.orderByColumn = 'last_modify_time';
            params.isAsc = 'desc'

        table.render({
            elem: '#dataTable'
            ,url: listUrl
            ,method: 'POST'
            ,defaultToolbar:[{title:'导出',layEvent: 'LAYTABLE_EXCEL',icon: 'layui-icon-export'}]
            ,toolbar: '#toolbarHead'
            ,height: 'full-100'
            ,cellMinWidth: 80
            ,page: true
            ,request: {
                pageName: 'pageNum' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            ,where:params
            ,limit: 10
            ,cols: [[
                {type: 'checkbox'}
                ,{field: 'adjustNo', title: '调拨编号'}
                ,{field: 'adjustId', title: '调拨id', hide: true}
                ,{field: 'deptName', title: '所属区域'}
                ,{field: 'sourceWarehouseName', title: '源仓库'}
                ,{field: 'targetWarehouseName', title: '目标仓库'}
                ,{field: 'creatorName', title: '调拨人名称'}
                , {field: 'stockStatus', title: '入库单状态',templet:function (d) {
                        if(d.stockStatus  === '1') {
                            return '已生成';
                        } else {
                            return '未生成';
                        }
                }}
                ,{field: 'adjustTime', title: '调拨日期'}
                ,{field: 'stockTime', title: '入库时间'}
                ,{field: 'operate', title: '操作', minWidth: 200, toolbar: '#toolbarRow', fixed: 'right'}
            ]]
            ,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
                return {
                    "code": res.code, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "count": res.total, //解析数据长度
                    "data": res.rows //解析数据列表
                };
            }
        });
        }

        //监听搜索
        form.on('submit(searchBtn)', function (data) {
            var field = data.field;
            //执行重载
            table.reload('dataTable', {
                where: field
                ,page:{curr:1}
            });
        });

        //头工具栏事件
        table.on('toolbar(dataTable)', function(obj){
            switch(obj.event){
                case 'add':
                    active.add();
                    break;
                case 'edit':
                    var checkStatus = table.checkStatus('dataTable')
                            , checkData = checkStatus.data; //得到选中的数据
                    var id = null;
                    if (id == null) {
                        if (checkData.length === 0) {
                            return admin.info('请选择一条数据');
                        } else if (checkData.length > 1) {
                            return admin.info('只能选择一条数据编辑');
                        } else {
                            id = checkData[0].adjustId;
                        }
                    }
                    active.edit(id);
                    break;
                case 'batchdel':
                    active.batchdel();
                    break;
                case 'batchStock':
                    saveStock();
                    break;
                case 'import':
                    break;
                case 'LAYTABLE_EXCEL':
                    $.modal.loading("正在导出数据，请稍后...");
                    $.post(exportUrl, $("#inputForm").serializeArray(), function(result) {
                        if (result.code == web_status.SUCCESS) {
                            window.location.href = ctx + "common/download?fileName=" + encodeURI(result.msg) + "&delete=" + true;
                        } else if (result.code == web_status.WARNING) {
                            $.modal.alertWarning(result.msg)
                        } else {
                            $.modal.alertError(result.msg);
                        }
                        $.modal.closeLoading();
                    });
                    break;
            };
        });

        //行工具栏事件
        table.on('tool(dataTable)', function (obj) {
            var data = obj.data;
            if (obj.event === 'view') {
                active.view(data.adjustId);
            } else if(obj.event === 'edit'){
                active.edit(data.adjustId);
            } else if (obj.event === 'del') {
                active.del(data.adjustId);
            }
        });

        //事件
        var active = {
            batchdel: function () {
                var checkStatus = table.checkStatus('dataTable')
                        , checkData = checkStatus.data; //得到选中的数据

                if (checkData.length === 0) {
                    return admin.info('请选择数据');
                }

                var ids = [];
                layui.each(checkData, function (index, item) {
                    ids.push(item.adjustId);
                });

                admin.confirm('确定删除吗？', function () {
                    admin.req(removeUrl, {ids: ids.join(',')}, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('删除成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            }

            ,view: function (id) {
                var editUrl = updateUrl.replace("{id}", id);
                parent.layui.admin.openDialogView3('查看商品调拨', editUrl,'100%', '100%');
            }
            ,add: function () {
                parent.layui.admin.openUrl('新增商品调拨', createUrl, '100%', '100%',function () {
                    //执行重载
                    queryList(getFormData())
                });
            }
            ,edit: function (id) {
                var editUrl = updateUrl.replace("{id}", id);
                parent.layui.admin.openUrl('修改商品调拨', editUrl, '100%', '100%',function () {
                    //执行重载
                    queryList(getFormData())
                });
            }
            ,del: function(id){
                admin.confirm('确定删除吗?',function(){
                    admin.req(removeUrl, {ids: id}, function (data) {
                        if (data.code == 0) {
                            table.reload('dataTable');
                            admin.success('删除成功!');
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            }
        }
        function getFormData(){
            var d = {
                beginDate:$("#beginDate").val(),
                endDate:$("#endDate").val(),
            }
            return d;
        }
    });
</script>

</body>
</html>
