        /** // 文章列表样式结束 */
        .color-black{
            color:#000923
        }
        .data-card-body {
            height: 350px;
            overflow-y: auto;
            overflow-x: hidden
        }
        .data-card-body::-webkit-scrollbar {/*滚动条整体样式*/

        }

        .data-card-body::-webkit-scrollbar-thumb {/*滚动条里面小方块*/

            -webkit-box-shadow: inset 0 0 5px #fff;
            background: #ddd;

        .data-card-body::-webkit-scrollbar-track {/*滚动条里面轨道*/

<body>


<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row">
        <!-- 右表 -->
        <div class="layui-card">
            <div class="layui-card-body" style="min-height: 535px;">

                <!-- 搜索区 -->
                <form class="layui-form toolbar" th:onsubmit="return false">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label label-auto">输入搜索：</label>
                            <div class="layui-input-inline">
                                <input class="layui-input" name="quotationName" type="text" placeholder="报价单名称"/>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label label-auto">所属区域：</label>
                            <div class="layui-input-inline">
                                <select name="deptId"  id="deptId"   >
                                    <option  value="" th:checked="true">选择区域</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label label-auto">激活状态：</label>
                            <div class="layui-input-block">
                                <input type="checkbox" name="status" checked="true"  lay-filter="switchTest" lay-skin="switch" lay-text="激活|不激活" >
                            </div>
                        </div>
                        <div class="layui-inline" style="padding-left: 13px;">
                            <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn"
                                    id="searchBtn" shiro:hasPermission="shop:quotation:list">
                                <i class="layui-icon layui-icon-search"></i>搜索
                            </button>
                            <button class="layui-btn layui-btn-sm icon-btn" type="reset">
                                <i class="layui-icon layui-icon-refresh"></i>重置
                            </button>
                            <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add"
                                    shiro:hasPermission="shop:quotation:add" id="add"><i
                                    class="layui-icon layui-icon-addition"></i>创建报价单
                            </button>

                        </div>
                    </div>
                </form>

                <div class="layui-tab-content">

                    <div class="layui-tab-item layui-show" style="padding-top: 20px; width: 95%">
                        <div class="layui-row layui-col-space30" id="demoCardList2"></div>
                    </div>

                </div>

            </div>
        </div>

    </div>

</div>

                <span class="application-list-item-tool-item"  >

<!--                </div>-->

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js"
        th:src="@{/assets/libs/layui/layui.js}"></script>

<script type="text/javascript" src="../../../static/assets/js/common.js?v=316"
        th:src="@{/assets/js/common.js}"></script>

<script th:inline="javascript">
    var ctx = [[@{
        /}]];
</script>
<script th:inline="none">
    layui.use(['layer', 'form', 'dataGrid', 'element', 'dropdown','admin'], function () {
        var $ = layui.jquery;
        var form = layui.form;
        var dataGrid = layui.dataGrid;
        var prefix = ctx + "shop/quotation";
        var createUrl = prefix + "/add";
        var updateUrl = prefix + "/edit/{quotationId}";
        var copyUrl = prefix + "/copy";
        var removeUrl = prefix + "/remove";
        var admin = layui.admin;
        //监听搜索
        form.on('submit(searchBtn)', function (data) {
            data.field.status = $("input[name=status]")[0].checked ? '1' : '2'
            queryList(data.field)
        });

        form.on('switch(switchTest)', function(data){
            data.field = {}
            data.field.status = $("input[name=status]")[0].checked ? '1' : '2'
            data.field.deptId = $("#deptId").val()
            data.field.quotationName = $("input[name=quotationName]").val()
            queryList(data.field)
        })
        $("#add").click(function () {
            parent.layui.admin.openDialog('创建报价单', createUrl, '100%', '100%','dataGrid', 'submitBtn',function (res) {
                admin.success('创建成功!');
                queryList()
            });
        });

        queryList()
        /** 应用 */


        dataGrid.on('tool(demoCardList2)', function (obj) {
            if (obj.event === 'edit') {
                var editUrl = updateUrl.replace("{quotationId}", obj.data.quotationId);

                parent.layui.admin.openDialog('更改报价单', editUrl, '100%', '100%', 'dataGrid', 'submitBtn',function (res) {
                    admin.success('更改成功!');
                    queryList()
                });
            } else if (obj.event === 'copy') {
                admin.confirm('确定复制吗?',function(){
                    admin.req(copyUrl, {quotationId:  obj.data.quotationId}, function (data) {
                        if (data.code == 0) {
                            queryList();
                            admin.success('复制成功!');
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            } else if (obj.event === 'toGoods') {
                parent.layui.admin.openUrl(obj.data.quotationName, ctx + "shop/quotationGoods/?quotationId="+obj.data.quotationId, '100%', '100%',function (res) {

                });
            } else if (obj.event === 'remove') {
                admin.confirm('确定删除吗?',function(){
                    admin.req(removeUrl, {ids:  obj.data.quotationId}, function (data) {
                        if (data.code == 0) {
                            queryList();
                            admin.success('删除成功!');
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            }
        });

        function queryList(field) {
            var params={}
            debugger
            if(field!=null){
                params=field;
            }else {
                params.status = '1'
            }
            params.orderByColumn='end_time';
            params.isAsc='asc'
            dataGrid.render({
                url: prefix + "/list",
                method: 'POST',
                elem: '#demoCardList2',
                templet: '#demoCardItem2',
                request: {
                    pageName: 'pageNum'
                    ,limitName: 'pageSize'

                },
                where:params,
                page: {limit: 6, limits: [6, 12, 18, 24, 30]}
                , parseData: function (res) { //将原始数据解析成 table 组件所规定的数据
                    // dataGrid的bug，无数据分页还存在
                    if(res.total == 0) {
                        $(".ew-datagrid-page").hide()
                    }
                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "count": res.total, //解析数据长度
                        "data": res.rows //解析数据列表
                    };

                },
            });
        }

        //所属区域------------------------------------------------------------------------------------------------------
        admin.req(ctx + "system/dept/getLoginUserDept", { }, function (result) {
            var select= document.getElementById('deptId');
            for (var i=0;i<result.data.length;i++) {
                var data= result.data[i];
                var option = document.createElement("option");
                option.setAttribute("value", data.value);
                option.innerText =data.name;
                select.appendChild(option)
            }
            form.render('select');
        },'get')
    });


</script>
</body>
