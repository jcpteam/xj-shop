<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('新增分拣每日考勤')" />
</head>
<body class="bg-white">
<!-- 加载动画-->
<!--<div class="page-loading">-->
    <!--<div class="ball-loader">-->
        <!--<span></span><span></span><span></span><span></span>-->
    <!--</div>-->

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false" th:action="@{/shop/sortingDailyWork/add}" th:object="${storeSortingDailyWork}">
    <div class="layui-card">
        <div class="layui-card-body">
            <div class="layui-row">
                <input name="id" type="hidden">
                <input name="deptId" type="hidden" id="treeId" th:value="${param.deptId}"/>
                <input type="hidden" id="userIds" name="userIds">
                <div class="layui-form-item">
                    <!--<label class="layui-form-label layui-form-required">日期:</label>-->
                    <!--<div class="layui-input-block">-->
                        <!--<input name="workDay" id="workDay" type="text" class="layui-input" lay-verType="tips" lay-verify="required"/>-->
                    <!--</div>-->
                    <label class="layui-form-label layui-form-required">考勤日期:</label>
                    <div class="layui-inline" id="workDay">
                        <div class="layui-input-inline">
                            <input type="text" autocomplete="off" id="workDayStartDate" name="workDayStartDate" class="layui-input" placeholder="开始日期">
                        </div>
                        <div class="layui-form-mid">-</div>
                        <div class="layui-input-inline">
                            <input type="text" autocomplete="off" id="workDayEndDate" name="workDayEndDate" class="layui-input" placeholder="结束日期">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <!--<label class="layui-form-label layui-form-required">所属区域:</label>-->
                    <!--<div class="layui-input-block">-->
                        <!--<select name="deptId" class="layui-select" lay-verType="tips" lay-verify="required">-->
                            <!--<option value="">所有</option>-->
                        <!--</select>-->
                        <!--<div class="layui-form-mid layui-word-aux">代码生成请选择字典属性</div>-->
                    <!--</div>-->
                    <label class="layui-form-label layui-form-required">所属区域:</label>
                    <div class="layui-input-block">
                        <input id="treeName" name="deptName" type="text" placeholder="请选择归属区域" class="layui-input icon-search" lay-verType="tips" lay-verify="required" autocomplete="off" required/>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">选择分拣员:</label>
                    <div class="layui-input-block">
                        <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="layui-form-item layui-hide">
        <button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
        <button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
    </div>
</form>

<th:block th:include="include :: footer" />
<script type="text/javascript" src="../../../static/assets/libs/laydate/laydate.js"
        th:src="@{/assets/libs/laydate/laydate.js}"></script>

<script th:inline="javascript">
    var ctx = [[@{/}]];
    var prefix = ctx + "shop/sortingDailyWork";
    var datas = [[${@dict.getType('sys_normal_disable')}]];
</script>
<script th:inline="none">
    layui.use(['index', 'form', 'formX', 'table', 'laydate', 'upload', 'ext'], function(){
        var $ = layui.$;
        var form = layui.form;
        var formX = layui.formX;
        var layer = layui.layer;
        var table = layui.table;
        var admin = layui.admin;
        var upload = layui.upload;
        var laydate = layui.laydate;


        var userListUrl = ctx + "system/user/list";
        var deptId = $("#treeId").val();
        var selectIds = [];

        //日期范围
        laydate.render({
            elem: '#workDay'
            ,range: ['#workDayStartDate', '#workDayEndDate']
        });

        /*用户管理-新增-选择部门树*/
        $("#treeName").click(function(){
            var treeId = $("#treeId").val();
            var deptId = $.common.isEmpty(treeId) ? "23" : $("#treeId").val();
            var url = ctx + "system/dept/selectDeptTree/" + deptId;
            var options = {
                title: '选择部门',
                width: "380",
                url: url,
                callBack: doSubmit
            };
            $.modal.openOptions(options);
        })

        function doSubmit(index, layero){
            var tree = layero.find("iframe")[0].contentWindow.layui.$._tree;
            if ($.tree.notAllowParents(tree)) {
                var body = layer.getChildFrame('body', index);
                $("#treeId").val(body.find('#treeId').val());
                $("#treeName").val(body.find('#treeName').val());
                console.log('test viv--->1',$("#treeId").val());
                console.log('test viv--->2',$("#treeName").val());
                layer.close(index);

                deptId = $("#treeId").val();
                loadUserTable();
            }
        }

        loadUserTable();
        //用户列表表格
        function loadUserTable(){
            table.render({
                elem: '#dataTable'
                ,url: userListUrl
                ,method: 'POST'
                ,height: 'full-100'
                ,cellMinWidth: 120
                ,page: true
                ,request: {
                    pageName: 'pageNum' //页码的参数名称，默认：page
                    ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
                ,where: {deptId:deptId}
                ,limit: 10
                ,cols: [[
                    {type: 'checkbox'}
                    ,{field: 'loginName', title: '登录名称', width: 120}
                    ,{field: 'userName', title: '用户名称', width: 120}
                    // ,{field: 'email', title: '邮箱'}
                    ,{field: 'phonenumber', title: '手机', width: 150}
                    ,{field: 'status', title: '用户状态', width: 100, templet:function (res) {
                            return $.table.selectDictLabel(datas, res.status);
                        }}
                    // ,{field: 'createTime', title: '创建时间', width: 200}
                ]]
                ,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
                    var selectIds = $("#userIds").val();
                    if(selectIds && res && res.rows){
                        for (var i=0;i<res.rows.length;i++){
                            if(selectIds.indexOf(res.rows[i].userId) != -1 ){
                                res.rows[i]["LAY_CHECKED"] = 'true';
                            }
                        }
                    }

                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "count": res.total, //解析数据长度
                        "data": res.rows //解析数据列表
                    };
                },
                done: function (dataList, curPage, count) {
                    console.log('select userId:' + $("#userIds").val());
                }
            });
        }

        //监听复选框选择
        table.on('checkbox(dataTable)', function(obj){
            console.log('test checkbox--->',obj);
            if(obj.checked){
                selectIds.push(obj.data.userId);
            }else{
                if(selectIds && selectIds.length > 0){
                    var tempIds = [];
                    for (var i =0;i<selectIds.length;i++){
                        if(selectIds[i] != obj.data.userId){
                            tempIds.push(selectIds[i]);
                        }
                    }
                    selectIds = tempIds;
                }
            }
            console.log('test selectIds--->',selectIds);

            // var checkStatus = table.checkStatus('dataTable')
            //     , checkData = checkStatus.data; //得到选中的数据
            // var ids = [];
            // layui.each(checkData, function (index, item) {
            //     ids.push(item.userId);
            // });

            $("#userIds").val(selectIds.join(','));
            console.log('val:' + $("#userIds").val());
        });
    })
</script>
</body>
</html>
