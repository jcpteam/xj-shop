<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('新增采购单')"/>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false">
    <div class="layui-card" style="margin-bottom: 60px">
        <div class="layui-card-body">
            <div class="layui-row">
                <div class="layui-form-item layui-col-md3" >
                    <label class="layui-form-label layui-form-required">
                        所属区域:
                    </label>
                    <div class="layui-input-inline">
                        <select name="deptId" lay-verify="required" lay-filter="deptId" lay-search id="deptId">
                        </select>
                    </div>
                </div>

                <div class="layui-inline layui-col-md3">
                    <label class="layui-form-label layui-form-required">所属仓库:</label>
                    <div class="layui-input-block"  >
                        <select name="warehouseId" id="warehouseId" lay-filter="warehouseId" lay-search lay-verType="tips" lay-verify="required">
                        </select>
                    </div>
                </div>

                <div  class="layui-inline layui-col-md3">
                    <label class="layui-form-label layui-form-required">采购日期:</label>
                    <div class="layui-input-block" >
                        <input id="purchaseDate" type="text" placeholder="请选择入库日期" class="layui-input date-icon"
                               autocomplete="off" readonly="readonly"  lay-verify="required"/>
                        <input type="hidden" name="purchaseDate" >
                    </div>
                </div>

                <div class="layui-inline layui-col-md3">
                    <label class="layui-form-label layui-form-required">供应商:</label>
                    <div class="layui-input-block" style="width: 200px">
                        <select th:with="type=${@dict.getType('store_stock_supplier')}" name="supplierId" id="supplierId" lay-filter="supplierId" lay-search lay-verType="tips"
                                lay-verify="required">
                            <option   value="">请选择供应商</option>
                            <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                        </select>
                    </div>
                </div>

                <div class="layui-form-item layui-row" style="padding-top: 10px">
                    <div class="layui-inline layui-col-md10">
                        <label class="layui-form-label">备注说明:</label>
                        <div class="layui-input-block"  style="width:calc(100% - 100px)">
                            <textarea name="comment" width="100%" placeholder="备注说明" class="layui-textarea" maxlength="1000"
                                      rows="3"></textarea>

                        </div>
                    </div>
                </div>

                <div class="layui-form-item layui-row" style="padding-top: 10px">
                    <div class="layui-inline layui-col-md3">
                        <label class="layui-form-label">调整金额:</label>
                        <div class="layui-input-block"  >
                            <input id="adjustAmount" type="text"  name="adjustAmount" class="layui-input" autocomplete="off"  />
                        </div>
                    </div>
                    <div class="layui-inline layui-col-md3">
                        <div class="layui-input-block"  style="margin-left: 30px">
                            <button id="adjustAmountBtn" class="layui-btn"  lay-filter="calcAdjust">计算</button>
                        </div>
                    </div>
                </div>

                <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>
            </div>
        </div>
        <div class="form-group-bottom text-center">
            <button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
            <button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
        </div>
    </div>

</form>
<style>
    td .layui-form-select {
        margin-top: -10px;
        margin-left: -15px;
        margin-right: -15px;
    }

    .layui-table-cell {
        overflow: visible !important;

    .form-group-bottom {

        right: 0;
        bottom: 0;
        padding: 10px 20px;
        background-color: #fff;
        box-shadow: 0 -1px 2px 0 rgba(0, 0, 0, .05);
    }

</style>

        <option value="">选择数量单位</option>

</form>

<th:block th:include="include :: footer"/>
<script th:inline="javascript">
    var ctx = [[@{
        /}]];
        var prefix = ctx + "shop/purchase";
        var dataList = [];

</script>
<script th:inline="none">
    var closeBtn= parent.document.getElementsByClassName('layui-layer-btn0')[0];
    layui.use(['index', 'form', 'formX', 'table', 'laydate', 'upload', 'ext', 'tableSelect'], function () {
        var $ = layui.$;
        var form = layui.form;
        var formX = layui.formX;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var table = layui.table;
        var admin = layui.admin;
        var tableSelect = layui.tableSelect;
        var iconPrefix = '#row-icon-', selectPrefix = 'row-select-'
        admin.req(ctx + "system/dept/getLoginUserDept", { }, function (result) {
            var select= document.getElementById('deptId');
            for (var i=0;i<result.data.length;i++) {
                var data= result.data[i];
                var option = document.createElement("option");
                option.setAttribute("value", data.value);
                option.innerText =data.name;
                select.appendChild(option)
            }
            form.render('select');
            initHouse()
        },'get')
        getGoodsList();
        form.on('select(warehouseId)',function (data) {
            getGoodsList();
            onSelect(selectPrefix + '1')
            loadTable()
            form.render('select');
        })

        $('#adjustAmountBtn').click(function() {
            var inputVal = $("#adjustAmount").val();
            var itemCnt = 0;
            layui.each(tableData, function (index, item) {
                if(item.quantity) {
                    itemCnt = (parseFloat(item.quantity) + parseFloat(itemCnt)).toFixed(2);
                }
            })
            if(inputVal) {
                var itemAvg = parseFloat(inputVal / itemCnt).toFixed(2);
                var idxNum = 0.0;
                layui.each(tableData, function (index, item) {
                    if(item.quantity) {
                        item.adjustPrice = itemAvg;
                        if(index == tableData.length - 1) {
                            item.adjustAmount = parseFloat(inputVal - idxNum).toFixed(2);
                        } else {
                            item.adjustAmount = parseFloat(itemAvg * item.quantity).toFixed(2);
                            idxNum = parseFloat(idxNum) + parseFloat(item.adjustAmount);
                        }
                        if(item.totalPrice) {
                            item.adjustTotalPrice =  (parseFloat(item.adjustAmount) + parseFloat(item.totalPrice)).toFixed(2)
                        }
                    }
                })
                loadTable()
            }
        })

        //日期范围
        laydate.render({
            elem: '#purchaseDate'
            , done: function (value, date, endDate) {
                $("input[name='purchaseDate']").val(value);
            }
        });

        //区域对应的仓库列表------------------------------------------------------------------------------------------------------
        function initHouse() {
            var deptId = $('#deptId').val();
            if(!deptId){
                deptId=''
            }
            admin.req(ctx + "shop/house/list", {deptId: deptId}, function (result) {
                $("#warehouseId").html('');
                for (var i=0;i<result.rows.length;i++) {
                    var data= result.rows[i];
                    var option = $('<option></option>');
                    option.attr("value", data.storeId);

                    option.text(data.storeName);
                    $("#warehouseId").append(option)
                }
                form.render('select');
            },'post')
        }

        form.on('select(deptId)',function (data) {
            initHouse();
        })

        //查询spu商品---------------------------------------------------------------------------------------------------
        function getGoodsList() {
            admin.req(ctx + "shop/spu/list", {isQueryAll: true}, function (result) {
                dataList = result.rows;
            }, 'post', {async: false})
        }
        //初始化商品----------------------------------------------------------------------------------------------------
        var tableData = [{row: '1'}]
        onSelect(selectPrefix + '1')
        loadTable()
        function loadTable() {

            var scrollTop = $(document).scrollTop();

            layui.each(tableData, function (index, item) {
                item.row = index + 1 //删除表格某一行需要重新对序号排序
            })
            table.render({
                elem: '#dataTable'
                , data: tableData
                , method: 'POST'
                , cellMinWidth: 80
                //, height: 'full-250'
                , width:1700
                , totalRow: true
                , page: false
                , limit: 500
                , cols: [[
                    , {field: 'itemId', title: '明细id', hide: true}
                    , {field: 'spuNo', name:'spuNo', title: '商品id', hide: true}
                    , {field: 'row', title: 'row', hide: true}
                    , {toolbar: '#toolbarRow', width: 210, totalRowText: '合计'}
                    , {field: 'name', width: 210, title: '商品名'}
                    , {field: 'quantity', width: 90, title: '主单位数量',edit:true,style: 'outline: 1px solid #e6e6e6;outline-offset: -5px;', totalRow: true}
                    , {field: 'quantityUnitName', width: 90, title: '主单位'}
                    , {field: 'weightUnitName', width: 90, title: '副单位'}
                    , {field: 'stocksNumber', width: 90, title: '副单位数量',edit:true,style: 'outline: 1px solid #e6e6e6;outline-offset: -5px;', totalRow: true}
                    , {field: 'price', width: 90, title: '单价'}
                    , {field: 'adjustPrice', width: 90, title: '调整单价'}
                    , {field: 'adjustAmount', width: 90, title: '调整金额', totalRow: true}
                    , {field: 'taxRate', width: 80, title: '税率(%)',　edit:true,style: 'outline: 1px solid #e6e6e6;outline-offset: -5px;', templet: function (d) {
                            var tempRate = d.taxRate;
                            return  tempRate ? (tempRate) : "";
                    }}
                    , {field: 'noTaxPrice', width: 100, title: '无税金额', totalRow: true}
                    , {field: 'tax', width: 90, title: '税额', totalRow: true}
                    , {field: 'totalPrice', width: 100, title: '总金额',edit:true, style: 'outline: 1px solid #e6e6e6;outline-offset: -5px;', totalRow: true}
                    , {field: 'adjustTotalPrice', width: 100, title: '含调整总金额', totalRow: true}
                    , {field: 'comment',  title: '备注',edit:true,style: 'outline: 1px solid #e6e6e6;outline-offset: -5px;'}
                ]]
                ,id: 'tclassReload'
                ,done: function () {
                    layui.each(tableData, function (index, item) {
                        addTableSelect(iconPrefix + item.row)
                    })

                    form.on('select(selectQuantity)',function (data) {

                        var elem = $(data.elem);
                        var trElem = elem.parents('tr');
                        var tableData1 = table.cache.tclassReload;
                        // 更新到表格的缓存数据中，才能在获得选中行等等其他的方法中得到更新之后的值
                        tableData1[trElem.data('index')][elem.attr('name')] = data.value;

                    })
                    $(".layui-table-total td").removeAttr('style');
                    $(".layui-table-body, .layui-table-box, .layui-table-cell").css('overflow', 'visible');

                    $(document).scrollTop(scrollTop);
                }
            });

        }

        //监听数量编辑--------------------------------------------------------------------------------------------------
        table.on('edit(dataTable)', function (obj) {
            var field = obj.field;
            if(field == 'comment') {
                return;
            }
            var oldVal = $(this).prev().text();
            var reg = /^[0-9]*$|^[0-9]+(.[0-9]{2})?$|^[0-9]+(.[0-9]{1})?$/

            if (!reg.test(obj.value)||obj.value<0) {
                admin.info('请输入大于0的数字,最多2位小数');
                layui.each(tableData, function (index, item) {
                    if (item.row == obj.data.row) {
                        item[field] = oldVal
                    }
                })
            } else {
                debugger
                if(obj.data.totalPrice && obj.data.quantity){
                    layui.each(tableData, function (index, item) {
                        if (item.row == obj.data.row) {
                            item.taxRate = (item.taxRate || 0)
                            item.price = parseFloat(obj.data.totalPrice / obj.data.quantity).toFixed(2)
                            item.noTaxPrice =  parseFloat(item.totalPrice / ( 1 + item.taxRate * 0.01)).toFixed(2)
                            item.tax = parseFloat(item.totalPrice - item.noTaxPrice).toFixed(2)
                        }
                    })
                }

                if(obj.data.adjustAmount && obj.data.quantity){
                    layui.each(tableData, function (index, item) {
                        if (item.row == obj.data.row) {
                            item.adjustPrice = (parseFloat(obj.data.adjustAmount) /  parseFloat(obj.data.quantity)).toFixed(2)
                        }
                    })
                }

                if(obj.data.adjustAmount && obj.data.totalPrice){
                    layui.each(tableData, function (index, item) {
                        if (item.row == obj.data.row) {
                            item.adjustTotalPrice = (parseFloat(obj.data.adjustAmount) + parseFloat(obj.data.totalPrice)).toFixed(2)
                        }
                    })
                }

            }

            loadTable()

        })

        //初始化点击...弹框搜索-----------------------------------------------------------------------------------------
        function addTableSelect(id) {

            tableSelect.render({
                elem: id,	//定义输入框input对象
                checkedKey: 'spuNo', //表格的唯一建值，非常重要，影响到选中状态 必填
                searchKey: 'searchKey',	//搜索输入框的name值 默认keyword
                searchPlaceholder: '商品名称|商品货号',	//搜索输入框的提示文字 默认关键词搜索
                table: {	//定义表格参数，与LAYUI的TABLE模块一致，只是无需再定义表格elem
                    url: ctx + "shop/spu/list"
                    , method: 'POST'
                    , height: 'full-100'
                    , cellMinWidth: 80
                    , page: true
                    , request: {
                        pageName: 'pageNum' //页码的参数名称，默认：page
                        , limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                    , cols: [[
                        {
                            templet: "#checkbd",
                            title: "<input type='checkbox' name='siam_all' title='' lay-skin='primary' lay-filter='siam_all'> ",
                            width: 60,
                        }
                        , {field: 'spuNo', title: '商品id', hide: true}
                        , {field: 'code', title: '商品货号', width: 200}
                        , {field: 'name', title: '商品spu', width: 250}
                        , {field: 'classifyName', title: '分类', width: 250}
                    ]]
                    , parseData: function (res) { //将原始数据解析成 table 组件所规定的数据
                        layui.each(res.rows, function (index, item) {
                            layui.each(dataList, function (index1, item1) {
                                if (item.spuNo == item1.spuNo) {
                                    //item.disabled = item1.disabled
                                }
                            })
                        })
                        return {
                            "code": res.code, //解析接口状态
                            "msg": res.msg, //解析提示文本
                            "count": res.total, //解析数据长度
                            "data": res.rows //解析数据列表
                        };
                    }
                },
                done: function (elem, data) {
                    //设置选择得值
                    $.each($("input[name=siam_one]:checked"), function (i, value) {
                        var goodsId = $(this).attr("data-id")
                        var free = false;
                        var isSet = false
                        debugger
                        layui.each(tableData, function (index, item) {
                            if (item.spuNo == null && !isSet) {
                                //优先使用没填充值得数组
                                setGoodsInfo(selectPrefix + item.row, goodsId)
                                free = true
                                isSet = true
                            }
                        })
                        //无可用数组则新增
                        if (!free) {
                            var id = tableData.length + 1
                            tableData.push({row: id})
                            setGoodsInfo(selectPrefix + id, goodsId)
                        }
                    });
                    // layui.each(data.data, function (index1, item1) {
                    //     var goodsId = item1.spuNo
                    //     var free = false;
                    //     layui.each(tableData, function (index, item) {
                    //         if (item.spuNo == null) {
                    //             //优先使用没填充值得数组
                    //             setGoodsInfo(selectPrefix + item.row, goodsId)
                    //             free = true
                    //         }
                    //     })
                    //     //无可用数组则新增
                    //     if (!free) {
                    //         var id = tableData.length + 1
                    //         tableData.push({row: id})
                    //         setGoodsInfo(selectPrefix + id, goodsId)
                    //     }
                    // });
                }
            })
            form.render("select");
        }


        //行工具栏事件--------------------------------------------------------------------------------------------------
        table.on('tool(dataTable)', function (obj) {
            var data = obj.data;
            if (obj.event === 'add') {
                active.add(data);
            } else if (obj.event === 'subtraction') {
                active.subtraction(data);
            } else if (obj.event === 'search') {
                active.search(data);
            }
        });
        //事件----------------------------------------------------------------------------------------------------------
        var active = {
            add: function (d) {
                var id = tableData.length + 1
                tableData.push({row: id})
                onSelect(selectPrefix + id)
                loadTable()
            }, subtraction: function (d) {
                if (tableData.length > 0) {
                    for (var i = 0; i < tableData.length; i++) {
                        if (d.row == tableData[i].row) {
                            tableData.splice(i, 1);
                        }
                    }
                    layui.each(dataList, function (index, item) {
                        if (item.spuNo == d.spuNo) {
                            item.disabled = false
                        }
                    })
                    if(tableData.length == 0) {
                        tableData.push({row: '1'})
                    }
                    loadTable()
                }
            }, search: function (d) {

            }
        }

        //商品下拉选择监听----------------------------------------------------------------------------------------------
        function onSelect(filterName) {
            //监听下拉框编辑
            form.on('select(' + filterName + ')', function (data) {
                //选择的select对象值；
                var selectValue = data.value;
                setGoodsInfo(filterName, selectValue)
            })
        }

        //设置商品信息--------------------------------------------------------------------------------------------------
        function setGoodsInfo(filterName, selectValue) {
            var goodsInfo = findGoodsById(selectValue)
            //往table设置值
            layui.each(tableData, function (index, item) {
                if ((selectPrefix + item.row) == filterName) {
                    item.spuNo = goodsInfo.spuNo;
                    item.name = goodsInfo.name;
                    item.quantityUnitName = goodsInfo.mainUnitName;
                    item.weightUnitName = goodsInfo.subUnitName;
                    item.stocksNumber = '';
                    item.quantity = '';
                    item.taxRate = '';
                    // 设置表格中主单位和副单位的id
                    if(goodsInfo.spuUnitList && goodsInfo.spuUnitList.length > 0){
                        for(var i = 0; i < goodsInfo.spuUnitList.length; i++){
                            if(goodsInfo.spuUnitList[i].name == item.quantityUnitName){
                                item.quantityUnit = goodsInfo.spuUnitList[i].unitId;
                            }
                            if(goodsInfo.spuUnitList[i].name == item.weightUnitName){
                                item.weightUnit = goodsInfo.spuUnitList[i].unitId;
                            }
                        }
                    }
                }
            })

            //禁用已选过的商品
            layui.each(dataList, function (index, item) {
                if (item.spuNo == goodsInfo.spuNo) {
                    //item.disabled = true
                }
            })
            loadTable()
        }

        //通过商品id获取商品信息----------------------------------------------------------------------------------------------
        function findGoodsById(goodsId) {
            var goodsInfo = {};
            layui.each(dataList, function (index, item) {
                if (item.spuNo == goodsId) {
                    goodsInfo = item;
                    return;
                }
            })
            return goodsInfo;
        }

        //新增订单------------------------------------------------------------------------------------------------------
        layui.form.on('submit(submitBtn)', function (data) {
            var hasGoods = true;
            var hasQuantity = true;
            var hasStocksNumber = true;
            var hasPrice = true;
            var hasTaxRate = true;
            layui.each(tableData, function (index, item) {
                if ($.common.isEmpty(item.spuNo)) {
                    hasGoods = false
                }else if($.common.isEmpty(item.quantity)){
                    hasQuantity=false
                }else if($.common.isEmpty(item.price)){
                    hasPrice=false
                }else if($.common.isEmpty(item.taxRate)){
                    hasTaxRate=false
                }else if($.common.isEmpty(item.stocksNumber)){
                    hasStocksNumber=false
                }
            })
            if (!hasGoods) {
                return admin.info('还有未设置的商品！');
            }
            if (!hasQuantity) {
                return admin.info('还有未设置主单位数量的商品！');
            }
            if (!hasStocksNumber) {
                return admin.info('还有未设置副单位数量的商品！');
            }
            if (!hasPrice) {
                return admin.info('还有未设置价格的商品！');
            }
            if (!hasTaxRate) {
                return admin.info('还有未设置税率的商品！');
            }
            var field = data.field; //获取提交的字段
            field.itemListJson = JSON.stringify(tableData)
            admin.req(prefix + '/add',field, function (data) {
                if (data.code == 0) {
                    admin.success('保存成功!');
                    setTimeout(function(){
                        //先得到当前iframe层的索引
                        var index = parent.layer.getFrameIndex(window.name);
                        //再执行关闭
                        parent.layer.close(index);
                    },300);
                } else {
                    admin.error(data.msg);
                }
            }, 'post');
        });
    })


</script>
