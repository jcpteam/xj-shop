<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>控制台</title>
    <link rel="stylesheet" href="../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css?v=316}"/>
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
<!-- 正文开始 -->
<div class="layui-fluid ew-console-wrapper">
    <!-- 快捷方式 -->
    <div class="layui-row layui-col-space15">
            <div class="layui-card">
                <!-- 搜索区 -->
                <form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
                    <div class="layui-form-item">

                        <div class="layui-inline">
                            <label class="layui-form-label label-auto">所属区域：</label>
                            <div class="layui-input-inline">
                                <select name="deptId"  id="deptId"   >
                                    <option  value="" th:checked="true">选择区域</option>
                                </select>
                            </div>
                        </div>

                        <div class="layui-inline">
                            <label class="layui-form-label label-auto">月份</label>
                            <div class="layui-input-block">
                                <input id="optDate" type="text" placeholder="请选择月份"  class="layui-input date-icon" autocomplete="off" readonly="readonly"/>
                                <input type="hidden" id="qryDate" name="qryDate">
                            </div>
                        </div>
                        <div class="layui-inline" style="padding-left: 13px;">
                            <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
                                <i class="layui-icon layui-icon-search"></i>搜索
                            </button>
                            <button class="layui-btn layui-btn-sm icon-btn" type="reset" id="restBtn">
                                <i class="layui-icon layui-icon-refresh"></i>重置
                            </button>

                            <!--<button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="auditPatch" id="auditPatch">
                                <i class="layui-icon layui-icon-add-circle-fine"></i>批量审核
                            </button>-->
                            <a class="layui-btn layui-btn-primary form-search-expand layui-hide" data-expand="true">
                                展开 <i class="layui-icon layui-icon-down"></i>
                            </a>
                        </div>
                    </div>
                </form>

            </div>

        </div>


    <div class="layui-row layui-col-space15" style="padding-top: 20px;">
        <div class="layui-col-md6 layui-col-sm12" >
            <div class="layui-card" style="overflow: hidden;">
                <div class="layui-card-header">日统计</div>
                <div class="layui-card-body">
                    <div id="consoleChartsDay" style="height: 400px;"></div>
                </div>
            </div>
        </div>
        <div class="layui-col-md6 layui-col-sm12">
            <div class="layui-card" style="overflow: hidden;">
                <div class="layui-card-header">周统计</div>
                <div class="layui-card-body">
                    <div id="consoleChartsWeek" style="height: 400px;"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- js部分 -->
<script th:src="@{/assets/libs/layui/layui.js}"></script>
<script th:src="@{/assets/js/common.js}"></script>
<script th:src="@{/assets/libs/echarts/echarts.min.js}"></script>
<script type="text/javascript" th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script>
    layui.use(['layer','laydate','admin','form'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var admin = layui.admin;
        var form = layui.form;

        var prefix = ctx + "shop/detail/stat";
        var payStat = prefix + "/report8/1";
        var statusStat = prefix + "/report8/2";

        function getRecentDay(day) {
            var today = new Date();
            var targetday_milliseconds = today.getTime() + 1000 * 60 * 60 * 24 * day;
            today.setTime(targetday_milliseconds);
            var tYear = today.getFullYear();
            var tMonth = today.getMonth();
            tMonth = doHandleMonth(tMonth + 1);

            return tYear + "-" + tMonth ;
        }

        function doHandleMonth(month){
            var m = month;
            if(month.toString().length == 1){
                m = "0" + month;
            }
            return m;
        }

        $("#qryDate").val(getRecentDay(0));
        $("#optDate").val(getRecentDay(0));

        initEchart();
        function initEchart(){
            admin.req(payStat, {deptId:$("#deptId").val(), qryDate:$("#qryDate").val()}, function (result) {

                /** 渲染日统计图表 */
                var myCharts1 = echarts.init(document.getElementById('consoleChartsDay'));
                var options1 = {
                    title: {
                        text: '已支付/未支付', x: 'center', y: '0%',
                        subtext: result.payAmount + '/' + result.noPayAmount,
                        textStyle: {fontSize: 18, color: '#262626', fontWeight: 'normal'},
                        subtextStyle: {fontSize: 16, color: '#10B4E8'}, itemGap: 20
                    },
                    color: ['#10B4E8', '#FFA800'],
                    tooltip: {trigger: 'item'},
                    legend: {
                        orient: 'vertical', right: '20px', top: '20px',
                        data: ['已支付', '未支付'], textStyle: {color: '#595959'}
                    },
                    series: [{name: '金额', type: 'pie', radius: '50%', label: {normal: {show: true}}}]
                };
                myCharts1.setOption(options1);
                // 赋值
                myCharts1.setOption({series: [{data: [{name: '已支付', value: result.payAmount}, {name: '未支付', value: result.noPayAmount}]}]
                });

            },'post');

            admin.req(statusStat, {deptId:$("#deptId").val(), qryDate:$("#qryDate").val()}, function (result) {

                /** 渲染周统计图表 */
                var myCharts2 = echarts.init(document.getElementById('consoleChartsWeek'));
                var options2 = {
                    title: {
                        text: '订单状态', x: 'center', y: '0%',
                        subtext: '数量',
                        textStyle: {fontSize: 18, color: '#262626', fontWeight: 'normal'},
                        subtextStyle: {fontSize: 16, color: '#10B4E8'}, itemGap: 20
                    },
                    color: ['#10B4E8', '#FFA800','#436EEE','#9BCA63'],
                    tooltip: {trigger: 'item'},
                    legend: {
                        orient: 'vertical', right: '20px', top: '20px',
                        data: ['作废', '待分拣','待支付', '已完成'], textStyle: {color: '#595959'}
                    },
                    series: [{name: '数量', type: 'pie', radius: '50%', label: {normal: {show: true}}}]
                };
                myCharts2.setOption(options2);
                // 赋值
                myCharts2.setOption({series: [{data: [{name: '作废', value: result.qnum}, {name: '待分拣', value: result.normalNum}, {name: '待支付', value: result.goodsNum}, {name: '已完成', value: result.finishNum}]}]});

            },'post')
        }


        //监听搜索
        form.on('submit(searchBtn)', function (data) {
            initEchart();
        });

        /** 窗口大小改变事件 */
        window.onresize = function () {
            myCharts1.resize();
            myCharts2.resize();
        };


        //页面头部的日期组件
        var end = laydate.render({
            elem: '#optDate', //选择器结束时间
            format: 'yyyy-MM',
            type: 'month',
            showBottom: false, //关闭底部框 去掉取消、确定、清空按钮
            // 选择年份或者月份都会关闭
            change: function (value, date, endDate) { //监听日期被切换
                lay('#optDate').val(value);
                if ($(".layui-laydate").length) {
                    $(".layui-laydate").remove();
                }
            },
            //选择月份即选中关闭  年份扔可以左右点击选择
            change: function (value, date, endDate) { //监听日期被切换
                lay('#optDate').val(value);
                $('.laydate-month-list').on('click','li',function () {//利用的事件委托
                    $('.layui-laydate').remove()
                })
            },
            done: function (value, date) {
                start.config.max = {
                    year:value ? date.year : 3099,
                    month: date.month - 1, //关键
                    date: date.date,
                    hours: 0,
                    minutes: 0,
                    seconds: 0
                }
                $("#qryDate").val(value);
            }
        });

        $("#restBtn").click(function () {
            $("input[type='hidden']").val("")
        })

        //所属区域------------------------------------------------------------------------------------------------------
        admin.req(ctx + "system/dept/getLoginUserDept", { }, function (result) {
            var select= document.getElementById('deptId');
            for (var i=0;i<result.data.length;i++) {
                var data= result.data[i];
                var option = document.createElement("option");
                option.setAttribute("value", data.value);
                option.innerText =data.name;
                select.appendChild(option)
            }
            form.render('select');
        },'get')

    });
</script>
</body>

</html>
