<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('商品分类列表')" />
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-card">
            <!-- 搜索区 -->
            <form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
                <div class="layui-form-item">

                    <div class="layui-inline" style="padding-left: 13px;">
<!--                        <button class="layui-btn layui-btn-normal layui-btn-sm" id="add" lay-event="add" shiro:hasPermission="shop:classify:import"><i class="layui-icon layui-icon-upload"></i>数据同步</button>-->

                    </div>
                </div>
            </form>

            <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>
        </div>

    </div>
</div>





<!-- js部分 -->
<th:block th:include="include :: footer" />
<script type="text/javascript" th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script type="text/javascript" th:inline="none">
    layui.use(['index', 'layer', 'form', 'table', 'util', 'ext'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var util = layui.util;
        var laydate = layui.laydate;
        var ext = layui.ext;
        var admin = layui.admin;
        var index = layui.index;

        var prefix = ctx + "shop/classify";
        var listUrl = prefix + "/list";
        var updateUrl = prefix + "/edit";

        table.render({
            elem: '#dataTable'
            ,url: listUrl
            ,method: 'POST'
            ,height: 'full-100'
            ,cellMinWidth: 80
            ,page: true
            ,request: {
                pageName: 'pageNum' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            ,limit: 10
            ,cols: [[
                {type: 'checkbox'}
                ,{field: 'classifyId', title: '编号'}
                ,{field: 'name', title: '分类名称'}
                ,{field: 'anotherName', title: '分类别称', edit:'text'}
            ]]
            ,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
                return {
                    "code": res.code, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "count": res.total, //解析数据长度
                    "data": res.rows //解析数据列表
                };
            }
        });



        //监听搜索
        form.on('submit(add)', function (data) {
            var field = data.field;
            //执行重载
            table.reload('dataTable', {
            });
        });

        //监听单元格编辑
        table.on('edit(dataTable)', function(innerObj) {
            var value = innerObj.value //得到修改后的值
                ,innerData = innerObj.data //得到所在行所有键值
                ,field = innerObj.field; //得到字段
            var oldVal = $(this).prev().text();
            admin.req(updateUrl, innerData, function (data) {
                if (data.code == 0) {
                    admin.success('保存成功!');
                } else {
                    admin.error(data.msg);
                }
            }, 'post');
        });

    });
</script>

</body>
</html>
