<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('分拣主页')"/>
    <link rel="stylesheet" href="../../../assets/module/num_keyboard.css?v=318"/>
    <style>
        /*分拣订单列表样式*/
        .sorting-order-list {
            /*height: 310px;*/
            height: auto !important;
            max-height: 1100px;
            white-space: normal;
            overflow-y: auto;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        /** 分拣订单列表item样式 */
        .sorting-order-list-item {
            border-bottom: 1px solid #e8e8e8;
            /*margin-top: 4px;*/
            /*margin-bottom: 4px;*/
            padding: 4px;
            margin-top: 4px;
            margin-bottom: 4px;
            margin-left: 8px;
            margin-right: 8px;
            position: relative;
            cursor: pointer;
        }

        /** 分拣订单列表item选中样式 */
        .sorting-order-list-item-active {
            border: 2px solid #00a65a;
            padding: 4px;
            margin-top: 4px;
            margin-bottom: 4px;
            margin-left: 8px;
            margin-right: 8px;
            background: #f3f8f4;
            color: #00a65a;
            font-weight: bold;
        }

        /** 分拣订单列表item选中样式 */
        .sorting-finish {
            background: #d3f8f4;
            /*color: #00a65a;*/
            /*font-weight: bold;*/
        }
        /** 分拣订单列表item选中样式 */
        .sorting-unfinish {
            background: #fff;
            /*color: #00a65a;*/
            /*font-weight: bold;*/
        }

        /*分拣订单商品列表样式*/
        .sorting-order-good-list {
            background-color: transparent;
            /*height: 440px;*/
            height: auto !important;
            max-height: 550px;
            white-space: normal;
        }

        /** 分拣订单商品列表item样式 */
        .sorting-order-good-list-item {
            /*background-color: #fff;*/
            margin-bottom: 10px;
            cursor: pointer;
            transition: all .2s;
            height: 214px;
        }

        .item-active-border {
            border: 2px solid #00a65a;
            border-radius: 5px;
        }

        .item-default-border {
            border: 1px solid #fff;
            border-radius: 5px;
        }

        /** 分拣订单商品列表item样式：商品分类 */
        .good-category {
            padding-left: 15px;
            padding-right: 15px;
        }

        /** 分拣订单商品列表item样式：商品分类 */
        .print-tag {
            padding-left: 3px;
            padding-right: 3px;
            background-color: #ffc633;
        }

        /** 分拣订单商品列表item样式：商品分类 */
        .odo-print-tag {
            padding-left: 3px;
            padding-right: 3px;
            background-color: #33b87b;
        }

        /** 分拣订单商品列表item样式：商品标题 */
        .good-title {
            margin-left: 10px;
            font-weight: bold;
        }

        /** 分拣订单商品列表item样式：商品订货重量 */
        .good-order-weight {
            background-color: #fef6e9;
            border: 1px solid #ebdac8;
            border-radius: 4px;
            height: 38px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
            margin-top: 8px;
            text-align: center;
            color: #f29c53;
            font-weight: bold;
            font-size: 28px;
        }

        /** 分拣订单商品列表item样式：商品分拣重量 */
        .good-sorting-weight {
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .good-sorting-weight-text-left {
            width: 30%;
            text-align: left;
            font-size: 14px;
            padding-left: 20px;
            position: absolute;
            left: 0px;
        }

        .good-sorting-weight-text-center {
            width: 32%;
            text-align: center;
            font-size: 14px;
            margin-left: auto;
            margin-right: auto;
            font-weight: bold;
        }

        .sorting-text-red{
            color:red;
        }

        .good-sorting-weight-text-right {
            width: 30%;
            text-align: right;
            font-size: 14px;
            padding-right: 20px;
            position: absolute;
            right: 0px;
        }

        /** 分拣订单商品列表item样式：商品打印操作 */
        .good-sorting-print {
            margin-top: 40px;
            margin-left: 15px;
        }

        /** 分拣订单商品列表item样式 */
        .good-actual-weight-content {
            background-color: #f5f7f6;
            border: 1px solid #f5f7f6;
            height: 190px;
            border-radius: 2px;
            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .good-actual-weight-content-mark {
            background-color: #fef6e9;
            border: 1px solid #ebdac8;
            border-radius: 1px;
            /*height: 30px;*/
            width: 98%;
            margin-left: auto;
            margin-right: auto;
            margin-top: 1px;
            text-align: center;
            color: #f29c53;
            font-weight: bold;
            font-size: 22px;
            /*设置只能显示一行*/
            text-overflow: -o-ellipsis-lastline;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
        }

        .good-actual-weight-content-gongjin-center {
            margin-top: 10px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        .auto-weight-switch {
        }

        .good-box-content {
            background-color: #DFEAE4;
            margin-top: 10px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
            padding-top: 5px;
            padding-left: 5px;
            padding-right: 5px;
            padding-bottom: 5px;
        }

        /* 横向滚动 */
        #quotationList {
            white-space: nowrap;
            overflow: auto;
            max-width: 900px;
        }

        /* 横向滚动 */
        #routeList {
            white-space: nowrap;
            overflow: auto;
        }

        /* 横向滚动 */
        .h-scroll {
            white-space: nowrap;
            overflow: auto;
        }

        .layui-table-cell {
            height: auto !important;
            white-space: normal;
        }

        /*右侧底部串口连接样式*/
        .right-bottom-serial-com {
            z-index: 10;
            position: fixed;
            text-align: center;
            margin-left: 40%;
            margin-right: 10%;
            bottom: 0;
            width: 50%;
            height: 45px;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }

        .print-select{
            margin-left: 4px;
            margin-right: 4px;
        }

    </style>
</head>
<body>

<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row layui-col-space15" id="sortingMainRoot">
        <div class="layui-card">
            <!-- 搜索区 -->
            <form class="layui-form toolbar" th:onsubmit="return false" lay-filter="inputForm" id="inputForm">
                <div class="layui-form-item">
                    <!--左边搜索条件-->
                    <div class="layui-col-md4">
                        <div class="layui-row">
                            <div class="layui-inline">
                                <div class="layui-input-inline" style="width: 110px;">
                                    <select name="timeType" id="timeType" lay-filter="timeType">
                                        <option value="0" th:checked="true">下单时间</option>
                                        <option value="1">收货时间</option>
                                    </select>
                                </div>
                                <div class="layui-input-inline" style="padding-left: 10px;">
                                    <div id="createDateRoot" class="layui-input-inline">
                                        <input id="createDate" type="text" placeholder="请选择开始和结束日期" class="layui-input date-icon" autocomplete="off"/>
                                        <input id="createBeginDate" type="hidden" name="createBeginDate">
                                        <input id="createEndDate" type="hidden" name="createEndDate">
                                    </div>

                                    <input id="deliveryDate" type="text" placeholder="请选择日期"
                                           class="layui-input date-icon" autocomplete="off" style="display: none"/>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn"
                                        id="searchBtn">
                                    <i class="layui-icon layui-icon-search"></i>搜索
                                </button>
                            </div>
                        </div>
                        <div class="layui-row">
                            <div class="layui-inline">
                                <label class="layui-form-label label-auto">客户名称：</label>
                                <div class="layui-input-inline" style="margin-left: 10px;">
                                    <select name="customerId" id="customerId" lay-filter="customerId" lay-search>
                                        <option value="" th:checked="true">全部</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <button class="layui-btn layui-btn-sm icon-btn" type="reset" id="restBtn">
                                    <i class="layui-icon layui-icon-refresh"></i>重置
                                </button>
                            </div>
                        </div>
                    </div>
                    <!--右边搜索条件-->
                    <div class="layui-col-md8">
                        <div class="layui-row">
                            <div class="layui-inline">
                                <label class="layui-inline layui-form-label label-auto">线路：</label>
                                <div style="height: 50px" id="routeList">
                                </div>
                            </div>
                        </div>
                        <div class="layui-row">
                            <div class="layui-inline">
                                <label class="layui-inline layui-form-label label-auto">报价：</label>
                                <div style="height: 50px" id="quotationList">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!--左边订单列表-->
        <div class="layui-col-md4">
            <div class="layui-card">
                <div class="layui-tab layui-tab-brief">
                    <ul class="layui-tab-title">
                        <li class="layui-this sorting-list-tab" data-type="0">全部订单</li>
                        <li class="sorting-list-tab" data-type="1">待分拣订单</li>
                        <li class="sorting-list-tab" data-type="2">已分拣订单</li>
                    </ul>
                    <div class="layui-tab-content">
                        <div class="layui-form-item text-center">
                            <!--<button type="button" class="layui-btn layui-btn-sm layui-btn-warm"-->
                            <!--id="printOrderMaterial">打印配货单-->
                            <!--</button>-->
                            <!-- 下拉按钮 -->
                            <div class="dropdown-menu dropdown-hover">
                                <button type="button" class="layui-btn layui-btn-sm layui-btn-warm">
                                    打印配货单 <i class="layui-icon layui-icon-drop"></i>
                                </button>
                                <ul class="dropdown-menu-nav">
                                    <li><a id="printOrderMaterial1">全部订单</a></li>
                                    <li><a id="printOrderMaterial2">未打印订单</a></li>
                                </ul>
                            </div>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-selected"
                                    id="printOrderLabel">打印出库单
                            </button>
                            <div class="dropdown-menu dropdown-hover">
                                <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" id="printOrderGoodLabel">
                                    打印标签
                                </button>
                                <ul class="dropdown-menu-nav">
                                    <li><a id="printOrderGoodLabel1">全部订单</a></li>
                                    <li><a id="printOrderGoodLabel2">当前选择订单</a></li>
                                </ul>
                            </div>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="modifyOrder">
                                修改订单
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" id="addOrder">
                                新增订单
                            </button>
                        </div>
                        <div class="layui-tab-item sorting-order-list layui-show">
                            <div class="layui-row layui-col-space15" id="sortingOrderCardList1"></div>
                        </div>
                        <div class="layui-tab-item sorting-order-list">
                            <div class="layui-row layui-col-space15" id="sortingOrderCardList2"></div>
                        </div>
                        <div class="layui-tab-item sorting-order-list">
                            <div class="layui-row layui-col-space15" id="sortingOrderCardList3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!--右边商品列表-->
        <div class="layui-col-md8 sorting-order-good-list">
            <div class="layui-card" id="sortingOrderDetailList"
                 style="background-color: transparent;padding-bottom: 80px"></div>
        </div>

        <!--底部悬浮电子秤信息-->
        <div class="layer-footer right-bottom-serial-com" id="bottomScale">
            <div class="layui-form">
                <div class="inline-block">
                    <label class="layui-form-label label-auto">端口号：</label>
                    <div class="layui-input-inline">
                        <select name="serialComId" id="serialComId" lay-filter="serialComId">
                            <option value="">请选择电子秤端口</option>
                        </select>
                    </div>
                </div>
                <div class="inline-block" style="margin-left: 30px">
                    <button type="button" id="connectStatus"
                            class="layui-btn layui-btn-sm layui-btn-radius layui-btn-danger">未连接
                    </button>
                </div>
                <div class="inline-block" style="margin-left: 20px">
                    <button id="syncScaleWeight" class="layui-btn layui-btn-normal layui-btn-sm"
                            style="margin-top: 5px">重量同步
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- 订单模板 -->
<script type="text/html" id="sortingOrderCardItem">
    <div class="sorting-order-list-item" data-orderstatus="{{d.status}}">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md10">
                <div class="layui-input-inline">
                    <form class="layui-form layui-input-inline" action="">
                        <input class="print-select" type="checkbox"
                               lay-filter="orderPrintCheck" name="orderPrintCheck" lay-skin="primary"
                               data-orderid="{{d.orderId}}"
                               data-orderstatus="{{d.status}}">
                    </form>
                </div>

                <div class="layui-input-inline">
                    <!--{{#  if (d.printStatus=='1'){ }}-->
                    <!--<span class="layui-input-inline layui-badge print-tag">已打印</span>-->
                    <!--{{#  } }}-->
                    {{#  if (d.odoPrintStatus && d.odoPrintStatus=='1'){ }}
                    <span class="layui-input-inline layui-badge odo-print-tag">已打印</span>
                    {{#  } }}

                    <!--{{d.code}}&nbsp;&nbsp;&nbsp;{{d.merchantName}}-->
                    {{d.merchantName?d.merchantName:'商户已删除'}}
                </div>

                <span class="layui-input-inline">
                    <div class="layui-text go-pay-text" style="color:dodgerblue;" data-orderid="{{d.orderId}}">
                        {{((d.status==='3' || d.status === '4') && (d.source==='3' || d.deliveryType ==='2') &&d.payStatus != 1)?'去支付':''}}
                    </div>
                </span>
            </div>
            <div class="layui-col-md2">
                <div class="layui-inline">
                    <div class="layui-input-inline" style="font-size: 24px">
                        {{d.orderGoodSortCount}}
                    </div>
                    <div class="layui-input-inline" style="color:#8f8f91">
                        /{{d.orderGoodCount}}
                    </div>
                </div>
            </div>
        </div>
    </div>
</script>

<!-- 订单商品详情模板 -->
<script type="text/html" id="sortingOrderDetailItem">
    <div class="sorting-order-good-list-item item-default-border" lay-event="goodItemClick" data-sortingstatus="{{d.sortingStatus}}">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-inline" style="margin-top: 15px;">
                    <span class="layui-input-inline layui-badge good-category">{{d.classifyName}}</span>
                    <div class="layui-input-inline layui-text good-title">
                        {{d.spuName}}-{{d.goodName}}
                    </div>
                </div>
                <div class="good-order-weight">
                    订货：{{d.quantity}}{{d.unitName}}
                </div>

                <div class="layui-inline good-sorting-weight">
                    <div class="layui-input-inline good-sorting-weight-text-left">
                        订货：{{d.quantity1}}{{d.unitName1}}
                    </div>
                    <div class="layui-input-inline good-sorting-weight-text-center">
                        <div class="layui-input-inline layui-text sorting-text-red">分拣重量:</div>
                        <div class="layui-input-inline layui-text had-sorting-weight sorting-text-red">{{d.sortingWeight}}</div>
                        <div class="layui-input-inline layui-text sorting-text-red">{{d.mainUnitName}}</div>
                    </div>
                    <div class="layui-input-inline good-sorting-weight-text-right">
                        <div class="layui-input-inline layui-text sorting-text-red">分拣数量:</div>
                        <div class="layui-input-inline layui-text had-sorting-num sorting-text-red">{{d.sortingQuantity}}</div>
                        <div class="layui-input-inline layui-text sorting-text-red">{{d.subUnitName}}</div>
                    </div>
                </div>

                <div class="layui-btn-container good-box-content text-center">
                    <button lay-event="goodOutStock" type="button" class="layui-btn layui-btn-danger"
                            style="margin-top: auto;margin-bottom: auto">标记缺货
                    </button>
                    <button lay-event="goodPrintLabel" class="layui-btn layui-btn-primary layui-border-green"
                            style="margin-top: auto;margin-bottom: auto">打印标签
                    </button>
                    <button lay-event="goodPrintSubLabel" class="layui-btn layui-btn-primary layui-border-green"
                            style="margin-top: auto;margin-bottom: auto">打印分标签
                    </button>
                </div>
            </div>

            <div class="layui-col-md6">
                <div class="layui-card good-actual-weight-content">
                    <div class="good-actual-weight-content-mark">
                        备注：{{d.comment}}
                    </div>
                    <div class="text-center good-actual-weight-content-gongjin-center">
                        <div class="layui-inline">
                            <form class="layui-form layui-input-inline" action="" style="width:90px;">
                                <!--<input type="checkbox" name="close" lay-skin="switch" lay-text="关|开"/>-->
                                <input class="auto-weight-switch" type="checkbox" checked="" name="autoWeightStatus"
                                       lay-filter="autoWeightStatus" lay-skin="switch" data-itemid="{{d.itemId}}"
                                       lay-text="自动|手动">
                            </form>

                            <!--<div class="layui-input-inline" style="width: 150px;">  -->
                            <div class="layui-input-inline" style="width: 80px;">
                                <input class="layui-input add-sorting-weight mykeyboard" seq="0" data-itemid="{{d.itemId}}"
                                       name="actualWeight" type="text" placeholder="" autocomplete="off"
                                       oninput="value=weightInput(value)"/>
                                <!--<input class="layui-input layui-input-number add-sorting-weight"-->
                                       <!--seq="0" data-itemid="{{d.itemId}}" name="actualWeight" type="text" placeholder="" autocomplete="off" oninput="value=weightInput(value)"-->
                                       <!--min="0" max="999999" step="1" data-prec="2" lay-verType="tips"  lay-verify="number">-->
                            </div>
                            <div class="layui-input-inline">
                                <div class="layui-text" style="width: 30px;text-align: left;">{{d.mainUnitName}}</div>
                            </div>

                            <div class="layui-input-inline">
                                <div class="layui-text add-sorting-box-weight-tip" style="width: 75px;text-align: left;font-size: 8px;color: #ff3300">(框重0)</div>
                            </div>

                            <div class="layui-input-inline">
                                <button lay-event="addSortingWeight" type="button"
                                        class="layui-btn layui-btn-sm layui-btn-selected"
                                        style="width: 70px;">加入称重
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="text-center good-actual-weight-content-gongjin-center">
                        <div class="layui-inline">
                            <form class="layui-form layui-input-inline" action="" style="width:90px;">
                            </form>

                            <div class="layui-input-inline" style="width: 150px;">
                                <input class="layui-input add-sorting-num mykeyboard" seq="{{d.itemId + 100}}"
                                       data-conversion="{{d.mainCaseSub}}" name="actualNum" type="text" placeholder=""
                                       autocomplete="off" oninput="value=weightInput(value)"/>
                                <!--<input class="layui-input layui-input-number add-sorting-num"-->
                                       <!--seq="{{d.itemId + 100}}" data-conversion="{{d.mainCaseSub}}" name="actualNum" type="text" placeholder="" autocomplete="off" oninput="value=weightInput(value)"-->
                                       <!--min="0" max="999999" step="1" data-prec="2" lay-verType="tips"  lay-verify="number"/>-->
                            </div>
                            <div class="layui-input-inline" style="width: 40px;text-align: left;">
                                <div class="layui-text">{{d.subUnitName}}</div>
                            </div>
                            <div class="layui-input-inline">
                                <button lay-event="saveSortingWeight" type="button"
                                        class="layui-btn layui-btn-sm layui-btn-selected"
                                        style="width: 70px">保存
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="good-box-content text-center sorting-box h-scroll">
                    </div>
                </div>
            </div>
        </div>
    </div>
</script>

<script type="text/javascript" th:inline="javascript">

<script type="text/javascript" th:inline="none">
    /*商品重量仅能输入数字和小数点*/
    function weightInput(value) {
        //修复第一个字符是小数点 的情况.
        let fa = '';
        if (value !== '' && value.substr(0, 1) === '.') {
            value = "";
        }
        // console.log('test viv weight--->',value);
        value = value.replace(/^0*(0\.|[1-9])/, '$1');//解决 粘贴不生效
        value = value.replace(/[^\d.]/g, "");  //清除“数字”和“.”以外的字符
        value = value.replace(/\.{2,}/g, "."); //只保留第一个. 清除多余的
        value = value.replace(".", "$#$").replace(/\./g, "").replace("$#$", ".");
        value = value.replace(/^(\-)*(\d+)\.(\d\d).*$/, '$1$2.$3'); //只能输入两个小数
        if (value.indexOf(".") < 0 && value !== "") { //以上已经过滤，此处控制的是如果没有小数点，首位不能为类似于 01、02的金额
            if (value.substr(0, 1) === '0' && value.length === 2) {
                value = value.substr(1, value.length);
            }
        }
        value = fa + value;
        return value;
    }

        //获取订单商品信息展示表格hmtl拼接内容
        function getOrderGoodTableHtml(printGoodPageNo,allgooddata,pageSize) {
            var alldata = allgooddata;
            var content = '';
            var pageStart = pageSize*printGoodPageNo;
            // console.log('getOrderGoodTableHtml--->pageNo:' + printGoodPageNo + " ,pageSize:" + pageSize + " ,start:" + pageStart);
            var max = pageStart + pageSize;
            if(max > alldata.length){
                max = alldata.length;
            }
            var count = 0;
            for (var i = pageStart; i < max; i++) {
                var item = alldata[i];
                content += '       <tr>';
                content += '            <td style="width:28% ;border: 1px solid #000000;font-size: 15px">' + item.goodName + '</td>';
                content += '            <td style="width:18% ;border: 1px solid #000000;font-size: 15px">' + item.sortingQuantity + item.unitName + '</td>';
                // content += '            <td style="width:18% ;border: 1px solid #000000;font-size: 15px">' + item.sortingWeight + '公斤' + '</td>';
                content += '            <td style="width:18% ;border: 1px solid #000000;font-size: 15px">' + item.sortingWeight + item.mainUnitName + '</td>';
                content += '            <td style="width:18% ;border: 1px solid #000000;font-size: 15px"> ' + item.price + '</td>';
                content += '            <td style="width:18% ;border: 1px solid #000000;font-size: 15px">' + getSortingPrice(item.sortingPrice) + '</td>'
                content += '        </tr>';
                count++;
            }
            if (count < pageSize) {
                //不足个数，填充空白
                for (var i = 0; i < (pageSize - count); i++) {
                    content += '       <tr>';
                    content += '            <td style="width:28% ;opacity:0">' + '' + '</td>';
                    content += '            <td style="width:18% ;opacity:0">' + ' ' + '</td>';
                    content += '            <td style="width:18% ;opacity:0">' + ' ' + '</td>';
                    content += '            <td style="width:18% ;opacity:0">' + ' ' + '</td>';
                    content += '            <td style="width:18% ;opacity:0">' + '0' + '</td>'
                    content += '        </tr>';
                }
            }

            return content;
        };

        //检测分拣重量是否正确，如果与下单重量相差10%提示用户
        function checkIfSortingWeightCorrect(goodItem, weight, num) {
            //下单重量
            var quantity = goodItem.quantity;
            if (goodItem.unitId == goodItem.mainUnitId) {
                //下单是主单位，直接取
            } else {
                //下单是副单位，则取另一个主单位重量
                quantity = goodItem.quantity1;
            }
            var tempQ = parseFloat(quantity);
            console.log('checkIfSortingWeightCorrect--->quantity = ' + tempQ + ' ,sortingWeight = ' + weight);
            var ret = true;
            if (tempQ > 0 && weight > 0) {
                var disV = Math.abs(weight - tempQ);
                // var v = Math.round(disV / tempQ);
                var v = Math.round(disV / tempQ * 10000) / 100.00;
                console.log('checkIfSortingWeightCorrect--->disV = ' + disV + ' ,result = ' + v);
                if (v > 10) {
                    ret = false;
                }
            }
            console.log('checkIfSortingWeightCorrect--->ret = ' + ret);
            return ret;
        }

        function calculateActualWeightWithBox(weight, elem) {
            var inputWeight = elem.find(".add-sorting-weight").val();  //输入的重量
            var showW = parseFloat(inputWeight);
            if (weight) {
                var w = parseFloat(weight);

                    showW = curInputSortingWeight - w;

                    }
                }
            }

        //处理电子秤websocket流程
        var websocket = null;
        var serialPorts = [];
        var curConnectSerial = '';
        var curConnectStatus = false;  //当前串口连接状态
        //默认直接连接websocket
        connectWs();

        //连接websocket
        function connectWs() {
            //判断当前浏览器是否支持WebSocket, 主要此处要更换为自己的地址
            if ('WebSocket' in window) {
                // 尺寸控制，提供有两种尺寸，默认是sm小型尺寸，还可以选md大型尺寸
                admin.showLoading({
                    elem: '#bottomScale',
                    type: 4,
                    opacity: 0.4,
                });
                websocket = new WebSocket("ws://localhost:8089/websocket");
            } else {
                changeConnectBtnStatus(false);
                notice.msg('当前浏览器不支持电子秤连接，请联系管理员', {icon: 5});
                return;
            }

            serialPorts = [];
            //连接发生错误的回调方法
            websocket.onerror = function () {
                // console.log("电子秤ws连接错误");
                notice.msg('电子秤连接错误，请联系管理员', {icon: 5});
                admin.removeLoading('#bottomScale');
                changeConnectBtnStatus(false);
            };

            //连接成功建立的回调方法
            websocket.onopen = function (event) {
                // notice.msg('电子秤连接成功', {icon: 1});
                // console.log("电子秤ws连接成功");
                admin.removeLoading('#bottomScale');
            }

            //接收到消息的回调方法
            websocket.onmessage = function (event) {
                // console.log("接收到电子秤ws消息-->", event.data);
                //解析消息内容
                if (event.data) {
                    var msgObj = JSON.parse(event.data);
                    if (msgObj.fun) {
                        if (msgObj.fun === 'online') {
                            //ws上线消息
                            // console.log("解析到电子秤上线信息-->", msgObj.msg);
                            setSortingWeightToGood(msgObj.msg);
                        } else if (msgObj.fun === 'notification') {
                            // console.log("解析到电子秤串口信息-->", msgObj.msg);
                            if (msgObj.msg) {
                                if (msgObj.msg.indexOf('%23') != -1) {
                                    //多个端口  NAME1@COM1#NAME2@COM2
                                    serialPorts = msgObj.msg.split('%23');
                                } else {
                                    //一个端口
                                    serialPorts.push(msgObj.msg);
                                }
                            }
                            // console.log("解析到电子秤串口信息-->串口列表：", serialPorts);
                            if (serialPorts && serialPorts.length > 0) {
                                var select = document.getElementById('serialComId');
                                select.innerHTML = ''; //清空选项

                                var defaultOption = document.createElement("option");
                                defaultOption.setAttribute("value", '');
                                defaultOption.innerText = '请选择电子秤端口';
                                select.appendChild(defaultOption);

                                for (var i = 0; i < serialPorts.length; i++) {
                                    var data = serialPorts[i];
                                    var option = document.createElement("option");
                                    if (data.indexOf('@') != -1) {
                                        //如果包含串口名字，则value设置串口id
                                        option.setAttribute("value", data.split('@')[1]);
                                    } else {
                                        option.setAttribute("value", data);
                                    }
                                    option.innerText = data;
                                    select.appendChild(option)
                                }
                                form.render('select');
                            }
                        } else if (msgObj.fun === 'connection') {
                            //电子秤连接消息
                            // console.log("解析到电子秤串口连接消息-->", msgObj.msg);
                            if (msgObj.msg && msgObj.msg === 'SUCCESS') {
                                //连接成功，设置连接状态为成功
                                changeConnectBtnStatus(true);
                            } else {
                                changeConnectBtnStatus(false);
                            }
                        } else if (msgObj.fun === 'weight') {
                            //电子秤重量消息
                            // console.log("解析到电子秤重量消息-->", msgObj.msg);
                            if (msgObj.msg) {
                                setSortingWeightToGood(msgObj.msg);
                            }
                        }
                    }
                }
            }

            //连接关闭的回调方法
            websocket.onclose = function () {
                // console.log("电子秤ws连接断开");
                // notice.msg('电子秤连接断开', {icon: 5});
                admin.removeLoading('#bottomScale');
                changeConnectBtnStatus(false);
            }

            //监听窗口关闭事件，当窗口关闭时，主动去关闭websocket连接，防止连接还没断开就关闭窗口，server端会抛异常。
            window.onbeforeunload = function () {
                // console.log("监听到窗口关闭，主动断开电子秤ws连接");
                websocket.close();
            }
        }

        }

        });

        function resetOrderPrintCheck() {
            preparePrintOrderIds = [];
            $('.print-select').prop('checked', false);
            //渲染一下form
            form.render();
        }

        function queryPrintOrderCheckOutList(printOrderIds,isCheckOut) {
            var sortingOrderListUrl = "shop/order/listForSortingMaterial";
            var params = {};
            params.pageNum = 1;
            params.pageSize = 10000;  //默认最大数据
            if(isCheckOut){
                params.printUpdateType = '2';  //配货单状态
            }
            params.orderIds = printOrderIds.toString();
            if(printOrderIds && printOrderIds.length > 0){
            }else{
                if(!isCheckOut){
                    params = getSearchParams();
                    params.pageNum = 1;
                    params.pageSize = 10000;  //默认最大数据
                }
            }

            admin.req(ctx + sortingOrderListUrl, params, function (result) {
                if(result && result.rows && result.rows.length > 0){
                    //遍历订单列表，获取对应订单的商品列表
                    var orderHtmlContent = '';
                    var updateOrderIds = [];
                    for(var i = 0;i<result.rows.length;i++){
                        if(result.rows[i].sortingMaterialItemVOS && result.rows[i].sortingMaterialItemVOS.length > 0){
                            if(isCheckOut){
                                //出库单
                                orderHtmlContent += getOrderPrintHtmlContent(result.rows[i],result.rows[i].sortingMaterialItemVOS);
                                updateOrderIds.push(result.rows[i].orderId);
                            }else{
                                //标签：一个商品一页指
                                for (var j = 0;j<result.rows[i].sortingMaterialItemVOS.length;j++){
                                    var goodItem = result.rows[i].sortingMaterialItemVOS[j];
                                    var onePageItem = getPrintOrderGoodLabelOnePage(result.rows[i],goodItem);
                                    var pageTotal = 1;
                                    var quantity = goodItem.sortingQuantity;
                                    if(result.rows[i].status == '3' || result.rows[i].status == '4'){
                                        //已分拣
                                    }else{
                                        //未分拣，判断后使用副单位数量 和 副单位名称
                                        // if(goodItem.unitId == goodItem.mainUnitId){
                                        //     //下单是主单位，则取另外一个副单位
                                        //     quantity = goodItem.quantity1;
                                        // }else{
                                            //下单是副单位，直接取
                                            quantity = goodItem.quantity;
                                        // }
                                    }

                                    if(quantity && quantity > 10){
                                       var pageTotal = Math.ceil(quantity/10);
                                       if(pageTotal > 200){
                                           pageTotal = 200;
                                       }
                                    }
                                    for(var p = 0;p<pageTotal;p++){
                                        orderHtmlContent += onePageItem;
                                    }
                                }
                            }
                        }
                    }
                    printer.printHtml({
                        html:
                        orderHtmlContent
                        ,
                        horizontal: true  // 横向打印
                    });

                    if(isCheckOut){
                        //更新订单打印状态
                        var allOrderData = orderGridIns.getData();
                        if(updateOrderIds && updateOrderIds.length > 0 && allOrderData && allOrderData.length > 0){
                            for (var i =0;i<allOrderData.length;i++){
                                if(updateOrderIds.indexOf(allOrderData[i].orderId) != -1){
                                    orderGridIns.update(i, {odoPrintStatus: '1'}, 1);
                                }
                            }
                        }
                    }

                    //重置打印选中
                    resetOrderPrintCheck();
                }else{
                    notice.msg('没有订单需要打印', {icon: 3});
                }
            }, 'post')
        }

                // '        </tr>' +
                // '        <tr>' +
                // '            <td style="text-align: center;width: 100%;color: #0c0c0c;font-size: 10px">'+ goodItem.sortingWeight + goodItem.mainUnitName + '</td>' +
                // '        </tr>' +

    });
