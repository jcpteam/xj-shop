<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8">
    <title>新增商品</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
    <style>
        .user-info-head {
            width: 110px;
            height: 110px;
            position: relative;
            display: inline-block;
        }

        .user-info-head:hover:after {
            content: '\e65d';
            position: absolute;
            padding-left: 43px;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            color: #eee;
            background: rgba(0, 0, 0, 0.5);
            font-family: layui-icon;
            font-size: 24px;
            font-style: normal;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: pointer;
            line-height: 110px;
        }

        .user-info-head img {
            width: 110px;
            height: 110px;
        }
    </style>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form bg-white" id="inputForm" th:onsubmit="return false" th:action="@{/shop/goods/add}">
    <div class="layui-card">
        <div class="layui-card-body">
            <div class="layui-row">
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">商品名称:</label>
                    <div class="layui-input-block">
                        <input name="goodsName" type="text" class="layui-input " lay-verType="tips" lay-verify="required"/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">商品编号:</label>
                    <div class="layui-input-block">
                        <input name="goodsSn" type="text" class="layui-input " lay-verType="tips" lay-verify="required"/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label ">主图:</label>
                    <div class="layui-input-block">
                        <div class="user-info-head" id="editimg">
                            <img th:src="@{/assets/images/15367146917869444.jpg}" id="img"/>
                            <input id="goodsLogo" name="goodsLogo" type="hidden" class="layui-input " />
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">市场价:</label>
                    <div class="layui-input-block">
                        <input name="marketPrice" type="text" class="layui-input " lay-verType="tips" lay-verify="required"/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">本店价:</label>
                    <div class="layui-input-block">
                        <input name="shopPrice" type="text" class="layui-input " lay-verType="tips" lay-verify="required" />
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">商品描述:</label>
                    <div class="layui-input-block">
                        <textarea name="goodsRemark" class="layui-textarea" lay-verType="tips" lay-verify="required"></textarea>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">商品详情:</label>
                    <div class="layui-input-block">
                        <textarea id="editor" name="goodsContent"></textarea>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label layui-form-required">商品排序:</label>
                    <div class="layui-input-block">
                        <input name="sort" type="number" class="layui-input" lay-verType="tips" lay-verify="required"/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">演示地址:</label>
                    <div class="layui-input-block">
                        <input name="demoUrl" type="text" class="layui-input"/>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-form-item layui-hide">
        <button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
        <button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
    </div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script type="text/javascript" src="../../../static/assets/libs/tinymce/tinymce.min.js" th:src="@{/assets/libs/tinymce/tinymce.min.js}"></script>
<script th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script th:inline="javascript">
    // 渲染富文本编辑器
    tinymce.init({
        selector: '#editor',
        height: 550,
        language: 'zh_CN',
        plugins: 'code print preview fullscreen paste searchreplace save autosave link autolink image imagetools media table codesample lists advlist hr charmap emoticons anchor directionality pagebreak quickbars nonbreaking visualblocks visualchars wordcount ax_wordlimit',
        toolbar: 'fullscreen preview code | undo redo | forecolor backcolor | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify | outdent indent | numlist bullist | formatselect fontselect fontsizeselect | link image media emoticons charmap anchor pagebreak codesample | ltr rtl',
        toolbar_drawer: 'sliding',
        images_upload_url: ctx + "common/upload",
        file_picker_types: 'media',
        init_instance_callback : function(editor) {
            editor.on('Change', function(e) {
                console.log(editor);
                editor.save();
                console.log(editor.getContent());
            });
        }
    });
</script>
<script th:inline="none">
    layui.use(['index', 'form', 'formX', 'table', 'laydate', 'upload', 'ext'], function(){
        var $ = layui.$;
        var form = layui.form;
        var formX = layui.formX;
        var layer = layui.layer;
        var table = layui.table;
        var admin = layui.admin;
        var upload = layui.upload;
        var laydate = layui.laydate;

        // 裁剪图片弹窗
        $('#editimg').click(function () {
            admin.cropImg({
                imgSrc: $('#img').attr('src'),
                onCrop: function (res) {
                    var blob = admin.dataURLtoBlob(res);
                    admin.upload(blob, function(result){
                        console.log(JSON.stringify(result));
                        $('#img').attr('src','/file/' + result.url);
                        $('#goodsLogo').val(result.url);
                    });
                }
            });
        });

        //普通图片上传
        var uploadInst = upload.render({
            elem: '#test1'
            ,url: '/common/upload' //改成您自己的上传接口
            ,before: function(obj){
                //预读本地文件示例，不支持ie8
                obj.preview(function(index, file, result){
                    $('#demo1').attr('src', result); //图片链接（base64）
                });
            }
            ,done: function(res){
                //上传成功
                if(res.code == 0){
                    $('#goodsLogo').val(res.url);
                    return;
                }
                //上传失败
                return layer.msg('上传失败');
            }
            ,error: function(){
                //演示失败状态，并实现重传
                var demoText = $('#demoText');
                demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-xs demo-reload">重试</a>');
                demoText.find('.demo-reload').on('click', function(){
                    uploadInst.upload();
                });
            }
        });

    })
</script>
</body>
</html>
