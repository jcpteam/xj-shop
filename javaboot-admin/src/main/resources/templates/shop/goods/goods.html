<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>商品主列表</title>
    <link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
    <link rel="stylesheet" href="../../../static/assets/module/admin.css?v=316" th:href="@{/assets/module/admin.css}"/>
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <style>
        #treeTbTree {
            height: 535px;
            overflow: auto;
        }

        @media screen and (max-width: 768px) {
            #treeTbTree {
                height: auto;
            }
        }

        /** dtree选中颜色重写 */
        .dtree-theme-item-this {
            background-color: #eeeeee !important;
        }

        .box-title {
            font-size: 16px;
            margin-bottom: 13px;
            float: left;
        }

        .box-tools {
            position: relative;
            top: 0px;
            right: 0;
        }

        .pull-right {
            float: right;
        }

    </style>
</head>
<body>



<!-- 正文开始 -->
<div class="layui-fluid">
    <div class="layui-row">
        <!-- 右表 -->
        <div class="layui-card">
            <div class="layui-card-body" style="min-height: 535px;">

                <!-- 搜索区 -->
                <form class="layui-form toolbar" th:onsubmit="return false">
                    <div class="layui-form-item">
                        <input type="hidden" id="parentId" name="parentId">
                        <input type="hidden" id="cateId" name="cateId">
                        <div class="layui-inline">
                            <label class="layui-form-label label-auto">商品编号：</label>
                            <div class="layui-input-inline">
                                <input class="layui-input" name="goodsSn" type="text" placeholder="输入商品编号"/>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label label-auto">商品名称：</label>
                            <div class="layui-input-inline">
                                <input class="layui-input" name="goodsName" type="text" placeholder="输入商品名称"/>
                            </div>
                        </div>
                        <div class="layui-inline" style="padding-left: 13px;">
                            <button class="layui-btn layui-btn-sm icon-btn" lay-submit lay-filter="searchBtn" id="searchBtn">
                                <i class="layui-icon layui-icon-search"></i>搜索
                            </button>
                            <button class="layui-btn layui-btn-sm icon-btn" type="reset">
                                <i class="layui-icon layui-icon-refresh"></i>重置
                            </button>
                        </div>
                    </div>
                </form>

                <table class="layui-table" id="dataTable" lay-filter="dataTable"></table>

            </div>
        </div>

    </div>
</div>

<!-- 头工具栏 -->
<script type="text/html" id="toolbarHead">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add" shiro:hasPermission="shop:goods:add"><i class="layui-icon layui-icon-addition"></i>新增</button>
        <button class="layui-btn layui-btn-warm layui-btn-sm" lay-event="edit" shiro:hasPermission="shop:goods:edit"><i class="layui-icon layui-icon-edit"></i>修改</button>
        <button class="layui-btn layui-btn-danger layui-btn-sm" lay-event="batchdel"shiro:hasPermission="shop:goods:remove"><i class="layui-icon layui-icon-delete"></i>删除</button>
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="import" shiro:hasPermission="shop:goods:import"><i class="layui-icon layui-icon-upload"></i>导入</button>
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="export" shiro:hasPermission="shop:goods:export"><i class="layui-icon layui-icon-export"></i>导出</button>
    </div>
</script>

<!-- 行工具栏 -->
<script type="text/html" id="toolbarRow">
    <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="editSpec" shiro:hasPermission="shop:goods:edit">规格属性</a>
    <a class="layui-btn layui-btn-xs" lay-event="edit" shiro:hasPermission="shop:goods:edit">修改</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del" shiro:hasPermission="shop:goods:remove">删除</a>
</script>

<!-- 是否上架 -->
<script type="text/html" id="isOnSale">
    <input type="checkbox" lay-filter="isOnSaleCk" data-id="{{d.goodsId}}" value="{{d.isOnSale}}" lay-skin="switch" lay-text="已上架|未上架" {{d.isOnSale==1?'checked':''}} style="display: none;"/>
</script>
<!-- 是否推荐 -->
<script type="text/html" id="isRecommend">
    <input type="checkbox" lay-filter="isRecommendCk" data-id="{{d.goodsId}}" value="{{d.isRecommend}}" lay-skin="switch" lay-text="已推荐|未推荐" {{d.isRecommend==1?'checked':''}} style="display: none;"/>
</script>
<!-- 是否新品 -->
<script type="text/html" id="isNew">
    <input type="checkbox" lay-filter="isNewCk" data-id="{{d.goodsId}}" value="{{d.isNew}}" lay-skin="switch" lay-text="是|否" {{d.isNew==1?'checked':''}} style="display: none;"/>
</script>

<!-- js部分 -->
<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js?v=316" th:src="@{/assets/js/common.js}"></script>

<script th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script th:inline="none">
    layui.use(['index', 'layer', 'form', 'table', 'util', 'laydate', 'zTree', 'ext'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var form = layui.form;
        var table = layui.table;
        var util = layui.util;
        var laydate = layui.laydate;
        var admin = layui.admin;
        var index = layui.index;

        var prefix = ctx + "shop/goods";
        var createUrl = prefix + "/add";
        var updateUrl = prefix + "/edit/{id}";
        var updateSpecUrl = prefix + "/editSpec/{id}/{type_id}";
        var removeUrl = prefix + "/remove";
        var exportUrl = prefix + "/export";
        var importUrl = prefix + "/importData";

        table.render({
            elem: '#dataTable'
            ,url: prefix + "/list"
            ,method: 'POST'
            ,toolbar: '#toolbarHead'
            ,height: 'full-100'
            ,cellMinWidth: 80
            ,page: true
            ,request: {
                pageName: 'pageNum' //页码的参数名称，默认：page
                ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
            ,limit: 10
            ,cols: [[
                {type: 'checkbox', fixed: 'left'}
                ,{field: 'goodsName', title: '商品名称',width: 200}
                ,{field: 'goodsSn', title: '商品编号',width: 100}
                ,{field: 'marketPrice', title: '市场价', width: 80}
                ,{field: 'shopPrice', title: '本店价', width: 80}
                ,{field: 'sort', title: '排序', width: 80}
                ,{field: 'isOnSale', title: '是否上架', width: 120, templet: '#isOnSale'}
                ,{field: 'isRecommend', title: '是否推荐', width: 120, templet: '#isRecommend'}
                ,{field: 'isNew', title: '是否新品', width: 120, templet: '#isNew'}
                ,{field:'operate', title: '操作', minWidth: 200, toolbar: '#toolbarRow', fixed: 'right'}
            ]]
            ,parseData: function(res){ //将原始数据解析成 table 组件所规定的数据
                return {
                    "code": res.code, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "count": res.total, //解析数据长度
                    "data": res.rows //解析数据列表
                };
            }
        });

        //监听搜索
        form.on('submit(searchBtn)', function (data) {
            var field = data.field;
            //执行重载
            table.reload('dataTable', {page: {
                    pageNum: 1
                },
                where: field
            });
        });

        //监听表格复选框选择
        table.on('checkbox(dataTable)', function (obj) {
            console.log(obj)
        });

        /* 上架 */
        form.on('switch(isOnSaleCk)', function (obj) {
            var goodsId = $(obj.elem).data('id');
            if(obj.elem.checked){
                admin.confirm('确认要上架吗？', function () {
                    admin.req(prefix + "/changeStatus", { "goodsId": goodsId, "isOnSale": 1 }, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('上架成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            } else{
                admin.confirm('确认要下架吗？', function () {
                    admin.req(prefix + "/changeStatus", { "goodsId": goodsId, "isOnSale": 0 }, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('下架成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            }
        });
        /* 推荐 */
        form.on('switch(isRecommendCk)', function (obj) {
            var goodsId = $(obj.elem).data('id')
            if(obj.elem.checked){
                admin.confirm('确认要推荐吗？', function () {
                    admin.req(prefix + "/changeStatus", { "goodsId": goodsId, "isRecommend": 1 }, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('推荐成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            } else{
                admin.confirm('确认取消推荐吗？', function () {
                    admin.req(prefix + "/changeStatus", { "goodsId": goodsId, "isRecommend": 0 }, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('取消推荐成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            }
        });
        /* 新品 */
        form.on('switch(isNewCk)', function (obj) {
            var goodsId = $(obj.elem).data('id')
            if(obj.elem.checked){
                admin.confirm('确认设置为新品吗？', function () {
                    admin.req(prefix + "/changeStatus", { "goodsId": goodsId, "isNew": 1 }, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('上新成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            } else{
                admin.confirm('确认取消新品吗？', function () {
                    admin.req(prefix + "/changeStatus", { "goodsId": goodsId, "isNew": 0 }, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('取消成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            }
        });


        //头工具栏事件
        table.on('toolbar(dataTable)', function(obj){
            switch(obj.event){
                case 'add':
                    active.add();
                    break;
                case 'edit':
                    var checkStatus = table.checkStatus('dataTable')
                        , checkData = checkStatus.data; //得到选中的数据

                    var id = null;
                    if (id == null) {
                        if (checkData.length === 0) {
                            return admin.info('请选择一条数据');
                        } else if (checkData.length > 1) {
                            return admin.info('只能选择一条数据编辑');
                        } else {
                            id = checkData[0].goodsId;
                        }
                    }
                    active.edit(id);
                    break;
                case 'batchdel':
                    active.batchdel();
                    break;
                case 'import':
                    break;
                case 'export':
                    break;
            };
        });

        //行工具栏事件
        table.on('tool(dataTable)', function (obj) {
            var data = obj.data;
            if (obj.event === 'editSpec') {
                active.editSpec(data.goodsId, data.goodsType);
            } else if (obj.event === 'edit') {
                active.edit(data.goodsId);
            } else if (obj.event === 'del') {
                active.del(data.goodsId);
            }
        });

        //事件
        var active = {
            batchdel: function () {
                var checkStatus = table.checkStatus('dataTable')
                    , checkData = checkStatus.data; //得到选中的数据

                if (checkData.length === 0) {
                    return admin.info('请选择数据');
                }

                var ids = [];
                layui.each(checkData, function (index, item) {
                    ids.push(item.goodsId);
                });

                admin.confirm('确定删除吗？', function () {
                    admin.req(removeUrl, {ids: ids.join(',')}, function (result) {
                        if (result.code == 0) {
                            table.reload('dataTable');
                            admin.success('删除成功!');
                        } else {
                            admin.error(result.msg);
                        }
                    },'post')
                });
            }
            ,editSpec: function (id, type_id) {
                var url = updateSpecUrl.replace("{id}", id);
                url = url.replace("{type_id}", type_id);
                admin.openDialog('规格属性', url, '100%', '100%');
            }
            ,add: function () {
                parent.layui.admin.openDialog('新建商品', createUrl, '100%', '100%');
            }
            ,edit: function (id) {
                var editUrl = updateUrl.replace("{id}", id);
                parent.layui.admin.openDialog('编辑商品', editUrl, '100%', '100%');
            }
            ,del: function(id){
                admin.confirm('确定删除吗?',function(){
                    admin.req(removeUrl, {ids: id}, function (data) {
                        if (data.code == 0) {
                            table.reload('dataTable');
                            admin.success('删除成功!');
                        } else {
                            admin.error(data.msg);
                        }
                    },'post')
                });
            }
        }

    });
</script>
</body>

</html>
