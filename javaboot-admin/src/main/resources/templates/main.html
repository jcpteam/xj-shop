    <style>
        /** 统计快捷方式样式 */
        .console-link-block {
            font-size: 16px;
            padding: 20px 20px;
            border-radius: 4px;
            background-color: #40D4B0;
            color: #FFFFFF !important;
            box-shadow: 0 2px 3px rgba(0, 0, 0, .05);
            position: relative;
            overflow: hidden;
            display: block;
        }

        .console-link-block .console-link-block-num {
            font-size: 40px;
            margin-bottom: 5px;
            opacity: .9;
        }

        .console-link-block .console-link-block-text {
            opacity: .8;
        }

        .console-link-block .console-link-block-icon {
            position: absolute;
            top: 50%;
            right: 20px;
            width: 50px;
            height: 50px;
            font-size: 50px;
            line-height: 50px;
            margin-top: -25px;
            color: #FFFFFF;
            opacity: .8;
        }

        .console-link-block .console-link-block-band {
            color: #fff;
            width: 100px;
            font-size: 12px;
            padding: 2px 0 3px 0;
            background-color: #E32A16;
            line-height: inherit;
            text-align: center;
            position: absolute;
            top: 8px;
            right: -30px;
            transform-origin: center;
            transform: rotate(45deg) scale(.8);
            opacity: .95;
            z-index: 2;
        }

        /** //统计快捷方式样式 */

        /** 设置每个快捷块的颜色 */
        .layui-row > div:nth-child(2) .console-link-block {
            background-color: #55A5EA;
        }

        .layui-row > div:nth-child(3) .console-link-block {
            background-color: #9DAFFF;
        }

        .layui-row > div:nth-child(4) .console-link-block {
            background-color: #F591A2;
        }

        .layui-row > div:nth-child(5) .console-link-block {
            background-color: #FEAA4F;
        }

        .layui-row > div:last-child .console-link-block {
            background-color: #9BC539;
        }
    </style>

<script type="text/javascript" th:inline="javascript">
    var ctx = [[@{/}]];
</script>
<script th:inline="javascript">
    layui.use(['layer', 'admin', 'table'], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var admin = layui.admin;
        var table = layui.table;
        var prefix = ctx + "shop/index/stat";

        admin.req(prefix + "/order/num", {}, function (result) {
            $("#orderNum").text(result)
        },'get')

        admin.req(prefix + "/merchant/num", {}, function (result) {
            $("#merchantNum").text(result)
        },'get')

        admin.req(prefix + "/goods/num", {}, function (result) {
            $("#goodsNum").text(result)
        },'get')

        admin.req(prefix + "/spu/num", {}, function (result) {
            $("#spuNum").text(result)
        },'get')

        admin.req(prefix + "/todayOrder/list", {}, function (result) {

            // 计算所有销售数量
            var total = 0.0
            layui.each(result, function (index, item) {
               total += item.quantity
            })
            table.render({
                elem: '#dataTable1'
                ,data: result
                ,page: true //开启分页
                ,totalRow: true
                ,cols: [[ //表头
                    {field: 'spuName', title: 'SPU名称', totalRowText: '合计'}
                    ,{field: 'quantity', title: '销售数量', totalRow: true}
                    ,{field: 'unitName', title: '销售单位'}
                ]]
                ,done:function(res, curr, count){
                    this.elem.next().find('.layui-table-total td[data-field=quantity] div').text(total.toFixed(2))
                }
            });
        },'get')

        admin.req(prefix + "/month/ordernum", {}, function (result) {
            // 计算所有下单数量
            var total = 0.0
            layui.each(result, function (index, item) {
                total += item.sortingQuantity
            })

            table.render({
                elem: '#dataTable2'
                ,data: result
                ,page: true //开启分页
                ,totalRow: true
                ,cols: [[ //表头
                    {field: 'spuName', title: 'SPU名称', totalRowText: '合计'}
                    ,{field: 'sortingQuantity', title: '下单数量',totalRow: true}
                    ,{field: 'unitName', title: '销售单位'}
                ]]
                ,done:function(res, curr, count){
                    this.elem.next().find('.layui-table-total td[data-field=sortingQuantity] div').text(total.toFixed(2))
                }
            });
        },'get')

        admin.req(prefix + "/week/salenum", {}, function (result) {
            // 计算所有下单数量
            var total0 = 0.0
            var total1 = 0.0
            var total2 = 0.0

            layui.each(result, function (index, item) {
                total0 += item.sortingQuantity
                total1 += item.sortingWeight
                total2 += item.sortingPrice
            })

            table.render({
                elem: '#dataTable4'
                ,data: result
                ,page: true //开启分页
                ,totalRow: true
                ,cols: [[ //表头
                    {field: 'spuName', title: 'SPU名称', totalRowText: '合计'}
                    ,{field: 'sortingQuantity', title: '销售只数',totalRow: true}
                    ,{field: 'sortingWeight', title: '销售重量',totalRow: true}
                    ,{field: 'price', title: '销售单价',templet:function (d) {
                            return (d.sortingPrice / d.sortingWeight).toFixed(2);
                     }}
                    ,{field: 'sortingPrice', title: '销售额'}
                    //,{field: 'unitName', title: '销售毛利'}
                ]]
                ,done:function(res, curr, count){
                    this.elem.next().find('.layui-table-total td[data-field=sortingQuantity] div').text(total0.toFixed(2))
                    this.elem.next().find('.layui-table-total td[data-field=sortingWeight] div').text(total1.toFixed(2))
                    this.elem.next().find('.layui-table-total td[data-field=sortingPrice] div').text(total2.toFixed(2))
                }
            });
        },'get')

        admin.req(prefix + "/week/purchase", {}, function (result) {
            // 计算所有下单数量
            var total0 = 0.0
            var total1 = 0.0
            var total2 = 0.0

            layui.each(result, function (index, item) {
                var leftNum = parseFloat(item.quantity) - parseFloat(item.sortingQuantity);
                leftNum = (leftNum > 0 ? leftNum : 0);
                total0 += item.quantity
                total1 += item.sortingQuantity
                total2 = parseFloat(total2) + parseFloat(leftNum)
            })
            table.render({
                elem: '#dataTable5'
                ,data: result
                ,page: true //开启分页
                ,totalRow: true
                ,cols: [[ //表头
                    {field: 'spuName', title: 'SPU名称', totalRowText: '合计'}
                    ,{field: 'quantity', title: '进',totalRow: true}
                    ,{field: 'sortingQuantity', title: '销',totalRow: true}
                    ,{field: 'price', title: '存',templet:function (d) {
                        var leftNum = d.quantity - d.sortingQuantity;
                        return (leftNum > 0 ? leftNum : 0).toFixed(2);
                     }}
                    ,{field: 'sortingPrice', title: '差异',templet:function (d) {
                        var leftNum = 0;
                        return leftNum.toFixed(2);
                    }}
                ]]
                ,done:function(res, curr, count){
                    this.elem.next().find('.layui-table-total td[data-field=quantity] div').text(total0.toFixed(2))
                    this.elem.next().find('.layui-table-total td[data-field=sortingQuantity] div').text(total1.toFixed(2))
                    this.elem.next().find('.layui-table-total td[data-field=price] div').text(total2.toFixed(2))
                }
            });
        },'get')

        admin.req(prefix + "/order/total", {}, function (result) {
            table.render({
                elem: '#dataTable6'
                ,data: result
                ,page: true //开启分页
                ,cols: [[ //表头
                    {field: 'createTime', title: '日期'}
                    ,{field: 'orderGoodCount', title: '订单数量'}
                ]]
            });
        },'get')

        admin.req(prefix + "/noOrderMember/list", {}, function (result) {
            table.render({
                elem: '#dataTable3'
                ,data: result
                ,page: true //开启分页
                ,cols: [[ //表头
                    {field: 'id', title: '客户账号'}
                    ,{field: 'nickname', title: '客户名称'}
                ]]
            });
        },'get')

        admin.req(prefix + "/nopay/list", {}, function (result) {
            table.render({
                elem: '#dataTable7'
                ,data: result
                ,page: true //开启分页
                ,cols: [[ //表头
                    {field: 'merchantId', title: '客户账号'}
                    ,{field: 'merchantName', title: '客户名称'}
                    ,{field: 'sortingPrice', title: '总金额'}
                ]]
            });
        },'get')


    });
</script>
