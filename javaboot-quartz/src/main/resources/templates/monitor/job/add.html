<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<meta charset="utf-8">
	<title>新增定时任务</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<link rel="stylesheet" href="../../../static/assets/libs/layui/css/layui.css" th:href="@{/assets/libs/layui/css/layui.css}"/>
	<link rel="stylesheet" href="../../../static/assets/module/admin.css" th:href="@{/assets/module/admin.css}"/>
	<style>
		.layui-form-dialog {
			position: relative;
			padding: 15px 15px;
			line-height: 24px;
		}
	</style>
</head>
<body class="bg-white">

<!-- 正文开始 -->
<form class="layui-form" id="inputForm" th:onsubmit="return false" th:action="@{/monitor/job/add}">
	<div class="layui-form-dialog">
		<input type="hidden" name="createBy" th:value="${@permission.getPrincipalProperty('loginName')}">
		<div class="layui-form-item">
			<label class="layui-form-label layui-form-required">任务名称:</label>
			<div class="layui-input-block">
				<input name="jobName" id="jobName" type="text" placeholder="请输入任务名称" class="layui-input" lay-verType="tips" lay-verify="required" />
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label layui-form-required">任务分组:</label>
			<div class="layui-input-block">
				<select name="jobGroup" th:with="type=${@dict.getType('sys_job_group')}">
					<option value="">所有</option>
					<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
				</select>
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label layui-form-required">调用目标字符串:</label>
			<div class="layui-input-block">
				<input name="invokeTarget" id="invokeTarget" type="text" placeholder="调用目标字符串" class="layui-input" lay-verType="tips" lay-verify="required" />
				<div class="layui-form-mid layui-word-aux"><i class="layui-icon layui-icon-about"></i>Bean调用示例：jbTask.params('javaboot')</div>
				<div class="layui-form-mid layui-word-aux"><i class="layui-icon layui-icon-about"></i>Class类调用示例：com.javaboot.quartz.task.JavaBootTask.params('javaboot')</div>
				<div class="layui-form-mid layui-word-aux"><i class="layui-icon layui-icon-about"></i>参数说明：支持字符串，布尔类型，长整型，浮点型，整型</div>
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label layui-form-required">cron定时任务表达式:</label>
			<div class="layui-input-block">
				<input name="cronExpression" id="cronExpression" type="text" placeholder="请输入cron表达式" class="layui-input" lay-verType="tips" lay-verify="required" />
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label layui-form-required">执行策略:</label>
			<div class="layui-input-block">
				<input type="radio" name="misfirePolicy" value="1" title="立即执行" th:checked="true"/>
				<input type="radio" name="misfirePolicy" value="2" title="执行一次"/>
				<input type="radio" name="misfirePolicy" value="3" title="放弃执行"/>
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label layui-form-required">并发执行:</label>
			<div class="layui-input-block">
				<input type="radio" name="concurrent" value="0" title="允许" th:checked="true"/>
				<input type="radio" name="concurrent" value="1" title="禁止"/>
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">状态:</label>
			<div class="layui-input-block" th:with="type=${@dict.getType('sys_job_status')}">
				<input th:each="dict,dictStat:${type}" type="radio" name="status" th:title="${dict.dictLabel}" th:value="${dict.dictValue}" th:attr="checked=${dictStat.index==0?true:false}">
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">备注:</label>
			<div class="layui-input-block">
				<textarea name="remark" maxlength="500" class="layui-textarea" rows="3"></textarea>
			</div>
		</div>
	</div>

	<div class="layui-form-item layui-hide">
		<button id="submitBtn" class="layui-btn" lay-filter="submitBtn" lay-submit>保存</button>
		<button id="closeBtn" class="layui-btn layui-btn-primary" ew-event="closeDialog">关闭</button>
	</div>
</form>

<script type="text/javascript" src="../../../static/assets/libs/layui/layui.js" th:src="@{/assets/libs/layui/layui.js}"></script>
<script type="text/javascript" src="../../../static/assets/js/common.js" th:src="@{/assets/js/common.js}"></script>
<script th:inline="javascript">
	var ctx = [[@{/}]];
</script>
<script th:inline="none">
	layui.use(['index', 'form', 'table', 'ext'], function(){
		var $ = layui.$;
		var form = layui.form;
		var layer = layui.layer;
		var table = layui.table;
		var admin = layui.admin;

	})
</script>
</body>
</html>
